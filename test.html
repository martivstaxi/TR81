<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>TÃžrkiye | 81 Ä°lin En GÃžzel ManzaralarÄą</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#2d8a4e;--primary-light:#3a9d5e;--accent:#e6a817;
  --bg:#f2f7f0;--bg-light:#e8f0e4;--bg-card:rgba(255,255,255,0.75);--bg-card-hover:rgba(255,255,255,0.92);
  --glass-border:rgba(45,120,60,0.12);--glass-border-hover:rgba(45,120,60,0.25);
  --text:#1a3a24;--text-secondary:#4a7258;--text-muted:#7a9d86;
  --shadow:0 4px 24px rgba(30,80,45,0.08);--radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans','Outfit',sans-serif;
  background-color:var(--bg);color:var(--text);
  background-image:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public');
  background-size:cover;background-position:center;background-repeat:no-repeat;
  background-attachment:fixed;
  min-height:100vh;line-height:1.5;overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
@media(max-width:768px){
  body{
    background-image:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public');
  }
}

/* Animated gradient background */
.bg-glow{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  background:rgba(242,247,240,0.55);
}
.bg-glow::before,.bg-glow::after{
  content:'';position:absolute;border-radius:50%;filter:blur(120px);opacity:.18;
  animation:float 20s ease-in-out infinite;
}
.bg-glow::before{
  width:600px;height:600px;top:-200px;left:-100px;
  background:radial-gradient(circle,#6dbb85,transparent 70%);
}
.bg-glow::after{
  width:500px;height:500px;bottom:-150px;right:-100px;
  background:radial-gradient(circle,#a8d5a2,transparent 70%);
  animation-delay:-10s;animation-direction:reverse;
}
@keyframes float{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(60px,40px) scale(1.1)}
  66%{transform:translate(-40px,20px) scale(.95)}
}

/* Subtle grid pattern */
.bg-grid{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(45,120,60,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(45,120,60,.04) 1px, transparent 1px);
  background-size:64px 64px;
}

.container{max-width:660px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* === Top Bar === */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  padding:12px 20px;display:flex;justify-content:space-between;align-items:center;
  background:rgba(242,247,240,0.8);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(45,120,60,0.08);
}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-logo{font-family:'Outfit',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.5px;
  background:linear-gradient(135deg,#2d8a4e,#5aab6e);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;}
.world-link{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  background:var(--bg-card);border:1px solid var(--glass-border);border-radius:10px;
  color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;
  text-decoration:none;transition:.25s ease;
}
.world-link:hover{background:var(--bg-card-hover);border-color:var(--glass-border-hover);color:var(--text)}
.lang-toggle{
  display:flex;align-items:center;gap:2px;padding:3px;
  background:var(--bg-card);border:1px solid var(--glass-border);border-radius:10px;
}
.lang-toggle button{
  padding:6px 14px;border:none;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;font-family:inherit;
  background:transparent;color:var(--text-muted);transition:.25s;
}
.lang-toggle button.active{
  background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(22,163,74,0.4);
}
.lang-toggle button:not(.active):hover{color:var(--text)}

/* === Header === */
.header{padding:100px 0 32px;text-align:center}
.title{
  font-family:'Outfit',sans-serif;font-weight:800;
  font-size:clamp(1.75rem,5vw,2.75rem);letter-spacing:-.5px;
  line-height:1.3;margin-bottom:8px;
}
.title-gradient{
  background:linear-gradient(135deg,#1e6b38 0%,#2d8a4e 40%,#3a7a4a 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitle{color:var(--text-secondary);font-size:15px;font-weight:400}

/* === Search === */
.search-wrap{max-width:420px;margin:0 auto 32px;position:relative}
.search-input{
  width:100%;padding:14px 20px 14px 48px;font-size:15px;font-family:inherit;
  background:var(--bg-card);border:1.5px solid var(--glass-border);border-radius:14px;
  color:var(--text);transition:.3s;outline:none;
}
.search-input::placeholder{color:var(--text-muted)}
.search-input:focus{border-color:var(--primary);background:var(--bg-card-hover);
  box-shadow:0 0 0 3px rgba(22,163,74,.15)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}

/* === Stats === */
.stats{
  display:flex;justify-content:center;gap:24px;margin-bottom:32px;
  padding:16px;background:var(--bg-card);border:1px solid var(--glass-border);
  border-radius:14px;max-width:420px;margin-left:auto;margin-right:auto;
}
.stat{text-align:center}
.stat-num{font-family:'Outfit',sans-serif;font-weight:700;font-size:22px;color:var(--primary)}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.5px}

/* === Grid === */
.grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding-bottom:60px;
}
.card{
  background:var(--bg-card);border:1.5px solid var(--glass-border);border-radius:var(--radius);
  padding:20px 10px;text-align:center;cursor:pointer;
  transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(45,138,78,0.06),rgba(90,171,110,0.04));
  opacity:0;transition:.3s;
}
.card:hover{
  transform:translateY(-4px);border-color:var(--glass-border-hover);
  box-shadow:0 8px 32px rgba(30,80,45,0.12);
}
.card:hover::before{opacity:1}
.card:active{transform:translateY(-1px);transition:.1s}
.city-code{
  font-family:'Outfit',sans-serif;font-weight:800;font-size:26px;
  color:var(--text);line-height:1;position:relative;z-index:1;
  letter-spacing:-1px;
}
.city-name{
  font-weight:500;font-size:12px;color:var(--text-secondary);margin-top:6px;
  word-break:break-word;line-height:1.2;position:relative;z-index:1;
}

/* === No results === */
.no-results{
  text-align:center;padding:60px 20px;color:var(--text-muted);
  display:none;grid-column:1/-1;
}
.no-results-icon{font-size:40px;margin-bottom:12px;opacity:.5}
.no-results-text{font-size:15px}

/* === Scroll to top === */
.scroll-top{
  position:fixed;bottom:24px;right:24px;z-index:50;
  width:44px;height:44px;border-radius:12px;border:none;cursor:pointer;
  background:var(--primary);color:#fff;font-size:18px;
  box-shadow:0 4px 16px rgba(45,138,78,0.3);
  transition:.3s;opacity:0;visibility:hidden;transform:translateY(10px);
  display:flex;align-items:center;justify-content:center;
}
.scroll-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
.scroll-top:hover{background:var(--primary-light);transform:translateY(-2px);box-shadow:0 6px 20px rgba(45,138,78,0.35)}

/* === Mobile === */
@media(max-width:640px){
  .topbar{padding:10px 14px}
  .topbar-logo{font-size:16px}
  .world-link{padding:6px 10px;font-size:12px}
  .world-link span:last-child{display:none}
  .lang-toggle button{padding:5px 12px;font-size:12px}
  .header{padding:80px 0 24px}
  .search-wrap{margin-bottom:24px}
  .search-input{padding:12px 16px 12px 42px;font-size:14px}
  .stats{gap:16px;padding:14px;margin-bottom:24px}
  .stat-num{font-size:19px}
  .grid{gap:8px;padding-bottom:40px}
  .card{padding:16px 8px;border-radius:14px}
  .city-code{font-size:22px}
  .city-name{font-size:11px;margin-top:4px}
  .scroll-top{bottom:16px;right:16px;width:40px;height:40px;border-radius:10px}
}
@media(max-width:380px){
  .grid{gap:6px}
  .card{padding:14px 6px}
  .city-code{font-size:20px}
  .city-name{font-size:10px}
}

/* Fade-in animation */
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card{animation:cardIn .4s ease both}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<!-- Top Bar -->
<nav class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">TR81</span>
    <a class="world-link" href="world.html">
      <span>ð</span>
      <span id="worldText">DÃžnya</span>
    </a>
  </div>
  <div class="lang-toggle" id="langToggle">
    <button data-lang="tr" class="active">TR</button>
    <button data-lang="en">EN</button>
  </div>
</nav>

<div class="container">
  <header class="header">
    <h1 class="title"><span class="title-gradient" id="title">TÃžrkiye'nin ManzaralÄą Yerleri</span></h1>
    <p class="subtitle" id="subtitle">81 ilin en gÃžzel noktalarÄąnÄą keÅfet ð</p>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="7.5"/><path d="m20 20-4-4"/>
    </svg>
    <input id="search" class="search-input" type="text" placeholder="Ä°l ara..." autocomplete="off" spellcheck="false">
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num">81</div>
      <div class="stat-label" id="statProvinces">Ä°l</div>
    </div>
    <div class="stat">
      <div class="stat-num">7</div>
      <div class="stat-label" id="statRegions">BÃķlge</div>
    </div>

  </div>

  <!-- Grid -->
  <div id="grid" class="grid">
    <div class="no-results" id="noResults">
      <div class="no-results-icon">ð</div>
      <div class="no-results-text" id="noResultsText">SonuÃ§ bulunamadÄą</div>
    </div>
  </div>
</div>

<!-- Scroll to top -->
<button class="scroll-top" id="scrollTop" aria-label="YukarÄą Ã§Äąk">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script>
// === Ä°ki dil: TR & EN ===
const i18n = {
  tr: {
    title: "TÃžrkiye'nin ManzaralÄą Yerleri",
    subtitle: '81 ilin en gÃžzel noktalarÄąnÄą keÅfet ð',
    search: 'Ä°l ara...',
    world: 'DÃžnya',
    provinces: 'Ä°l',
    regions: 'BÃķlge',
    open: 'AÃ§Äąk',
    noResults: 'SonuÃ§ bulunamadÄą'
  },
  en: {
    title: "Scenic Places of TÃžrkiye",
    subtitle: 'Discover the most beautiful spots of 81 provinces ð',
    search: 'Search province...',
    world: 'World',
    provinces: 'Provinces',
    regions: 'Regions',
    open: 'Unlocked',
    noResults: 'No results found'
  }
};

// === Åehirler ===
const cities = [
  ['antalya','Antalya'],['adana','Adana'],['adiyaman','AdÄąyaman'],
  ['afyon','Afyonkarahisar'],['agri','AÄrÄą'],['aksaray','Aksaray'],
  ['amasya','Amasya'],['ankara','Ankara'],['ardahan','Ardahan'],
  ['artvin','Artvin'],['aydin','AydÄąn'],['balikesir','BalÄąkesir'],
  ['bartin','BartÄąn'],['batman','Batman'],['bayburt','Bayburt'],
  ['bilecik','Bilecik'],['bingol','BingÃķl'],['bitlis','Bitlis'],
  ['bolu','Bolu'],['burdur','Burdur'],['bursa','Bursa'],
  ['canakkale','Ãanakkale'],['cankiri','ÃankÄąrÄą'],['corum','Ãorum'],
  ['denizli','Denizli'],['diyarbakir','DiyarbakÄąr'],['duzce','DÃžzce'],
  ['edirne','Edirne'],['elazig','ElazÄąÄ'],['erzincan','Erzincan'],
  ['erzurum','Erzurum'],['eskisehir','EskiÅehir'],['gaziantep','Gaziantep'],
  ['giresun','Giresun'],['gumushane','GÃžmÃžÅhane'],['hakkari','Hakkari'],
  ['hatay','Hatay'],['igdir','IÄdÄąr'],['isparta','Isparta'],
  ['istanbul','Ä°stanbul'],['izmir','Ä°zmir'],['kahramanmaras','KahramanmaraÅ'],
  ['karabuk','KarabÃžk'],['karaman','Karaman'],['kars','Kars'],
  ['kastamonu','Kastamonu'],['kayseri','Kayseri'],['kilis','Kilis'],
  ['kirikkale','KÄąrÄąkkale'],['kirklareli','KÄąrklareli'],['kirsehir','KÄąrÅehir'],
  ['kocaeli','Kocaeli'],['konya','Konya'],['kutahya','KÃžtahya'],
  ['malatya','Malatya'],['manisa','Manisa'],['mardin','Mardin'],
  ['mersin','Mersin'],['mugla','MuÄla'],['mus','MuÅ'],
  ['nevsehir','NevÅehir'],['nigde','NiÄde'],['ordu','Ordu'],
  ['osmaniye','Osmaniye'],['rize','Rize'],['sakarya','Sakarya'],
  ['samsun','Samsun'],['sanliurfa','ÅanlÄąurfa'],['siirt','Siirt'],
  ['sinop','Sinop'],['sirnak','ÅÄąrnak'],['sivas','Sivas'],
  ['tekirdag','TekirdaÄ'],['tokat','Tokat'],['trabzon','Trabzon'],
  ['tunceli','Tunceli'],['usak','UÅak'],['van','Van'],
  ['yalova','Yalova'],['yozgat','Yozgat'],['zonguldak','Zonguldak']
];

// Ä°ngilizce isimleri (farklÄą olanlar)
const enNames = {
  istanbul:'Istanbul', izmir:'Izmir', canakkale:'Canakkale', eskisehir:'Eskisehir',
  diyarbakir:'Diyarbakir', sanliurfa:'Sanliurfa', kahramanmaras:'Kahramanmaras',
  afyon:'Afyonkarahisar', mugla:'Mugla', nevsehir:'Nevsehir', gumushane:'Gumushane',
  kirikkale:'Kirikkale', kirklareli:'Kirklareli', kirsehir:'Kirsehir',
  kutahya:'Kutahya', sirnak:'Sirnak', tekirdag:'Tekirdag'
};

// Normalize (arama iÃ§in)
const norm = t => t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
  .replace(/[Ã§ÄÄąÃķÅÃž]/g, c=>({'Ã§':'c','Ä':'g','Äą':'i','Ãķ':'o','Å':'s','Ãž':'u'}[c]||c));

let currentLang = 'tr';

function detectLang(){
  const saved = localStorage.getItem('lang81');
  if(saved && (saved==='tr'||saved==='en')) return saved;
  const bl = navigator.language.toLowerCase();
  return bl.startsWith('tr') ? 'tr' : 'en';
}

function getCityName(slug, originalName){
  if(currentLang==='tr') return originalName;
  return enNames[slug] || originalName;
}

function setLang(code){
  currentLang = code;
  const t = i18n[code];
  document.getElementById('title').textContent = t.title;
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('search').placeholder = t.search;
  document.getElementById('worldText').textContent = t.world;
  document.getElementById('statProvinces').textContent = t.provinces;
  document.getElementById('statRegions').textContent = t.regions;
  document.getElementById('noResultsText').textContent = t.noResults;
  document.documentElement.lang = code;
  localStorage.setItem('lang81', code);

  // Toggle buttons
  document.querySelectorAll('#langToggle button').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===code);
  });

  // Update cards
  document.querySelectorAll('.card:not(.no-results)').forEach(card=>{
    const slug = card.dataset.slug;
    const orig = card.dataset.orig;
    if(!slug) return;
    const name = getCityName(slug, orig);
    card.querySelector('.city-code').textContent = name.substring(0,2).toUpperCase();
    card.querySelector('.city-name').textContent = name;
    card.dataset.search = name;
  });

  // Re-run search filter
  filterCards();
}

function filterCards(){
  const v = norm(document.getElementById('search').value);
  let visible = 0;
  document.querySelectorAll('.card:not(#noResults)').forEach(c=>{
    const show = !v || norm(c.dataset.search||'').includes(v);
    c.style.display = show ? '' : 'none';
    if(show) visible++;
  });
  document.getElementById('noResults').style.display = visible===0 ? 'flex' : 'none';
}

document.addEventListener('DOMContentLoaded', ()=>{
  const grid = document.getElementById('grid');

  // Build cards
  cities.forEach(([slug, name], i)=>{
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.slug = slug;
    card.dataset.orig = name;
    card.dataset.search = name;
    card.style.animationDelay = `${Math.min(i*15, 600)}ms`;

    const displayName = getCityName(slug, name);
    card.innerHTML = `
      <div class="city-code">${displayName.substring(0,2).toUpperCase()}</div>
      <div class="city-name">${displayName}</div>
    `;
    card.onclick = ()=> location.href = `${slug}.html`;
    grid.appendChild(card);
  });

  // Lang toggle
  document.querySelectorAll('#langToggle button').forEach(btn=>{
    btn.addEventListener('click', ()=> setLang(btn.dataset.lang));
  });

  // Search
  document.getElementById('search').addEventListener('input', filterCards);

  // Scroll to top
  const scrollBtn = document.getElementById('scrollTop');
  let scrollTick = false;
  window.addEventListener('scroll', ()=>{
    if(!scrollTick){
      requestAnimationFrame(()=>{
        scrollBtn.classList.toggle('visible', window.scrollY > 400);
        scrollTick = false;
      });
      scrollTick = true;
    }
  });
  scrollBtn.addEventListener('click', ()=> window.scrollTo({top:0,behavior:'smooth'}));

  // Init lang
  setLang(detectLang());
});
</script>
</body>
