<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Türkiye | 81 İlin En Güzel Manzaraları</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#4a8c5c;
  --primary-hover:#3d7a4e;
  --accent:#d4a24e;
  --bg:#faf8f4;
  --bg-card:rgba(255,255,255,0.72);
  --bg-card-hover:rgba(255,255,255,0.88);
  --border:rgba(120,100,70,0.10);
  --border-hover:rgba(74,140,92,0.28);
  --text:#2c3527;
  --text-secondary:#5a6b52;
  --text-muted:#8a9880;
  --shadow-sm:0 2px 8px rgba(60,50,30,0.05);
  --shadow-md:0 4px 20px rgba(60,50,30,0.07);
  --shadow-card-hover:0 10px 32px rgba(74,140,92,0.10);
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow-x:hidden}
html{background:var(--bg);scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',system-ui,sans-serif;
  color:var(--text);min-height:100%;line-height:1.5;
  -webkit-font-smoothing:antialiased;
  background-color:var(--bg);
}

/* Sabit arka fon — her cihazda beyaz boşluk yok */
.bg-photo{
  position:fixed;inset:0;z-index:-3;
  background:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public') center/cover no-repeat;
}
@media(max-width:768px){
  .bg-photo{
    background-image:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public');
  }
}

/* Hafif overlay — resim net görünsün */
.bg-overlay{
  position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:rgba(250,248,244,0.30);
}

/* Sıcak ışıklar */
.bg-lights{
  position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden;
}
.bg-lights::before{
  content:'';position:absolute;width:500px;height:500px;
  top:-180px;left:-80px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,162,78,0.07),transparent 65%);
  filter:blur(50px);animation:drift 25s ease-in-out infinite;
}
.bg-lights::after{
  content:'';position:absolute;width:400px;height:400px;
  bottom:-120px;right:-60px;border-radius:50%;
  background:radial-gradient(circle,rgba(90,158,107,0.05),transparent 65%);
  filter:blur(50px);animation:drift 25s ease-in-out infinite reverse;
  animation-delay:-12s;
}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(35px,20px)}}

/* Ana kapsayıcı - max 620px, ortalanmış */
.page-wrap{max-width:620px;margin:0 auto;padding:0 16px;position:relative;z-index:1}

/* === Top Bar === */
.topbar{position:fixed;top:0;left:0;right:0;z-index:50}
.topbar-inner{
  max-width:620px;margin:0 auto;
  padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  background:rgba(250,248,244,0.55);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(120,100,70,0.06);
}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-logo{font-weight:800;font-size:17px;letter-spacing:-.4px;color:var(--primary)}
.topbar-logo span{color:var(--accent)}
.world-link{
  display:inline-flex;align-items:center;gap:5px;padding:5px 11px;
  background:rgba(255,255,255,0.45);border:1px solid var(--border);border-radius:9px;
  color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;
  text-decoration:none;transition:.3s;
}
.world-link:hover{background:rgba(255,255,255,0.75);border-color:var(--border-hover);color:var(--primary)}
.lang-toggle{
  display:flex;gap:2px;padding:2px;
  background:rgba(255,255,255,0.35);border:1px solid var(--border);border-radius:10px;
}
.lang-toggle button{
  padding:5px 13px;border:none;border-radius:8px;cursor:pointer;
  font-size:12px;font-weight:700;font-family:inherit;
  background:transparent;color:var(--text-muted);transition:.3s;
}
.lang-toggle button.active{
  background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(74,140,92,0.3);
}
.lang-toggle button:not(.active):hover{color:var(--text)}

/* === Header === */
.header{padding:82px 0 22px;text-align:center}
.title{
  font-weight:800;font-size:clamp(1.5rem,4.5vw,2.2rem);
  letter-spacing:-.3px;line-height:1.3;margin-bottom:6px;color:var(--text);
}
.title em{font-style:normal;color:var(--primary)}
.subtitle{color:var(--text-secondary);font-size:13px;font-weight:500}
.subtitle span{color:var(--accent)}

/* === Search === */
.search-wrap{max-width:380px;margin:0 auto 22px;position:relative}
.search-input{
  width:100%;padding:12px 16px 12px 42px;font-size:14px;font-family:inherit;font-weight:500;
  background:var(--bg-card);border:1.5px solid var(--border);border-radius:13px;
  color:var(--text);transition:.3s;outline:none;box-shadow:var(--shadow-sm);
}
.search-input::placeholder{color:var(--text-muted);font-weight:400}
.search-input:focus{border-color:var(--primary);background:var(--bg-card-hover);box-shadow:0 0 0 3px rgba(74,140,92,.08),var(--shadow-md)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}

/* === Stats === */
.stats{
  display:flex;justify-content:center;gap:24px;margin-bottom:24px;
  padding:12px 18px;background:var(--bg-card);border:1px solid var(--border);
  border-radius:12px;max-width:220px;margin-left:auto;margin-right:auto;
  box-shadow:var(--shadow-sm);
}
.stat{text-align:center}
.stat-num{font-weight:800;font-size:20px;color:var(--primary);line-height:1.2}
.stat-label{font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.7px;margin-top:1px}

/* === Grid === */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding-bottom:32px}
.card{
  background:var(--bg-card);border:1.5px solid var(--border);border-radius:16px;
  padding:16px 8px;text-align:center;cursor:pointer;
  transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;
  aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);
}
.card::after{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(160deg,rgba(74,140,92,0.04),rgba(212,162,78,0.02));
  opacity:0;transition:.3s;
}
.card:hover{transform:translateY(-4px);border-color:var(--border-hover);box-shadow:var(--shadow-card-hover);background:var(--bg-card-hover)}
.card:hover::after{opacity:1}
.card:active{transform:translateY(-1px);transition:.1s}
.city-code{font-weight:800;font-size:24px;color:var(--text);line-height:1;position:relative;z-index:1;letter-spacing:-.8px}
.city-name{font-weight:600;font-size:11px;color:var(--text-secondary);margin-top:4px;word-break:break-word;line-height:1.2;position:relative;z-index:1}

/* No results */
.no-results{text-align:center;padding:50px 20px;color:var(--text-muted);display:none;grid-column:1/-1}
.no-results-icon{font-size:32px;margin-bottom:8px;opacity:.6}
.no-results-text{font-size:13px;font-weight:500}

/* Scroll top */
.scroll-top{
  position:fixed;bottom:18px;right:18px;z-index:50;
  width:40px;height:40px;border-radius:11px;border:none;cursor:pointer;
  background:var(--primary);color:#fff;
  box-shadow:0 3px 12px rgba(74,140,92,0.3);
  transition:.3s;opacity:0;visibility:hidden;transform:translateY(8px);
  display:flex;align-items:center;justify-content:center;
}
.scroll-top.visible{opacity:1;visibility:visible;transform:translateY(0)}
.scroll-top:hover{background:var(--primary-hover);transform:translateY(-2px)}

/* === Mobile === */
@media(max-width:640px){
  .page-wrap{padding:0 12px}
  .topbar-inner{padding:8px 12px}
  .topbar-logo{font-size:15px}
  .world-link{padding:4px 8px;font-size:11px}
  .world-link .world-text{display:none}
  .lang-toggle button{padding:4px 11px;font-size:11px}
  .header{padding:72px 0 18px}
  .title{font-size:1.35rem}
  .subtitle{font-size:12px}
  .search-wrap{margin-bottom:18px}
  .search-input{padding:11px 14px 11px 38px;font-size:13px;border-radius:11px}
  .stats{gap:18px;padding:10px 14px;margin-bottom:18px;max-width:180px;border-radius:10px}
  .stat-num{font-size:17px}
  .stat-label{font-size:9px}
  .grid{gap:7px;padding-bottom:24px}
  .card{padding:14px 6px;border-radius:14px}
  .city-code{font-size:20px}
  .city-name{font-size:10px;margin-top:3px}
  .scroll-top{bottom:12px;right:12px;width:36px;height:36px;border-radius:9px}
}
@media(max-width:380px){
  .grid{gap:5px}
  .card{padding:12px 5px;border-radius:12px}
  .city-code{font-size:18px}
  .city-name{font-size:9px}
}

@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:cardIn .3s ease both}
</style>
</head>
<body>

<div class="bg-photo"></div>
<div class="bg-overlay"></div>
<div class="bg-lights"></div>

<nav class="topbar">
  <div class="topbar-inner">
    <div class="topbar-left">
      <div class="topbar-logo">TR<span>81</span></div>
      <a class="world-link" href="world.html">
        <span>🌍</span>
        <span class="world-text" id="worldText">Dünya</span>
      </a>
    </div>
    <div class="lang-toggle" id="langToggle">
      <button data-lang="tr" class="active">TR</button>
      <button data-lang="en">EN</button>
    </div>
  </div>
</nav>

<div class="page-wrap">
  <header class="header">
    <h1 class="title" id="title">Türkiye'nin <em>Manzaralı</em> Yerleri</h1>
    <p class="subtitle" id="subtitle">81 ilin en güzel noktalarını keşfet <span>✦</span></p>
  </header>

  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round">
      <circle cx="11" cy="11" r="7.5"/><path d="m20 20-4-4"/>
    </svg>
    <input id="search" class="search-input" type="text" placeholder="İl ara..." autocomplete="off" spellcheck="false">
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">81</div>
      <div class="stat-label" id="statProvinces">İl</div>
    </div>
    <div class="stat">
      <div class="stat-num">7</div>
      <div class="stat-label" id="statRegions">Bölge</div>
    </div>
  </div>

  <div id="grid" class="grid">
    <div class="no-results" id="noResults">
      <div class="no-results-icon">🔍</div>
      <div class="no-results-text" id="noResultsText">Sonuç bulunamadı</div>
    </div>
  </div>
</div>

<button class="scroll-top" id="scrollTop" aria-label="Yukarı çık">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 15l-6-6-6 6"/></svg>
</button>

<script>
const i18n={
  tr:{title:"Türkiye'nin <em>Manzaralı</em> Yerleri",subtitle:'81 ilin en güzel noktalarını keşfet <span>✦</span>',search:'İl ara...',world:'Dünya',provinces:'İl',regions:'Bölge',noResults:'Sonuç bulunamadı'},
  en:{title:"Scenic Places of <em>Türkiye</em>",subtitle:'Discover the most beautiful spots of 81 provinces <span>✦</span>',search:'Search province...',world:'World',provinces:'Provinces',regions:'Regions',noResults:'No results found'}
};
const cities=[
  ['antalya','Antalya'],['adana','Adana'],['adiyaman','Adıyaman'],['afyon','Afyonkarahisar'],['agri','Ağrı'],['aksaray','Aksaray'],['amasya','Amasya'],['ankara','Ankara'],['ardahan','Ardahan'],['artvin','Artvin'],['aydin','Aydın'],['balikesir','Balıkesir'],['bartin','Bartın'],['batman','Batman'],['bayburt','Bayburt'],['bilecik','Bilecik'],['bingol','Bingöl'],['bitlis','Bitlis'],['bolu','Bolu'],['burdur','Burdur'],['bursa','Bursa'],['canakkale','Çanakkale'],['cankiri','Çankırı'],['corum','Çorum'],['denizli','Denizli'],['diyarbakir','Diyarbakır'],['duzce','Düzce'],['edirne','Edirne'],['elazig','Elazığ'],['erzincan','Erzincan'],['erzurum','Erzurum'],['eskisehir','Eskişehir'],['gaziantep','Gaziantep'],['giresun','Giresun'],['gumushane','Gümüşhane'],['hakkari','Hakkari'],['hatay','Hatay'],['igdir','Iğdır'],['isparta','Isparta'],['istanbul','İstanbul'],['izmir','İzmir'],['kahramanmaras','Kahramanmaraş'],['karabuk','Karabük'],['karaman','Karaman'],['kars','Kars'],['kastamonu','Kastamonu'],['kayseri','Kayseri'],['kilis','Kilis'],['kirikkale','Kırıkkale'],['kirklareli','Kırklareli'],['kirsehir','Kırşehir'],['kocaeli','Kocaeli'],['konya','Konya'],['kutahya','Kütahya'],['malatya','Malatya'],['manisa','Manisa'],['mardin','Mardin'],['mersin','Mersin'],['mugla','Muğla'],['mus','Muş'],['nevsehir','Nevşehir'],['nigde','Niğde'],['ordu','Ordu'],['osmaniye','Osmaniye'],['rize','Rize'],['sakarya','Sakarya'],['samsun','Samsun'],['sanliurfa','Şanlıurfa'],['siirt','Siirt'],['sinop','Sinop'],['sirnak','Şırnak'],['sivas','Sivas'],['tekirdag','Tekirdağ'],['tokat','Tokat'],['trabzon','Trabzon'],['tunceli','Tunceli'],['usak','Uşak'],['van','Van'],['yalova','Yalova'],['yozgat','Yozgat'],['zonguldak','Zonguldak']
];
const enNames={istanbul:'Istanbul',izmir:'Izmir',canakkale:'Canakkale',eskisehir:'Eskisehir',diyarbakir:'Diyarbakir',sanliurfa:'Sanliurfa',kahramanmaras:'Kahramanmaras',afyon:'Afyonkarahisar',mugla:'Mugla',nevsehir:'Nevsehir',gumushane:'Gumushane',kirikkale:'Kirikkale',kirklareli:'Kirklareli',kirsehir:'Kirsehir',kutahya:'Kutahya',sirnak:'Sirnak',tekirdag:'Tekirdag'};
const norm=t=>t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[çğıöşü]/g,c=>({'ç':'c','ğ':'g','ı':'i','ö':'o','ş':'s','ü':'u'}[c]||c));
let currentLang='tr';
function detectLang(){const s=localStorage.getItem('lang81');if(s&&(s==='tr'||s==='en'))return s;return navigator.language.toLowerCase().startsWith('tr')?'tr':'en'}
function getCityName(slug,orig){return currentLang==='tr'?orig:(enNames[slug]||orig)}
function setLang(code){
  currentLang=code;const t=i18n[code];
  document.getElementById('title').innerHTML=t.title;
  document.getElementById('subtitle').innerHTML=t.subtitle;
  document.getElementById('search').placeholder=t.search;
  document.getElementById('worldText').textContent=t.world;
  document.getElementById('statProvinces').textContent=t.provinces;
  document.getElementById('statRegions').textContent=t.regions;
  document.getElementById('noResultsText').textContent=t.noResults;
  document.documentElement.lang=code;localStorage.setItem('lang81',code);
  document.querySelectorAll('#langToggle button').forEach(b=>b.classList.toggle('active',b.dataset.lang===code));
  document.querySelectorAll('.card:not(.no-results)').forEach(c=>{
    const s=c.dataset.slug,o=c.dataset.orig;if(!s)return;
    const n=getCityName(s,o);
    c.querySelector('.city-code').textContent=n.substring(0,2).toUpperCase();
    c.querySelector('.city-name').textContent=n;c.dataset.search=n;
  });filterCards();
}
function filterCards(){
  const v=norm(document.getElementById('search').value);let vis=0;
  document.querySelectorAll('.card:not(#noResults)').forEach(c=>{
    const show=!v||norm(c.dataset.search||'').includes(v);
    c.style.display=show?'':'none';if(show)vis++;
  });
  document.getElementById('noResults').style.display=vis===0?'flex':'none';
}
document.addEventListener('DOMContentLoaded',()=>{
  const grid=document.getElementById('grid');
  cities.forEach(([slug,name],i)=>{
    const card=document.createElement('div');
    card.className='card';card.dataset.slug=slug;card.dataset.orig=name;card.dataset.search=name;
    card.style.animationDelay=`${Math.min(i*10,400)}ms`;
    const dn=getCityName(slug,name);
    card.innerHTML=`<div class="city-code">${dn.substring(0,2).toUpperCase()}</div><div class="city-name">${dn}</div>`;
    card.onclick=()=>location.href=`${slug}.html`;grid.appendChild(card);
  });
  document.querySelectorAll('#langToggle button').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));
  document.getElementById('search').addEventListener('input',filterCards);
  const sb=document.getElementById('scrollTop');let st=false;
  window.addEventListener('scroll',()=>{if(!st){requestAnimationFrame(()=>{sb.classList.toggle('visible',window.scrollY>300);st=false});st=true}});
  sb.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  setLang(detectLang());
});
</script>
</body>
</html>
