<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept W · Bento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0a0d;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#0a0a0d;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);}
.bar{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 4px;}
.logo{font-weight:800;font-size:20px;}.logo b{color:#ffcf6b;}
.intro{padding:6px 18px 12px;}
.intro .kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf6b;font-weight:700;}
.intro h1{font-size:clamp(2rem,8vw,2.6rem);font-weight:800;letter-spacing:-.02em;line-height:1;margin-top:8px;}
.intro p{color:#8a93a3;font-size:13px;margin-top:8px;}
.bento{display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:118px;gap:8px;padding:12px 14px 54px;}
.t{position:relative;border-radius:16px;overflow:hidden;cursor:pointer;background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:flex-end;padding:13px;}
.t .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.76;}
.t::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,0) 40%,rgba(0,0,0,.85));}
.t>*{position:relative;z-index:2;}
.t .rg{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;opacity:.85;margin-bottom:3px;}
.t h3{font-size:1.04rem;font-weight:800;line-height:1;text-shadow:0 1px 8px rgba(0,0,0,.6);}
.t.big{grid-column:span 2;grid-row:span 2;}
.t.big h3{font-size:1.9rem;}
.t.tall{grid-row:span 2;}
.t.tall h3{font-size:1.25rem;}
.t.wide{grid-column:span 2;}
.t:active{transform:scale(.97);}
.t .pl{position:absolute;top:10px;left:11px;z-index:2;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);border-radius:6px;padding:2px 7px;font-size:10px;font-weight:800;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="bar"><div class="logo">TR<b>81</b></div></div>
  <div class="intro"><div class="kx">A curated board</div><h1>Türkiye, arranged.</h1><p>Big tiles, small tiles — tap any province.</p></div>
  <div class="bento" id="bento"></div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
// size pattern repeats: big(2x2), then singles/tall/wide mix
const SIZES=['big','','','tall','','wide','','','big','','tall','','','wide','',''];
const P=[[34,'istanbul','İstanbul','marmara'],[7,'antalya','Antalya','medit'],[50,'nevsehir','Cappadocia','central'],[47,'mardin','Mardin','southeast'],[61,'trabzon','Trabzon','black'],[48,'mugla','Muğla','aegean'],[35,'izmir','İzmir','aegean'],[65,'van','Van','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[53,'rize','Rize','black'],[25,'erzurum','Erzurum','east'],[16,'bursa','Bursa','marmara'],[38,'kayseri','Kayseri','central'],[6,'ankara','Ankara','central'],[31,'hatay','Hatay','medit'],[8,'artvin','Artvin','black']];
const bento=document.getElementById('bento');
P.forEach((p,i)=>{const[n,slug,name,rk]=p;const a=document.createElement('a');a.href=slug+'.html';a.className='t '+(SIZES[i%SIZES.length]||'');
  a.style.backgroundImage=`url('${IMG[n%2]}')`;
  a.innerHTML=`<div class="tint" style="background:${REG[rk][1]}"></div><span class="pl">${String(n).padStart(2,'0')}</span><div><div class="rg">${REG[rk][0]}</div><h3>${name}</h3></div>`;
  bento.appendChild(a);});
</script>
</body>
</html>
