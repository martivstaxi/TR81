<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Dünya · Spotlight — TR81</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:560px;margin:0 auto;min-height:100vh;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 4px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.back svg{width:20px;height:20px;}

.intro{padding:8px 22px 4px;}
.intro .kick{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(2.6rem,12vw,3.8rem);line-height:.9;margin-top:8px;}

/* spotlight */
.spot{margin:16px 16px 6px;border-radius:22px;overflow:hidden;position:relative;background:
  radial-gradient(120% 120% at 80% 0%,rgba(227,197,144,.22),transparent 60%),
  linear-gradient(160deg,#1b1c24,#0c0d12);border:1px solid rgba(227,197,144,.25);padding:22px 22px 20px;}
.spot .lab{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.spot .row{display:flex;align-items:center;gap:16px;margin-top:14px;}
.spot .fl{width:80px;height:60px;border-radius:10px;overflow:hidden;flex:none;box-shadow:0 8px 22px rgba(0,0,0,.5);background:#15161d;display:flex;align-items:center;justify-content:center;}
.spot .fl img{width:100%;height:100%;object-fit:cover;}
.spot .fl .em{font-size:42px;display:none;}.spot .fl.emoji img{display:none;}.spot .fl.emoji .em{display:block;}
.spot .nm{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;line-height:.95;letter-spacing:.02em;}
.spot .free{display:inline-block;margin-top:7px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#1a1407;background:var(--gold);padding:3px 9px;border-radius:999px;}
.spot .go{margin-top:18px;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--gold);color:#1a1407;font-weight:700;font-size:14px;padding:13px;border-radius:13px;}
.spot .go svg{width:16px;height:16px;}

.searchwrap{padding:14px 16px 2px;position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#08080b 75%,transparent);}
.search{position:relative;}
.search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:14px 46px 14px 18px;color:#fff;font-size:15px;font-family:inherit;}
.search input::placeholder{color:rgba(255,255,255,.45);}
.search input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.09);}
.search svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,.5);}

.lab2{padding:14px 22px 8px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9aa4b2;font-weight:700;}
.list{padding:0 12px max(34px,env(safe-area-inset-bottom));}
.item{display:flex;align-items:center;gap:14px;padding:11px 12px;border-radius:14px;transition:background .15s;}
.item:hover{background:rgba(255,255,255,.05);}
.item+.item{border-top:1px solid rgba(255,255,255,.05);}
.item .fl{width:44px;height:33px;border-radius:6px;overflow:hidden;flex:none;box-shadow:0 3px 9px rgba(0,0,0,.4);background:#15161d;display:flex;align-items:center;justify-content:center;}
.item .fl img{width:100%;height:100%;object-fit:cover;}
.item .fl .em{font-size:24px;display:none;}.item .fl.emoji img{display:none;}.item .fl.emoji .em{display:block;}
.item .nm{flex:1;font-size:15px;font-weight:500;color:#e9edf2;}
.item .ft{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);}
.item .ar{width:18px;height:18px;color:rgba(255,255,255,.35);flex:none;}
.empty{display:none;text-align:center;color:#6b7280;padding:50px 0;font-size:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
  </div>
  <div class="intro">
    <div class="kick" id="kick"></div>
    <h1 id="h1"></h1>
  </div>

  <a class="spot" id="spot" href="#"></a>

  <div class="searchwrap">
    <div class="search">
      <input id="q" type="text" autocomplete="off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
  </div>
  <div class="lab2" id="lab2"></div>
  <div class="list" id="list"></div>
  <div class="empty" id="empty"></div>
</div>

<script src="worlddata.js"></script>
<script>
const W=window.WORLD,t=W.t;
document.getElementById('kick').textContent=t.kick;
document.getElementById('h1').textContent=t.title;
document.getElementById('q').placeholder=t.search;
document.getElementById('lab2').textContent=t.all;

/* spotlight = Türkiye (ücretsiz) */
const sp=W.list.find(c=>c.free)||W.list[0];
const spot=document.getElementById('spot');spot.href=sp.href;
spot.innerHTML=`<div class="lab">${t.spotlight}</div>
  <div class="row">
    <div class="fl"><img src="${sp.flag}" alt="" onerror="this.parentNode.classList.add('emoji')"><span class="em">${sp.emoji}</span></div>
    <div><div class="nm">${sp.name}</div>${sp.free?`<span class="free">${t.free}</span>`:''}</div>
  </div>
  <div class="go">${t.open} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>`;

const list=document.getElementById('list');
const AR='<svg class="ar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';
W.list.filter(c=>!c.free).slice().sort((a,b)=>a.name.localeCompare(b.name,W.lang)).forEach(c=>{
  const a=document.createElement('a');a.href=c.href;a.className='item';a.dataset.s=W.norm(c.name+' '+c.slug);
  a.innerHTML=`<div class="fl"><img src="${c.flag}" alt="" loading="lazy" onerror="this.parentNode.classList.add('emoji')"><span class="em">${c.emoji}</span></div>
    <div class="nm">${c.name}</div>${AR}`;
  list.appendChild(a);
});
const empty=document.getElementById('empty');empty.textContent=t.empty;
document.getElementById('q').addEventListener('input',e=>{
  const v=W.norm(e.target.value);let n=0;
  list.querySelectorAll('.item').forEach(c=>{const m=c.dataset.s.includes(v);c.style.display=m?'':'none';if(m)n++;});
  empty.style.display=n?'none':'block';
});
</script>
</body>
</html>
