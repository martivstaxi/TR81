<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept L · Parallax</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;background:#000;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);
  scroll-snap-type:y mandatory;height:100vh;height:100dvh;overflow-y:scroll;scrollbar-width:none;}
.app::-webkit-scrollbar{display:none;}
.bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;pointer-events:none;}
.logo{font-weight:800;font-size:19px;text-shadow:0 1px 10px rgba(0,0,0,.6);}.logo b{color:#ffcf6b;}
.cnt{font-size:12px;font-weight:700;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);padding:5px 11px;border-radius:999px;}
/* intro panel */
.panel{position:relative;height:100vh;height:100dvh;scroll-snap-align:start;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 26px 13vh;}
.layer{position:absolute;inset:-12% 0;background-size:cover;background-position:center;will-change:transform;}
.tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.45;}
.panel::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 30%,rgba(0,0,0,.15) 55%,rgba(0,0,0,.97) 100%);}
.panel>.c{position:relative;z-index:3;}
.kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf6b;font-weight:700;margin-bottom:12px;will-change:transform;}
.num{font-size:13px;font-weight:700;color:rgba(255,255,255,.55);margin-bottom:6px;}
.panel h2{font-size:clamp(3.2rem,17vw,5.4rem);font-weight:800;line-height:.9;letter-spacing:-.025em;text-shadow:0 3px 30px rgba(0,0,0,.55);will-change:transform;}
.panel p{margin-top:14px;color:rgba(255,255,255,.84);font-size:14px;max-width:300px;line-height:1.5;}
.panel a.go{display:inline-flex;align-items:center;gap:8px;margin-top:20px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 24px;border-radius:12px;}
.intro{justify-content:center;text-align:center;align-items:center;}
.intro h1{font-size:clamp(2.6rem,12vw,4rem);font-weight:800;line-height:.98;letter-spacing:-.02em;}
.intro p{margin:16px auto 0;}
.scrolltip{position:absolute;bottom:34px;left:0;right:0;text-align:center;color:rgba(255,255,255,.6);font-size:12px;letter-spacing:.1em;animation:bob 1.8s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
.end{justify-content:center;text-align:center;align-items:center;background:#06070b;}
.end h2{font-size:clamp(2rem,9vw,2.8rem);}
.end a{display:inline-block;margin-top:20px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="bar"><div class="logo">TR<b>81</b></div><div class="cnt" id="cnt">scroll ↓</div></div>
<div class="app" id="app">
  <section class="panel intro">
    <div class="layer" data-speed="0.2" style="background-image:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public')"></div>
    <div class="tint" style="background:#1e3a8a"></div>
    <div class="c">
      <div class="kx">A scroll through Türkiye</div>
      <h1>81 provinces.<br>One long view.</h1>
      <p>Keep scrolling. Each screen is a place worth standing still for.</p>
    </div>
    <div class="scrolltip">↓ scroll to begin</div>
  </section>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[7,'antalya','Antalya','medit','Turquoise coast — beaches, canyons and waterfalls.'],[34,'istanbul','İstanbul','marmara','Two continents meeting on one shimmering strait.'],[50,'nevsehir','Cappadocia','central','Fairy chimneys and a sky full of balloons.'],[47,'mardin','Mardin','southeast','Honey-coloured stone above the Mesopotamian plain.'],[61,'trabzon','Trabzon','black','Misty green peaks tumbling to the Black Sea.'],[65,'van','Van','east','A turquoise sea-lake high in the eastern mountains.'],[48,'mugla','Muğla','aegean','The bluest bays of the Aegean — Bodrum to Marmaris.'],[35,'izmir','İzmir','aegean','Aegean light, ancient ruins and a long sea promenade.'],[63,'sanliurfa','Şanlıurfa','southeast','Cradle of civilisation — the land of Göbeklitepe.'],[53,'rize','Rize','black','Tea terraces wrapped in mountain cloud.']];
const app=document.getElementById('app'),cnt=document.getElementById('cnt');
P.forEach((p,i)=>{const[n,slug,name,rk,desc]=p;const s=document.createElement('section');s.className='panel';
  s.innerHTML=`<div class="layer" data-speed="0.25" style="background-image:url('${IMG[n%2]}')"></div><div class="tint" style="background:${REG[rk][1]}"></div>
  <div class="c"><div class="num">${String(i+1).padStart(2,'0')} / ${P.length}</div><div class="kx">${REG[rk][0]}</div><h2>${name}</h2><p>${desc}</p><a class="go" href="${slug}.html">▶ Explore ${name}</a></div>`;
  app.appendChild(s);});
const end=document.createElement('section');end.className='panel end';
end.innerHTML=`<div class="c"><div class="kx">…and 71 more</div><h2>See all 81</h2><a href="#" onclick="return false">Browse every province →</a></div>`;
app.appendChild(end);
const panels=Array.from(app.querySelectorAll('.panel'));
let ticking=false;
app.addEventListener('scroll',()=>{if(ticking)return;ticking=true;requestAnimationFrame(()=>{
  const vh=app.clientHeight;
  panels.forEach(pn=>{const r=pn.getBoundingClientRect();const layer=pn.querySelector('.layer');
    if(r.bottom>0&&r.top<vh){const prog=(r.top)/vh; // -1..1
      const sp=parseFloat(layer.dataset.speed||0.25);layer.style.transform=`translateY(${prog*vh*sp}px)`;
      const c=pn.querySelector('.c');if(c)c.style.transform=`translateY(${prog*vh*0.12}px)`;c&&(c.style.opacity=1-Math.min(Math.abs(prog)*1.1,.85));}});
  const idx=Math.round(app.scrollTop/vh);cnt.textContent=idx===0?'scroll ↓':`${Math.min(idx,P.length)} / ${P.length}`;
  ticking=false;});});
</script>
</body>
</html>
