<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Muğla — TR81 · H</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:560px;margin:0 auto;min-height:100vh;background:#08080b;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 6px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;}
.back svg{width:20px;height:20px;}
.top .ttl{flex:1;}
.top .ttl .kick{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.top .ttl h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:2.2rem;letter-spacing:.03em;line-height:1;margin-top:2px;}
.free{display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.5);border:1px solid rgba(227,197,144,.6);color:var(--gold);font-weight:700;font-size:12px;padding:7px 12px;border-radius:999px;}
.free svg{width:14px;height:14px;}

/* segmented chips */
.tabs{display:flex;gap:8px;overflow-x:auto;padding:14px 20px 4px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.chip{flex:none;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);color:rgba(255,255,255,.8);font-weight:600;font-size:14px;padding:10px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.2s;}
.chip.on{background:var(--gold);color:#1a1407;border-color:var(--gold);}

/* viewer */
.view{padding:14px 20px 8px;}
.bigwrap{position:relative;border-radius:22px;overflow:hidden;aspect-ratio:4/3;background:#15161d;box-shadow:0 22px 48px rgba(0,0,0,.55);}
.bigwrap img{width:100%;height:100%;object-fit:cover;}
.bigwrap::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 55%,rgba(0,0,0,.7));pointer-events:none;}
.bigwrap .cnm{position:absolute;left:18px;bottom:16px;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;letter-spacing:.02em;text-shadow:0 2px 14px rgba(0,0,0,.7);}
.strip{display:flex;gap:8px;margin-top:10px;}
.strip .t{flex:1;aspect-ratio:1.3;border-radius:12px;overflow:hidden;cursor:pointer;border:2px solid transparent;}
.strip .t.on{border-color:var(--gold);}
.strip .t img{width:100%;height:100%;object-fit:cover;}
.maps{margin-top:14px;display:flex;align-items:center;justify-content:center;gap:9px;background:var(--gold);color:#1a1407;font-weight:700;font-size:15px;padding:15px;border-radius:14px;}
.maps svg{width:17px;height:17px;}

/* unlock CTA */
.cta{margin:20px;background:linear-gradient(135deg,#181922,#0b0c11);border:1px solid rgba(227,197,144,.35);border-radius:22px;padding:24px;text-align:center;}
.cta h3{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.02em;}
.cta p{color:#9aa4b2;font-size:.92rem;line-height:1.5;margin:8px 0 16px;}
.cta a{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid rgba(227,197,144,.6);color:var(--gold);font-weight:700;font-size:15px;padding:14px 26px;border-radius:14px;}
.cta a svg{width:16px;height:16px;}
.ft{text-align:center;padding:4px 0 max(30px,env(safe-area-inset-bottom));color:#5a606c;font-size:11px;letter-spacing:.28em;text-transform:uppercase;font-weight:600;}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="ttl"><div class="kick">Ege • Türkiye</div><h1>Muğla</h1></div>
    <span class="free"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"/></svg><span id="freeTxt"></span></span>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="view">
    <div class="bigwrap"><img id="big" src="" alt=""><div class="cnm" id="cnm"></div></div>
    <div class="strip" id="strip"></div>
    <a class="maps" id="maps" href="#" target="_blank" rel="noopener"></a>
  </div>

  <div class="cta">
    <h3 id="ctaH"></h3>
    <p id="ctaP"></p>
    <a href="index.html" id="ctaB"></a>
  </div>
  <div class="ft">tr81.tr</div>
</div>

<script>
const LANG=(navigator.language||'tr').toLowerCase().startsWith('tr')?'tr':'en';
const TX=LANG==='tr'
  ?{free:'Ücretsiz',maps:'Yol tarifi',ctaH:'Bu sadece 1 il',ctaP:'Muğla ücretsiz. Tek kodla diğer 80 ilin tüm manzaralı konumlarını da aç.',ctaB:'81 İl Kilidini Aç'}
  :{free:'Free',maps:'Directions',ctaH:'This is just 1 province',ctaP:'Muğla is free. Unlock the scenic locations of the other 80 provinces with one code.',ctaB:'Unlock all 81'};
const CDN='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/';
const img=id=>CDN+id+'/public';
const LOCS=[
  {name:'İztuzu Manzara Noktası',short:'İztuzu',map:'https://www.google.com/maps/place/Iztuzu+View+Point/@36.7682289,28.6117555,13.83z',photos:['mugla_iztuzu_manzara_noktasi_1','mugla_iztuzu_manzara_noktasi_2','mugla_iztuzu_manzara_noktasi_3']},
  {name:'Kelebekler Vadisi',short:'Kelebekler',map:'https://maps.google.com/?q=Kelebekler+Vadisi%2C+Mu%C4%9Fla',photos:['mugla_kelebekler_vadisi_1','mugla_kelebekler_vadisi_2','mugla_kelebekler_vadisi_3']},
  {name:'Ölüdeniz',short:'Ölüdeniz',map:'https://maps.google.com/?q=%C3%96l%C3%BCdeniz%2C+Mu%C4%9Fla',photos:['mugla_oludeniz_1','mugla_oludeniz_2','mugla_oludeniz_3']},
  {name:'Montana Seyir Tepesi',short:'Montana',map:'https://www.google.com/maps/place/Montana+Seyir+Tepesi/@36.5454469,29.133872,17z',photos:['mugla_montana_seyir_tepesi_1','mugla_montana_seyir_tepesi_2','mugla_montana_seyir_tepesi_3']}
];
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const LOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/><path d="M8 10.5V7.2A4 4 0 0 1 16 7.2v3.3"/></svg>';
document.getElementById('freeTxt').textContent=TX.free;
document.getElementById('ctaH').textContent=TX.ctaH;
document.getElementById('ctaP').textContent=TX.ctaP;
document.getElementById('ctaB').innerHTML=LOCK+'<span>'+TX.ctaB+'</span>';

const tabs=document.getElementById('tabs'),big=document.getElementById('big'),cnm=document.getElementById('cnm'),strip=document.getElementById('strip'),mapsBtn=document.getElementById('maps');
let li=0,pi=0;
LOCS.forEach((loc,i)=>{
  const c=document.createElement('div');c.className='chip'+(i===0?' on':'');c.textContent=loc.short;c.dataset.i=i;
  c.onclick=()=>selectLoc(i);tabs.appendChild(c);
});
function selectLoc(i){li=i;pi=0;[...tabs.children].forEach((c,k)=>c.classList.toggle('on',k===i));render();}
function selectPhoto(p){pi=p;render();}
function render(){
  const loc=LOCS[li];big.src=img(loc.photos[pi]);big.alt=loc.name;cnm.textContent=loc.name;
  mapsBtn.href=loc.map;mapsBtn.innerHTML=PIN+'<span>'+TX.maps+'</span>';
  strip.innerHTML=loc.photos.map((p,k)=>`<div class="t${k===pi?' on':''}" data-p="${k}"><img src="${img(p)}" alt="" loading="lazy"></div>`).join('');
}
strip.addEventListener('click',e=>{const t=e.target.closest('.t');if(t)selectPhoto(+t.dataset.p);});
render();
</script>
</body>
</html>
