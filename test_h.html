<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept H · Mosaic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#000;box-shadow:0 0 60px rgba(0,0,0,.6);}
.bar{position:sticky;top:0;z-index:40;background:rgba(0,0,0,.7);backdrop-filter:blur(12px);padding:16px 16px 12px;border-bottom:1px solid rgba(255,255,255,.07);}
.bar .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.bar h1{font-size:19px;font-weight:800;letter-spacing:-.01em;}
.bar h1 b{color:#e7c98a;}
.bar .ct{font-size:12px;color:#8a8f9c;font-weight:600;}
.search{position:relative;}
.search input{width:100%;border:0;background:#141418;border-radius:11px;padding:12px 12px 12px 40px;font-size:15px;font-family:inherit;color:#fff;}
.search input::placeholder{color:#6b6f7a;}
.search input:focus{outline:1px solid #333;}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#6b6f7a;}
.mosaic{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px;}
.cell{position:relative;aspect-ratio:3/4;overflow:hidden;cursor:pointer;background-size:cover;background-position:center;}
.cell .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.8;}
.cell::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,.82));}
.cell .pl{position:absolute;top:7px;left:7px;z-index:3;font-size:11px;font-weight:800;color:rgba(255,255,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.8);}
.cell .nm{position:absolute;left:8px;right:8px;bottom:8px;z-index:3;font-size:.85rem;font-weight:700;line-height:1.05;text-shadow:0 1px 6px rgba(0,0,0,.7);}
.cell:active{opacity:.7;}
.empty{display:none;text-align:center;color:#6b6f7a;padding:50px 0;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="bar">
    <div class="top"><h1>TR<b>81</b> · Türkiye</h1><span class="ct" id="ct">81 provinces</span></div>
    <div class="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input id="q" type="text" placeholder="Search a province…"></div>
  </div>
  <div class="mosaic" id="mosaic"></div>
  <div class="empty" id="empty">No province found.</div>
</div>
<script>
const COL={marmara:'#2563eb',aegean:'#0891b2',medit:'#0f9d8f',central:'#d97706',black:'#16a34a',east:'#7c3aed',southeast:'#db2777'};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyonkarahisar','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','Kahramanmaraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const mos=document.getElementById('mosaic'),ct=document.getElementById('ct'),empty=document.getElementById('empty');
P.forEach(([n,slug,name,rk])=>{const a=document.createElement('a');a.href=slug+'.html';a.className='cell';a.dataset.s=norm(name);a.style.backgroundImage=`url('${IMG[n%2]}')`;
  a.innerHTML=`<div class="tint" style="background:${COL[rk]}"></div><span class="pl">${String(n).padStart(2,'0')}</span><span class="nm">${name}</span>`;mos.appendChild(a);});
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);let s=0;document.querySelectorAll('.cell').forEach(c=>{const vis=!v||c.dataset.s.includes(v);c.style.display=vis?'':'none';if(vis)s++;});ct.textContent=s+(s===1?' province':' provinces');empty.style.display=s?'none':'block';});
</script>
</body>
</html>
