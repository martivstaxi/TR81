<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept E · Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;}
.back{position:fixed;top:14px;left:14px;z-index:90;color:rgba(255,255,255,.6);font-size:12px;font-weight:500;}
.stage{max-width:440px;height:100vh;height:100dvh;margin:0 auto;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.6);}
.bg{position:absolute;inset:0;background:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public') center/cover;transform:scale(1.08);animation:drift 24s ease-in-out infinite alternate;}
@keyframes drift{from{transform:scale(1.08)}to{transform:scale(1.18) translateY(-2%)}}
.bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(0,0,0,0) 40%,rgba(0,0,0,.85));}
.hero{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 30px;}
.hero .mark{font-size:12px;letter-spacing:.45em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:18px;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(4.5rem,24vw,8rem);line-height:.86;text-shadow:0 2px 30px rgba(0,0,0,.55);}
.hero .sub{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-top:10px;}
.hero .browse{margin-top:34px;display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(255,255,255,.55);color:#fff;font-weight:500;font-size:14px;letter-spacing:.05em;padding:14px 30px;border-radius:999px;cursor:pointer;transition:.2s;background:rgba(255,255,255,.06);backdrop-filter:blur(4px);}
.hero .browse:active{background:rgba(255,255,255,.18);}
/* overlay list */
.sheet{position:absolute;inset:0;z-index:5;background:rgba(8,8,8,.97);backdrop-filter:blur(10px);transform:translateY(100%);transition:transform .4s cubic-bezier(.2,.7,.3,1);display:flex;flex-direction:column;}
.sheet.open{transform:translateY(0);}
.sh-top{display:flex;align-items:center;gap:14px;padding:22px 24px 12px;}
.sh-top .ttl{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;flex:1;letter-spacing:.03em;}
.sh-top .close{font-size:24px;color:rgba(255,255,255,.7);cursor:pointer;line-height:1;}
.sh-search{margin:0 24px 6px;}
.sh-search input{width:100%;background:transparent;border:0;border-bottom:1px solid rgba(255,255,255,.3);padding:10px 2px;color:#fff;font-size:16px;font-family:inherit;}
.sh-search input:focus{outline:none;border-color:#fff;}
.sh-search input::placeholder{color:rgba(255,255,255,.4);}
.sh-list{flex:1;overflow-y:auto;padding:8px 24px 40px;scrollbar-width:none;}
.sh-list::-webkit-scrollbar{display:none;}
.row{display:flex;align-items:baseline;gap:16px;padding:15px 2px;color:#fff;border-bottom:1px solid rgba(255,255,255,.07);}
.row .no{font-family:'Bebas Neue';color:rgba(255,255,255,.4);min-width:30px;}
.row .nm{font-size:1.12rem;font-weight:300;flex:1;}
.row:active{opacity:.55;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="stage">
  <div class="bg"></div>
  <div class="hero">
    <div class="mark">TR 81</div>
    <h1>Türkiye</h1>
    <div class="sub">81 provinces · endless views</div>
    <div class="browse" id="open">Browse provinces →</div>
  </div>
  <div class="sheet" id="sheet">
    <div class="sh-top"><span class="ttl">All Provinces</span><span class="close" id="close">✕</span></div>
    <div class="sh-search"><input id="q" type="text" placeholder="Search…" autocomplete="off"></div>
    <div class="sh-list" id="list"></div>
  </div>
</div>
<script>
const P=[[1,'adana','Adana'],[2,'adiyaman','Adıyaman'],[3,'afyon','Afyonkarahisar'],[4,'agri','Ağrı'],[5,'amasya','Amasya'],[6,'ankara','Ankara'],[7,'antalya','Antalya'],[8,'artvin','Artvin'],[9,'aydin','Aydın'],[10,'balikesir','Balıkesir'],[11,'bilecik','Bilecik'],[12,'bingol','Bingöl'],[13,'bitlis','Bitlis'],[14,'bolu','Bolu'],[15,'burdur','Burdur'],[16,'bursa','Bursa'],[17,'canakkale','Çanakkale'],[18,'cankiri','Çankırı'],[19,'corum','Çorum'],[20,'denizli','Denizli'],[21,'diyarbakir','Diyarbakır'],[22,'edirne','Edirne'],[23,'elazig','Elazığ'],[24,'erzincan','Erzincan'],[25,'erzurum','Erzurum'],[26,'eskisehir','Eskişehir'],[27,'gaziantep','Gaziantep'],[28,'giresun','Giresun'],[29,'gumushane','Gümüşhane'],[30,'hakkari','Hakkari'],[31,'hatay','Hatay'],[32,'isparta','Isparta'],[33,'mersin','Mersin'],[34,'istanbul','İstanbul'],[35,'izmir','İzmir'],[36,'kars','Kars'],[37,'kastamonu','Kastamonu'],[38,'kayseri','Kayseri'],[39,'kirklareli','Kırklareli'],[40,'kirsehir','Kırşehir'],[41,'kocaeli','Kocaeli'],[42,'konya','Konya'],[43,'kutahya','Kütahya'],[44,'malatya','Malatya'],[45,'manisa','Manisa'],[46,'kahramanmaras','Kahramanmaraş'],[47,'mardin','Mardin'],[48,'mugla','Muğla'],[49,'mus','Muş'],[50,'nevsehir','Nevşehir'],[51,'nigde','Niğde'],[52,'ordu','Ordu'],[53,'rize','Rize'],[54,'sakarya','Sakarya'],[55,'samsun','Samsun'],[56,'siirt','Siirt'],[57,'sinop','Sinop'],[58,'sivas','Sivas'],[59,'tekirdag','Tekirdağ'],[60,'tokat','Tokat'],[61,'trabzon','Trabzon'],[62,'tunceli','Tunceli'],[63,'sanliurfa','Şanlıurfa'],[64,'usak','Uşak'],[65,'van','Van'],[66,'yozgat','Yozgat'],[67,'zonguldak','Zonguldak'],[68,'aksaray','Aksaray'],[69,'bayburt','Bayburt'],[70,'karaman','Karaman'],[71,'kirikkale','Kırıkkale'],[72,'batman','Batman'],[73,'sirnak','Şırnak'],[74,'bartin','Bartın'],[75,'ardahan','Ardahan'],[76,'igdir','Iğdır'],[77,'yalova','Yalova'],[78,'karabuk','Karabük'],[79,'kilis','Kilis'],[80,'osmaniye','Osmaniye'],[81,'duzce','Düzce']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const list=document.getElementById('list'),sheet=document.getElementById('sheet');
P.forEach(([n,slug,name])=>{const a=document.createElement('a');a.href=slug+'.html';a.className='row';a.dataset.s=norm(name);a.innerHTML=`<span class="no">${String(n).padStart(2,'0')}</span><span class="nm">${name}</span>`;list.appendChild(a);});
document.getElementById('open').onclick=()=>{sheet.classList.add('open');setTimeout(()=>document.getElementById('q').focus(),300);};
document.getElementById('close').onclick=()=>sheet.classList.remove('open');
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);document.querySelectorAll('.row').forEach(r=>r.style.display=r.dataset.s.includes(v)?'':'none');});
</script>
</body>
</html>
