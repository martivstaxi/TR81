<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Muğla — TR81 · E</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#c79a3a;--ink:#272524;--soft:#6b6760;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#f3efe6;color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}
a{color:inherit;}
.app{max-width:560px;margin:0 auto;min-height:100vh;background:#f3efe6;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 8px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:#fff;border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:center;color:var(--ink);text-decoration:none;box-shadow:0 4px 12px rgba(0,0,0,.05);}
.back svg{width:20px;height:20px;}
.top .ttl{flex:1;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.04em;}
.freechip{display:inline-flex;align-items:center;gap:6px;background:#e8f5e9;color:#2e7d32;font-weight:700;font-size:12px;padding:7px 12px;border-radius:999px;}
.freechip svg{width:14px;height:14px;}

.intro{padding:10px 20px 6px;}
.intro .kick{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3rem,15vw,4.4rem);line-height:.9;}
.intro p{margin-top:8px;color:var(--soft);font-size:1rem;line-height:1.5;}

main{padding:18px 20px 10px;display:flex;flex-direction:column;gap:22px;}
.pc{background:#fff;border-radius:22px;overflow:hidden;box-shadow:0 12px 30px rgba(0,0,0,.08);}
.pc .hero{display:block;width:100%;aspect-ratio:16/10;object-fit:cover;}
.pc .body{padding:16px 18px 18px;}
.pc h2{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.02em;line-height:1;}
.pc .sub{color:var(--soft);font-size:.85rem;margin-top:4px;}
.thumbs{display:flex;gap:8px;overflow-x:auto;margin-top:12px;scrollbar-width:none;}
.thumbs::-webkit-scrollbar{display:none;}
.thumbs a{flex:none;width:84px;height:64px;border-radius:10px;overflow:hidden;}
.thumbs img{width:100%;height:100%;object-fit:cover;}
.maps{margin-top:14px;display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;font-weight:600;font-size:14px;padding:12px 18px;border-radius:12px;text-decoration:none;}
.maps svg{width:16px;height:16px;}

/* unlock CTA */
.cta{margin:14px 20px max(34px,env(safe-area-inset-bottom));background:linear-gradient(135deg,#f7e9c6,#efd9a0);border:1px solid rgba(199,154,58,.5);border-radius:22px;padding:22px;text-align:center;}
.cta h3{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.02em;color:#5a4410;}
.cta p{color:#7a5f1c;font-size:.92rem;line-height:1.5;margin:8px 0 16px;}
.cta a{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;font-weight:700;font-size:15px;padding:14px 26px;border-radius:14px;text-decoration:none;}
.cta a svg{width:16px;height:16px;}
@media(min-width:560px){.intro h1{font-size:4.4rem;}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="ttl">Muğla</div>
    <span class="freechip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"/></svg><span id="freeTxt">Ücretsiz</span></span>
  </header>
  <section class="intro">
    <div class="kick">Ege • Türkiye</div>
    <h1>Muğla</h1>
    <p id="sub"></p>
  </section>
  <main id="list"></main>
  <div class="cta">
    <h3 id="ctaH"></h3>
    <p id="ctaP"></p>
    <a href="index.html" id="ctaB"></a>
  </div>
</div>

<script>
const LANG=(navigator.language||'tr').toLowerCase().startsWith('tr')?'tr':'en';
const TX=LANG==='tr'
  ?{free:'Ücretsiz',sub:'Muğla’nın manzaralı konumları — senden ücretsiz.',maps:'Yol tarifi',ctaH:'80 il daha seni bekliyor',ctaP:'Muğla ücretsiz. Tek kodla Türkiye’nin 81 ilinin tüm manzaralı konumlarını aç.',ctaB:'81 İl Kilidini Aç'}
  :{free:'Free',sub:'Scenic locations across Muğla — free for you.',maps:'Directions',ctaH:'80 more provinces await',ctaP:'Muğla is free. Unlock every scenic location across all 81 provinces with one code.',ctaB:'Unlock all 81'};
const CDN='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/';
const img=id=>CDN+id+'/public';
const LOCS=[
  {name:'İztuzu Manzara Noktası',map:'https://www.google.com/maps/place/Iztuzu+View+Point/@36.7682289,28.6117555,13.83z',photos:['mugla_iztuzu_manzara_noktasi_1','mugla_iztuzu_manzara_noktasi_2','mugla_iztuzu_manzara_noktasi_3']},
  {name:'Kelebekler Vadisi',map:'https://maps.google.com/?q=Kelebekler+Vadisi%2C+Mu%C4%9Fla',photos:['mugla_kelebekler_vadisi_1','mugla_kelebekler_vadisi_2','mugla_kelebekler_vadisi_3']},
  {name:'Ölüdeniz',map:'https://maps.google.com/?q=%C3%96l%C3%BCdeniz%2C+Mu%C4%9Fla',photos:['mugla_oludeniz_1','mugla_oludeniz_2','mugla_oludeniz_3']},
  {name:'Montana Seyir Tepesi',map:'https://www.google.com/maps/place/Montana+Seyir+Tepesi/@36.5454469,29.133872,17z',photos:['mugla_montana_seyir_tepesi_1','mugla_montana_seyir_tepesi_2','mugla_montana_seyir_tepesi_3']}
];
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const LOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/><path d="M8 10.5V7.2A4 4 0 0 1 16 7.2v3.3"/></svg>';
document.getElementById('freeTxt').textContent=TX.free;
document.getElementById('sub').textContent=TX.sub;
document.getElementById('ctaH').textContent=TX.ctaH;
document.getElementById('ctaP').textContent=TX.ctaP;
document.getElementById('ctaB').innerHTML=LOCK+'<span>'+TX.ctaB+'</span>';

const list=document.getElementById('list');
LOCS.forEach(loc=>{
  const el=document.createElement('div');el.className='pc';
  el.innerHTML=`
    <a href="${img(loc.photos[0])}" target="_blank" rel="noopener"><img class="hero" src="${img(loc.photos[0])}" alt="${loc.name}" loading="lazy"></a>
    <div class="body">
      <h2>${loc.name}</h2>
      <div class="sub">Muğla · Ege</div>
      <div class="thumbs">${loc.photos.map(p=>`<a href="${img(p)}" target="_blank" rel="noopener"><img src="${img(p)}" alt="${loc.name}" loading="lazy"></a>`).join('')}</div>
      <a class="maps" href="${loc.map}" target="_blank" rel="noopener">${PIN}<span>${TX.maps}</span></a>
    </div>`;
  list.appendChild(el);
});
</script>
</body>
</html>
