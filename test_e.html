<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept E · Cinematic Slideshow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.phone{max-width:440px;height:100vh;height:100dvh;margin:0 auto;position:relative;background:#000;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.6);}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;}
.slide.on{opacity:1;}
.slide .bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.slide.on .bg{animation:ken 7s ease-out forwards;}
@keyframes ken{from{transform:scale(1.0) translate(0,0)}to{transform:scale(1.18) translate(-2%,-3%)}}
.slide::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.4) 0%,rgba(0,0,0,0) 30%,rgba(0,0,0,.2) 55%,rgba(0,0,0,.9) 100%);}
/* progress bars */
.bars{position:absolute;top:14px;left:14px;right:14px;z-index:20;display:flex;gap:5px;}
.bar{flex:1;height:3px;border-radius:999px;background:rgba(255,255,255,.3);overflow:hidden;}
.bar i{display:block;height:100%;width:0;background:#fff;}
.bar.done i{width:100%;}
.bar.active i{animation:fill 7s linear forwards;}
@keyframes fill{from{width:0}to{width:100%}}
.brand{position:absolute;top:30px;left:0;right:0;text-align:center;z-index:20;font-weight:800;letter-spacing:.06em;font-size:14px;text-shadow:0 1px 8px rgba(0,0,0,.6);pointer-events:none;}
.cap{position:absolute;left:0;right:0;bottom:120px;z-index:20;padding:0 28px;}
.cap .plate{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:6px 12px;font-family:'Bebas Neue';font-size:1.05rem;letter-spacing:.05em;}
.cap .rg{margin-top:14px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.85);}
.cap h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3.8rem,18vw,6.5rem);line-height:.86;margin:4px 0 18px;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.cap .go{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 26px;border-radius:999px;}
/* tap zones */
.zone{position:absolute;top:0;bottom:150px;width:38%;z-index:15;}
.zone.l{left:0;} .zone.r{right:0;}
.hint{position:absolute;left:0;right:0;bottom:70px;z-index:18;text-align:center;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.55);pointer-events:none;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="phone" id="phone">
  <div id="stage"></div>
  <div class="bars" id="bars"></div>
  <div class="brand">TR&nbsp;81 · Türkiye</div>
  <div class="cap">
    <span class="plate" id="plate">🇹🇷 07</span>
    <div class="rg" id="rg">Mediterranean</div>
    <h1 id="name">Antalya</h1>
    <a class="go" id="go" href="antalya.html">Explore →</a>
  </div>
  <div class="zone l" id="zl"></div>
  <div class="zone r" id="zr"></div>
  <div class="hint">tap sides to navigate · auto-plays</div>
</div>
<script>
const R={marmara:'Marmara',aegean:'Aegean',medit:'Mediterranean',central:'Central Anatolia',black:'Black Sea',east:'Eastern Anatolia',southeast:'Southeastern Anatolia'};
const IMG='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public';
const P=[[7,'antalya','Antalya','medit'],[34,'istanbul','İstanbul','marmara'],[61,'trabzon','Trabzon','black'],[50,'nevsehir','Nevşehir','central'],[35,'izmir','İzmir','aegean'],[48,'mugla','Muğla','aegean'],[53,'rize','Rize','black'],[25,'erzurum','Erzurum','east'],[21,'diyarbakir','Diyarbakır','southeast'],[6,'ankara','Ankara','central']];
const stage=document.getElementById('stage'),bars=document.getElementById('bars');
P.forEach((p,i)=>{const s=document.createElement('div');s.className='slide';s.innerHTML=`<div class="bg" style="background-image:url('${IMG}');filter:hue-rotate(${(i*25)%60-30}deg) saturate(1.05)"></div>`;stage.appendChild(s);
  const b=document.createElement('div');b.className='bar';b.innerHTML='<i></i>';bars.appendChild(b);});
const slides=[...document.querySelectorAll('.slide')],barEls=[...document.querySelectorAll('.bar')];
let cur=0,timer=null;
function show(i){cur=(i+P.length)%P.length;const [n,slug,name,rk]=P[cur];
  slides.forEach((s,j)=>s.classList.toggle('on',j===cur));
  barEls.forEach((b,j)=>{b.classList.remove('active','done');if(j<cur)b.classList.add('done');});
  const ab=barEls[cur];ab.classList.remove('active');void ab.offsetWidth;ab.classList.add('active');
  document.getElementById('plate').textContent='🇹🇷 '+String(n).padStart(2,'0');
  document.getElementById('rg').textContent=R[rk];
  document.getElementById('name').textContent=name;
  document.getElementById('go').href=slug+'.html';
  clearTimeout(timer);timer=setTimeout(()=>show(cur+1),7000);
}
document.getElementById('zr').onclick=()=>show(cur+1);
document.getElementById('zl').onclick=()=>show(cur-1);
show(0);
</script>
</body>
</html>
