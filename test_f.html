<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Muğla — TR81 · F</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:560px;margin:0 auto;min-height:100vh;background:#08080b;}

/* header photo */
.hd{position:relative;height:240px;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:18px 20px;}
.hd img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hd::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45) 0,rgba(0,0,0,.1) 40%,rgba(8,8,11,.95));}
.hd .bar{position:absolute;top:max(14px,env(safe-area-inset-top));left:16px;right:16px;z-index:3;display:flex;align-items:center;gap:12px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;}
.back svg{width:20px;height:20px;}
.bar .free{margin-left:auto;display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(227,197,144,.6);color:var(--gold);font-weight:700;font-size:12px;padding:7px 12px;border-radius:999px;}
.bar .free svg{width:14px;height:14px;}
.hd .kick{position:relative;z-index:3;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.85);font-weight:700;}
.hd h1{position:relative;z-index:3;font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3rem,15vw,4.4rem);line-height:.9;margin-top:4px;}

/* directory list */
.list{padding:12px 16px 8px;}
.row{display:flex;align-items:center;gap:14px;padding:12px;border-radius:16px;transition:background .15s;}
.row:active{background:rgba(255,255,255,.06);}
.row+.row{border-top:1px solid rgba(255,255,255,.07);}
.row .thumb{width:62px;height:62px;flex:none;border-radius:13px;overflow:hidden;background:#15161d;}
.row .thumb img{width:100%;height:100%;object-fit:cover;}
.row .info{flex:1;min-width:0;}
.row .nm{font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:.02em;line-height:1;}
.row .meta{color:#9aa4b2;font-size:.82rem;margin-top:4px;display:flex;align-items:center;gap:5px;}
.row .meta svg{width:13px;height:13px;color:var(--gold);}
.row .chev{color:#6b7280;font-size:22px;flex:none;}

/* unlock CTA */
.cta{margin:16px;background:linear-gradient(135deg,#181922,#0b0c11);border:1px solid rgba(227,197,144,.35);border-radius:22px;padding:24px;text-align:center;}
.cta .ic{width:52px;height:52px;margin:0 auto 14px;border-radius:15px;display:flex;align-items:center;justify-content:center;background:rgba(227,197,144,.12);border:1px solid rgba(227,197,144,.4);color:var(--gold);}
.cta .ic svg{width:24px;height:24px;}
.cta h3{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.02em;}
.cta p{color:#9aa4b2;font-size:.92rem;line-height:1.5;margin:8px 0 16px;}
.cta a{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#1a1407;font-weight:700;font-size:15px;padding:14px 26px;border-radius:14px;}
.cta a svg{width:16px;height:16px;}
.ft{text-align:center;padding:6px 0 max(30px,env(safe-area-inset-bottom));color:#5a606c;font-size:11px;letter-spacing:.28em;text-transform:uppercase;font-weight:600;}
</style>
</head>
<body>
<div class="app">
  <div class="hd">
    <img id="hdimg" src="" alt="Muğla">
    <div class="bar">
      <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
      <span class="free"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"/></svg><span id="freeTxt"></span></span>
    </div>
    <div class="kick">Ege • Türkiye</div>
    <h1>Muğla</h1>
  </div>

  <div class="list" id="list"></div>

  <div class="cta">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/><path d="M8 10.5V7.2A4 4 0 0 1 16 7.2v3.3"/></svg></div>
    <h3 id="ctaH"></h3>
    <p id="ctaP"></p>
    <a href="index.html" id="ctaB"></a>
  </div>
  <div class="ft">tr81.tr</div>
</div>

<script>
const LANG=(navigator.language||'tr').toLowerCase().startsWith('tr')?'tr':'en';
const TX=LANG==='tr'
  ?{free:'Ücretsiz',tap:'Yol tarifi',ctaH:'Türkiye’nin tamamı',ctaP:'Muğla ücretsiz. Diğer 80 il kilitli — tek kodla hepsinin manzaralı konumlarını aç.',ctaB:'81 İl Kilidini Aç'}
  :{free:'Free',tap:'Directions',ctaH:'All of Türkiye',ctaP:'Muğla is free. The other 80 are locked — unlock every scenic location with one code.',ctaB:'Unlock all 81'};
const CDN='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/';
const img=id=>CDN+id+'/public';
const LOCS=[
  {name:'İztuzu Manzara Noktası',map:'https://www.google.com/maps/place/Iztuzu+View+Point/@36.7682289,28.6117555,13.83z',photos:['mugla_iztuzu_manzara_noktasi_1','mugla_iztuzu_manzara_noktasi_2','mugla_iztuzu_manzara_noktasi_3']},
  {name:'Kelebekler Vadisi',map:'https://maps.google.com/?q=Kelebekler+Vadisi%2C+Mu%C4%9Fla',photos:['mugla_kelebekler_vadisi_1','mugla_kelebekler_vadisi_2','mugla_kelebekler_vadisi_3']},
  {name:'Ölüdeniz',map:'https://maps.google.com/?q=%C3%96l%C3%BCdeniz%2C+Mu%C4%9Fla',photos:['mugla_oludeniz_1','mugla_oludeniz_2','mugla_oludeniz_3']},
  {name:'Montana Seyir Tepesi',map:'https://www.google.com/maps/place/Montana+Seyir+Tepesi/@36.5454469,29.133872,17z',photos:['mugla_montana_seyir_tepesi_1','mugla_montana_seyir_tepesi_2','mugla_montana_seyir_tepesi_3']}
];
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const LOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/><path d="M8 10.5V7.2A4 4 0 0 1 16 7.2v3.3"/></svg>';
document.getElementById('hdimg').src=img(LOCS[2].photos[0]);
document.getElementById('freeTxt').textContent=TX.free;
document.getElementById('ctaH').textContent=TX.ctaH;
document.getElementById('ctaP').textContent=TX.ctaP;
document.getElementById('ctaB').innerHTML=LOCK+'<span>'+TX.ctaB+'</span>';

const list=document.getElementById('list');
LOCS.forEach(loc=>{
  const a=document.createElement('a');a.className='row';a.href=loc.map;a.target='_blank';a.rel='noopener';
  a.innerHTML=`
    <div class="thumb"><img src="${img(loc.photos[0])}" alt="${loc.name}" loading="lazy"></div>
    <div class="info"><div class="nm">${loc.name}</div><div class="meta">${PIN}<span>${TX.tap}</span></div></div>
    <div class="chev">›</div>`;
  list.appendChild(a);
});
</script>
</body>
</html>
