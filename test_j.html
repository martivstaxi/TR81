<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept J · Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#06070b;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;height:100vh;height:100dvh;background:radial-gradient(120% 90% at 50% 0%,#11151f 0%,#06070b 60%);position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);display:flex;flex-direction:column;}
.top{padding:26px 22px 10px;flex:none;}
.kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#5ad1c4;font-weight:700;}
h1{font-size:clamp(2rem,9vw,2.7rem);font-weight:800;letter-spacing:-.02em;line-height:1;margin-top:8px;}
.top p{color:#8a93a3;font-size:13px;margin-top:8px;max-width:300px;}
.search{margin:14px 0 0;position:relative;}
.search input{width:100%;border:0;background:#10141d;border-radius:11px;padding:12px 12px 12px 40px;font-size:14px;font-family:inherit;color:#fff;}
.search input::placeholder{color:#5f6878;}
.search input:focus{outline:1px solid #2a3342;}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#5f6878;}
/* map */
.mapwrap{flex:1;position:relative;overflow:hidden;}
.map{position:absolute;inset:0;}
.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--c);box-shadow:0 0 0 4px color-mix(in srgb,var(--c) 22%,transparent),0 0 14px 3px var(--c);transition:.18s;}
.pin:hover .dot,.pin.on .dot{transform:scale(1.55);box-shadow:0 0 0 6px color-mix(in srgb,var(--c) 26%,transparent),0 0 22px 6px var(--c);}
.pin .lbl{position:absolute;left:50%;top:-7px;transform:translate(-50%,-100%);white-space:nowrap;font-size:11px;font-weight:700;background:rgba(6,7,11,.82);backdrop-filter:blur(4px);padding:3px 8px;border-radius:7px;opacity:0;pointer-events:none;transition:.15s;border:1px solid rgba(255,255,255,.08);}
.pin:hover .lbl,.pin.on .lbl{opacity:1;}
.pin.dim{opacity:.12;}
.legend{position:absolute;left:14px;bottom:14px;right:14px;display:flex;flex-wrap:wrap;gap:7px 12px;font-size:10.5px;color:#aeb6c4;}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:8px;height:8px;border-radius:50%;}
/* selected card */
.card{position:absolute;left:14px;right:14px;bottom:14px;z-index:20;background:rgba(13,17,25,.92);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:18px;overflow:hidden;display:none;}
.card.show{display:flex;}
.card .im{width:118px;flex:none;background-size:cover;background-position:center;position:relative;}
.card .im .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.85;}
.card .tx{padding:16px 16px 16px 18px;flex:1;}
.card .pl{font-size:11px;letter-spacing:.1em;color:#5ad1c4;font-weight:700;}
.card h3{font-size:1.3rem;font-weight:800;margin:3px 0 4px;}
.card .rg{color:#8a93a3;font-size:12px;}
.card .go{display:inline-block;margin-top:11px;background:#fff;color:#111;font-weight:700;font-size:13px;padding:9px 16px;border-radius:10px;}
.card .x{position:absolute;top:10px;right:12px;color:#8a93a3;font-size:18px;cursor:pointer;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="top">
    <div class="kx">◐ Tap the map</div>
    <h1>81 provinces,<br>one country.</h1>
    <p>Every glowing point is a province — placed where it really is. Tap to explore.</p>
    <div class="search">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="text" placeholder="Find a province on the map…">
    </div>
  </div>
  <div class="mapwrap">
    <div class="map" id="map"></div>
    <div class="legend" id="legend"></div>
    <div class="card" id="card"></div>
  </div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
// [n,slug,name,region,lon,lat]
const P=[[1,'adana','Adana','medit',35.3,37.0],[2,'adiyaman','Adıyaman','southeast',38.3,37.8],[3,'afyon','Afyonkarahisar','aegean',30.5,38.75],[4,'agri','Ağrı','east',43.05,39.72],[5,'amasya','Amasya','black',35.8,40.65],[6,'ankara','Ankara','central',32.9,39.9],[7,'antalya','Antalya','medit',30.7,36.9],[8,'artvin','Artvin','black',41.8,41.2],[9,'aydin','Aydın','aegean',27.8,37.85],[10,'balikesir','Balıkesir','marmara',27.9,39.6],[11,'bilecik','Bilecik','marmara',29.98,40.1],[12,'bingol','Bingöl','east',40.5,38.88],[13,'bitlis','Bitlis','east',42.1,38.4],[14,'bolu','Bolu','black',31.6,40.7],[15,'burdur','Burdur','medit',30.3,37.7],[16,'bursa','Bursa','marmara',29.1,40.2],[17,'canakkale','Çanakkale','marmara',26.4,40.1],[18,'cankiri','Çankırı','central',33.6,40.6],[19,'corum','Çorum','black',34.95,40.55],[20,'denizli','Denizli','aegean',29.1,37.8],[21,'diyarbakir','Diyarbakır','southeast',40.2,37.91],[22,'edirne','Edirne','marmara',26.5,41.7],[23,'elazig','Elazığ','east',39.2,38.68],[24,'erzincan','Erzincan','east',39.5,39.75],[25,'erzurum','Erzurum','east',41.3,39.9],[26,'eskisehir','Eskişehir','central',30.5,39.8],[27,'gaziantep','Gaziantep','southeast',37.4,37.1],[28,'giresun','Giresun','black',38.4,40.9],[29,'gumushane','Gümüşhane','black',39.5,40.46],[30,'hakkari','Hakkari','east',43.7,37.57],[31,'hatay','Hatay','medit',36.2,36.2],[32,'isparta','Isparta','medit',30.55,37.8],[33,'mersin','Mersin','medit',34.6,36.8],[34,'istanbul','İstanbul','marmara',29.0,41.0],[35,'izmir','İzmir','aegean',27.1,38.4],[36,'kars','Kars','east',43.1,40.6],[37,'kastamonu','Kastamonu','black',33.8,41.4],[38,'kayseri','Kayseri','central',35.5,38.7],[39,'kirklareli','Kırklareli','marmara',27.2,41.7],[40,'kirsehir','Kırşehir','central',34.2,39.15],[41,'kocaeli','Kocaeli','marmara',29.9,40.8],[42,'konya','Konya','central',32.5,37.87],[43,'kutahya','Kütahya','aegean',29.98,39.4],[44,'malatya','Malatya','east',38.3,38.35],[45,'manisa','Manisa','aegean',27.4,38.6],[46,'kahramanmaras','Kahramanmaraş','medit',36.9,37.6],[47,'mardin','Mardin','southeast',40.74,37.31],[48,'mugla','Muğla','aegean',28.4,37.2],[49,'mus','Muş','east',41.5,38.75],[50,'nevsehir','Nevşehir','central',34.7,38.6],[51,'nigde','Niğde','central',34.7,37.97],[52,'ordu','Ordu','black',37.9,40.98],[53,'rize','Rize','black',40.5,41.0],[54,'sakarya','Sakarya','marmara',30.4,40.7],[55,'samsun','Samsun','black',36.3,41.3],[56,'siirt','Siirt','southeast',41.95,37.93],[57,'sinop','Sinop','black',35.2,42.0],[58,'sivas','Sivas','central',37.0,39.75],[59,'tekirdag','Tekirdağ','marmara',27.5,41.0],[60,'tokat','Tokat','black',36.55,40.3],[61,'trabzon','Trabzon','black',39.7,41.0],[62,'tunceli','Tunceli','east',39.5,39.1],[63,'sanliurfa','Şanlıurfa','southeast',38.8,37.2],[64,'usak','Uşak','aegean',29.4,38.7],[65,'van','Van','east',43.4,38.5],[66,'yozgat','Yozgat','central',34.8,39.8],[67,'zonguldak','Zonguldak','black',31.8,41.3],[68,'aksaray','Aksaray','central',34.0,38.4],[69,'bayburt','Bayburt','black',40.2,40.26],[70,'karaman','Karaman','central',33.2,37.18],[71,'kirikkale','Kırıkkale','central',33.5,39.85],[72,'batman','Batman','southeast',41.13,37.88],[73,'sirnak','Şırnak','southeast',42.45,37.5],[74,'bartin','Bartın','black',32.3,41.6],[75,'ardahan','Ardahan','east',42.7,41.1],[76,'igdir','Iğdır','east',44.0,39.92],[77,'yalova','Yalova','marmara',29.3,40.6],[78,'karabuk','Karabük','black',32.6,41.2],[79,'kilis','Kilis','southeast',37.1,36.7],[80,'osmaniye','Osmaniye','medit',36.25,37.1],[81,'duzce','Düzce','black',31.2,40.8]];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/İ/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const LON0=25.6,LON1=44.6,LAT0=42.6,LAT1=35.6;
const PADX=7,PADY=20; // % padding inside map area
const map=document.getElementById('map'),card=document.getElementById('card');
function pos(lon,lat){const x=PADX+(lon-LON0)/(LON1-LON0)*(100-2*PADX);const y=PADY+(LAT0-lat)/(LAT0-LAT1)*(100-2*PADY);return[x,y];}
P.forEach(p=>{const[n,slug,name,rk,lon,lat]=p;const[x,y]=pos(lon,lat);const c=REG[rk][1];
  const pin=document.createElement('div');pin.className='pin';pin.style.left=x+'%';pin.style.top=y+'%';pin.style.setProperty('--c',c);pin.dataset.s=norm(name);
  pin.innerHTML=`<div class="lbl">${name}</div><div class="dot"></div>`;
  pin.addEventListener('click',()=>select(p,pin));map.appendChild(pin);});
function select(p,pin){const[n,slug,name,rk]=p;document.querySelectorAll('.pin').forEach(x=>x.classList.remove('on'));pin.classList.add('on');
  card.className='card show';
  card.innerHTML=`<span class="x" id="cx">✕</span><div class="im" style="background-image:url('${IMG[n%2]}')"><div class="tint" style="background:${REG[rk][1]}"></div></div>
  <div class="tx"><div class="pl">${REG[rk][0].toUpperCase()}</div><h3>${name}</h3><div class="rg">Province ${String(n).padStart(2,'0')} · Türkiye</div><a class="go" href="${slug}.html">Explore ${name} →</a></div>`;
  document.getElementById('cx').onclick=e=>{e.stopPropagation();card.className='card';};}
// legend
const legend=document.getElementById('legend');
Object.values(REG).forEach(([label,c])=>{const s=document.createElement('span');s.innerHTML=`<i style="background:${c}"></i>${label}`;legend.appendChild(s);});
// search
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);
  document.querySelectorAll('.pin').forEach(pin=>{const hit=!v||pin.dataset.s.includes(v);pin.classList.toggle('dim',!hit);if(v&&hit&&pin.dataset.s===v){/*noop*/}});});
</script>
</body>
</html>
