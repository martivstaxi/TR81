<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept D · Bottom Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Sora',sans-serif;background:#000;color:#11161d;overflow:hidden;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.phone{max-width:440px;height:100vh;height:100dvh;margin:0 auto;position:relative;background:#000;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.6);}
#hero{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.05);transition:filter .5s, background-image .5s;}
.scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,0) 40%);z-index:1;}
.topbar{position:absolute;top:16px;left:0;right:0;z-index:5;display:flex;gap:10px;justify-content:space-between;padding:0 16px;}
.pill{background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-radius:999px;padding:11px 16px;font-size:14px;font-weight:700;color:#11161d;display:flex;align-items:center;gap:8px;box-shadow:0 6px 18px rgba(0,0,0,.2);}
.pill.search{flex:1;color:#8a93a0;font-weight:500;}
.heroname{position:absolute;left:24px;bottom:46%;z-index:4;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.5);}
.heroname .rg{font-size:12px;letter-spacing:.18em;text-transform:uppercase;opacity:.9;}
.heroname h1{font-size:3rem;font-weight:800;line-height:1;}
/* bottom sheet */
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:10;background:#fff;border-radius:26px 26px 0 0;box-shadow:0 -14px 40px rgba(0,0,0,.25);
  transition:height .32s cubic-bezier(.2,.7,.3,1);height:46%;display:flex;flex-direction:column;}
.sheet.expanded{height:90%;}
.handle{width:44px;height:5px;border-radius:999px;background:#d7dbe2;margin:12px auto 6px;flex:none;cursor:pointer;}
.sheet .pad{padding:6px 20px 0;overflow-y:auto;}
.sh-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.sh-head .nm{font-size:1.5rem;font-weight:800;}
.sh-head .sub{font-size:13px;color:#8a93a0;font-weight:600;margin-top:2px;}
.plate{flex:none;background:linear-gradient(135deg,#dbeafe,#ede9fe);color:#2563eb;border-radius:11px;padding:8px 12px;font-weight:800;font-size:17px;}
.cta{display:block;text-align:center;background:#11161d;color:#fff;font-weight:700;font-size:15px;padding:15px;border-radius:15px;margin:16px 0 18px;}
.lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#9aa4b2;font-weight:700;margin:6px 0 12px;}
.rail{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;}
.rail::-webkit-scrollbar{display:none;}
.mini{flex:none;width:120px;cursor:pointer;}
.mini .im{height:90px;border-radius:14px;background-size:cover;background-position:center;}
.mini .mn{font-size:13px;font-weight:700;margin-top:6px;}
.mini .mr{font-size:11px;color:#9aa4b2;}
/* expanded list */
.allwrap{display:none;margin-top:18px;}
.sheet.expanded .allwrap{display:block;}
.search2{position:relative;margin-bottom:12px;}
.search2 input{width:100%;border:0;background:#f2f3f6;border-radius:12px;padding:12px 12px 12px 40px;font-size:14px;font-family:inherit;}
.search2 input:focus{outline:2px solid #11161d;}
.search2 svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#9aa4b2;}
.allgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:30px;}
.gc{display:flex;align-items:center;gap:10px;background:#f6f7f9;border-radius:13px;padding:9px 11px;cursor:pointer;}
.gc .gp{width:38px;height:34px;border-radius:9px;background:linear-gradient(135deg,#dbeafe,#ede9fe);color:#2563eb;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex:none;}
.gc .gn{font-size:13px;font-weight:700;line-height:1.1;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="phone">
  <div id="hero"></div>
  <div class="scrim"></div>
  <div class="topbar">
    <div class="pill">🇹🇷 TR81</div>
    <div class="pill search">🔍 Search a province…</div>
  </div>
  <div class="heroname"><div class="rg" id="hrg">Mediterranean</div><h1 id="hnm">Antalya</h1></div>

  <div class="sheet" id="sheet">
    <div class="handle" id="handle"></div>
    <div class="pad">
      <div class="sh-head">
        <div><div class="nm" id="snm">Antalya</div><div class="sub" id="ssub">Mediterranean · Türkiye</div></div>
        <div class="plate" id="spl">07</div>
      </div>
      <a class="cta" id="scta" href="antalya.html">Explore Antalya →</a>
      <div class="lbl">Discover more</div>
      <div class="rail" id="rail"></div>

      <div class="allwrap">
        <div class="lbl">All 81 provinces</div>
        <div class="search2"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input id="q" placeholder="Search…"></div>
        <div class="allgrid" id="allgrid"></div>
      </div>
    </div>
  </div>
</div>
<script>
const R={marmara:'Marmara',aegean:'Aegean',medit:'Mediterranean',central:'Central Anatolia',black:'Black Sea',east:'Eastern Anatolia',southeast:'Southeastern Anatolia'};
const IMG='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public';
const ALL=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyonkarahisar','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','Kahramanmaraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
const FEAT=[6,33,60,52,34,0,7,64];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const hero=document.getElementById('hero');
function fil(i){return `hue-rotate(${(i*23)%60-30}deg) saturate(1.05)`;}
function select(i){const [n,slug,name,rk]=ALL[i];
  hero.style.backgroundImage=`url('${IMG}')`;hero.style.filter=fil(i);
  document.getElementById('hrg').textContent=R[rk];document.getElementById('hnm').textContent=name;
  document.getElementById('snm').textContent=name;document.getElementById('ssub').textContent=R[rk]+' · Türkiye';
  document.getElementById('spl').textContent=String(n).padStart(2,'0');
  const c=document.getElementById('scta');c.textContent='Explore '+name+' →';c.href=slug+'.html';
}
// rail
const rail=document.getElementById('rail');
FEAT.forEach(idx=>{const [n,slug,name,rk]=ALL[idx];const m=document.createElement('div');m.className='mini';
  m.innerHTML=`<div class="im" style="background-image:url('${IMG}');filter:${fil(idx)}"></div><div class="mn">${name}</div><div class="mr">${R[rk]}</div>`;
  m.onclick=()=>{select(idx);document.querySelector('.pad').scrollTop=0;};rail.appendChild(m);});
// all grid
const allgrid=document.getElementById('allgrid');
ALL.forEach(([n,slug,name,rk],i)=>{const g=document.createElement('a');g.href=slug+'.html';g.className='gc';g.dataset.s=norm(name);
  g.innerHTML=`<span class="gp">${String(n).padStart(2,'0')}</span><span class="gn">${name}</span>`;allgrid.appendChild(g);});
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);document.querySelectorAll('.gc').forEach(c=>c.style.display=c.dataset.s.includes(v)?'':'none');});
// sheet toggle
const sheet=document.getElementById('sheet');
document.getElementById('handle').onclick=()=>sheet.classList.toggle('expanded');
select(6);
</script>
</body>
</html>
