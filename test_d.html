<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept D · Apple TV style</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#000;box-shadow:0 0 60px rgba(0,0,0,.6);overflow:hidden;}
.bar{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:18px 20px;}
.logo{font-weight:800;font-size:18px;letter-spacing:.02em;}
.bar .ic{font-size:17px;opacity:.9;}
/* hero */
.hero{position:relative;height:88vh;min-height:560px;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;text-align:center;padding:0 30px 60px;
  background-size:cover;background-position:center;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45),rgba(0,0,0,0) 38%,rgba(0,0,0,.1) 60%,#000 100%);}
.hero>*{position:relative;z-index:2;}
.hero .top{font-size:13px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:14px;}
.hero h1{font-size:clamp(3.4rem,17vw,5.4rem);font-weight:900;line-height:.9;letter-spacing:-.03em;text-shadow:0 2px 40px rgba(0,0,0,.5);}
.hero p{margin-top:16px;color:rgba(255,255,255,.85);font-size:15px;max-width:300px;}
.hero .cta{margin-top:26px;display:inline-flex;align-items:center;gap:10px;background:#fff;color:#000;font-weight:700;font-size:15px;padding:14px 30px;border-radius:14px;}
/* big feature cards */
.feed{padding:6px 18px 40px;display:flex;flex-direction:column;gap:18px;}
.lead{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);font-weight:700;padding:14px 2px 0;}
.big{position:relative;border-radius:22px;overflow:hidden;height:230px;display:flex;flex-direction:column;justify-content:flex-end;padding:22px;cursor:pointer;background-size:cover;background-position:center;}
.big::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.78));}
.big .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.8;}
.big>.z{position:relative;z-index:3;}
.big .rg{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.85);}
.big h2{font-size:2.1rem;font-weight:800;line-height:1;margin-top:3px;}
.big .pl{position:absolute;top:18px;right:18px;z-index:3;background:rgba(0,0,0,.4);backdrop-filter:blur(5px);border-radius:9px;padding:6px 11px;font-weight:800;font-size:14px;}
/* minimal all list */
.all{padding:10px 22px 60px;}
.all .lead{padding-left:0;}
.r{display:flex;align-items:baseline;gap:16px;padding:14px 2px;border-bottom:1px solid rgba(255,255,255,.08);color:#fff;}
.r .no{color:rgba(255,255,255,.4);font-weight:600;min-width:30px;font-size:.95rem;}
.r .nm{font-size:1.05rem;font-weight:500;flex:1;}
.r:active{opacity:.55;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="bar"><div class="logo">TR81</div><div class="ic">🔍</div></div>
  <div class="hero" id="hero">
    <div class="top">Türkiye · 81 Provinces</div>
    <h1>Discover<br>Türkiye</h1>
    <p>Eighty-one provinces. One unforgettable country.</p>
    <a class="cta" id="hgo" href="antalya.html">▶ Start exploring</a>
  </div>
  <div class="feed" id="feed"><div class="lead">Featured destinations</div></div>
  <div class="all"><div class="lead">All 81 provinces</div><div id="list"></div></div>
</div>
<script>
const R={marmara:['Marmara','#2563eb'],aegean:['Aegean','#0891b2'],medit:['Mediterranean','#0f9d8f'],central:['Central Anatolia','#d97706'],black:['Black Sea','#16a34a'],east:['Eastern Anatolia','#7c3aed'],southeast:['Southeastern Anatolia','#db2777']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyonkarahisar','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','Kahramanmaraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
document.getElementById('hero').style.backgroundImage=`url('${IMG[0]}')`;
const feed=document.getElementById('feed');
[7,34,61,50,35].forEach(code=>{const [n,slug,name,rk]=P.find(x=>x[0]===code);const [label,color]=R[rk];
  const a=document.createElement('a');a.href=slug+'.html';a.className='big';a.style.backgroundImage=`url('${IMG[n%2]}')`;
  a.innerHTML=`<div class="tint" style="background:${color}"></div><span class="pl">${String(n).padStart(2,'0')}</span><div class="z"><div class="rg">${label}</div><h2>${name}</h2></div>`;
  feed.appendChild(a);});
const list=document.getElementById('list');
P.forEach(([n,slug,name])=>{const a=document.createElement('a');a.href=slug+'.html';a.className='r';a.innerHTML=`<span class="no">${String(n).padStart(2,'0')}</span><span class="nm">${name}</span><span>→</span>`;list.appendChild(a);});
</script>
</body>
</html>
