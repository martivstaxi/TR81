<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept D · Photo Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#fff;color:#11161d;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:10px;left:10px;z-index:60;background:#11161d;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#fff;box-shadow:0 0 60px rgba(0,0,0,.12);padding-bottom:30px;}
.hd{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);padding:20px 18px 12px;border-bottom:1px solid #f0f1f4;}
.hd h1{font-size:22px;font-weight:800;letter-spacing:-.02em;}
.hd p{font-size:13px;color:#8a93a0;font-weight:600;margin-top:1px;}
.search{margin-top:13px;position:relative;}
.search input{width:100%;border:0;background:#f2f3f6;border-radius:13px;padding:13px 13px 13px 42px;font-size:15px;font-family:inherit;}
.search input:focus{outline:2px solid #11161d;}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9aa4b2;}
.masonry{columns:2;column-gap:10px;padding:14px;}
.tile{break-inside:avoid;margin-bottom:10px;border-radius:18px;overflow:hidden;position:relative;display:block;cursor:pointer;
  background-size:cover;background-position:center;color:#fff;}
.tile::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.7) 100%);}
.tile .info{position:absolute;left:0;right:0;bottom:0;z-index:2;padding:14px;}
.tile .info .rg{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.85;}
.tile .info h3{font-size:1.15rem;font-weight:800;line-height:1.05;}
.tile .plate{position:absolute;top:10px;left:10px;z-index:2;background:rgba(255,255,255,.9);color:#11161d;border-radius:8px;padding:4px 9px;font-weight:800;font-size:13px;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="hd">
    <h1>Türkiye Gallery 🇹🇷</h1>
    <p>81 provinces, one tap away</p>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="text" placeholder="Search a province…">
    </div>
  </div>
  <div class="masonry" id="grid"></div>
</div>
<script>
const R={marmara:'Marmara',aegean:'Aegean',medit:'Mediterranean',central:'Central Anatolia',black:'Black Sea',east:'Eastern Anatolia',southeast:'Southeastern Anatolia'};
const IMG='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public';
const H=[230,170,200,260,180,210,240,160,250,190];
const P=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyonkarahisar','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','Kahramanmaraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const grid=document.getElementById('grid');
P.forEach(([n,slug,name,rk],i)=>{const a=document.createElement('a');a.href=slug+'.html';a.className='tile';a.dataset.s=norm(name);
  a.style.height=H[i%H.length]+'px';a.style.backgroundImage=`url('${IMG}')`;a.style.filter=`hue-rotate(${(i*29)%70-35}deg)`;
  a.innerHTML=`<span class="plate">${String(n).padStart(2,'0')}</span><div class="info"><div class="rg">${R[rk]}</div><h3>${name}</h3></div>`;
  grid.appendChild(a);});
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);document.querySelectorAll('.tile').forEach(t=>t.style.display=t.dataset.s.includes(v)?'':'none');});
</script>
</body>
</html>
