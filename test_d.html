<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept D · Discover Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sora',sans-serif;background:#0b0d12;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:10px;left:10px;z-index:60;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#0b0d12;position:relative;padding:0 0 40px;box-shadow:0 0 60px rgba(0,0,0,.6);}
.hd{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,#0b0d12 60%,rgba(11,13,18,0));padding:22px 22px 16px;}
.hd .dt{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#7e8794;font-weight:600;}
.hd .row{display:flex;align-items:center;justify-content:space-between;margin-top:2px;}
.hd h1{font-size:26px;font-weight:800;letter-spacing:-.02em;}
.hd .pf{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:17px;}
.search{margin:2px 22px 10px;position:relative;}
.search input{width:100%;border:0;background:#171b24;border-radius:14px;padding:14px 14px 14px 44px;font-size:15px;font-family:inherit;color:#fff;}
.search input::placeholder{color:#6b7480;}
.search input:focus{outline:2px solid #f59e0b;}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#6b7480;}
.feed{padding:6px 18px 0;display:flex;flex-direction:column;gap:18px;}
.card{position:relative;border-radius:24px;overflow:hidden;height:62vh;min-height:380px;max-height:520px;display:flex;flex-direction:column;justify-content:space-between;padding:22px;cursor:pointer;
  background-size:cover;background-position:center;transition:transform .2s;}
.card:active{transform:scale(.98);}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,0) 35%,rgba(0,0,0,.2) 60%,rgba(0,0,0,.85) 100%);}
.card>*{position:relative;z-index:2;}
.card .tag{align-self:flex-start;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(255,255,255,.22);backdrop-filter:blur(6px);padding:7px 13px;border-radius:999px;}
.card .bot .rg{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.85);}
.card .bot h2{font-size:2.2rem;font-weight:800;line-height:1;margin:4px 0 14px;}
.card .bot .cta{display:inline-flex;align-items:center;gap:9px;background:#fff;color:#111;font-weight:700;font-size:14px;padding:11px 20px;border-radius:999px;}
.card .plate{position:absolute;top:22px;right:22px;z-index:2;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);border-radius:9px;padding:6px 11px;font-weight:800;font-size:15px;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="hd">
    <div class="dt">Friday · Discover</div>
    <div class="row"><h1>TR81</h1><div class="pf">🇹🇷</div></div>
    <div class="search" style="margin-top:14px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="text" placeholder="Search a province…">
    </div>
  </div>
  <div class="feed" id="feed"></div>
</div>
<script>
const R={marmara:'Marmara',aegean:'Aegean',medit:'Mediterranean',central:'Central Anatolia',black:'Black Sea',east:'Eastern Anatolia',southeast:'Southeastern Anatolia'};
const IMG='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public';
const TAGS=['Editor’s pick','Trending now','Hidden gem','Must see','Coastal escape','Mountain views','Old town','Local favorite'];
const P=[[7,'antalya','Antalya','medit'],[34,'istanbul','İstanbul','marmara'],[61,'trabzon','Trabzon','black'],[50,'nevsehir','Nevşehir','central'],[35,'izmir','İzmir','aegean'],[48,'mugla','Muğla','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[25,'erzurum','Erzurum','east'],[6,'ankara','Ankara','central'],[53,'rize','Rize','black'],[16,'bursa','Bursa','marmara'],[65,'van','Van','east'],[31,'hatay','Hatay','medit'],[42,'konya','Konya','central'],[1,'adana','Adana','medit']];
const feed=document.getElementById('feed');
P.forEach(([n,slug,name,rk],i)=>{const a=document.createElement('a');a.href=slug+'.html';a.className='card';a.dataset.s=name.toLowerCase();a.style.backgroundImage=`url('${IMG}')`;
  a.innerHTML=`<span class="tag">${TAGS[i%TAGS.length]}</span><span class="plate">${String(n).padStart(2,'0')}</span>
  <div class="bot"><div class="rg">${R[rk]}</div><h2>${name}</h2><span class="cta">Explore →</span></div>`;
  feed.appendChild(a);});
document.getElementById('q').addEventListener('input',e=>{const v=e.target.value.toLowerCase();document.querySelectorAll('.card').forEach(c=>c.style.display=c.dataset.s.includes(v)?'':'none');});
</script>
</body>
</html>
