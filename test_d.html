<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Muğla — TR81 · D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;}
img{display:block;}svg{display:block;}
:focus-visible{outline:2px solid rgba(255,255,255,.85);outline-offset:2px;border-radius:6px;}
.app{max-width:520px;margin:0 auto;height:100vh;height:100dvh;position:relative;overflow:hidden;background:#000;box-shadow:0 0 80px rgba(0,0,0,.8);}

/* vertical snap track of full-screen stories */
.track{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.track::-webkit-scrollbar{display:none;}
.story{height:100vh;height:100dvh;scroll-snap-align:start;position:relative;overflow:hidden;}
.story .bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform .6s ease;}
.story::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 26%,rgba(0,0,0,0) 50%,rgba(0,0,0,.85) 100%);pointer-events:none;}

/* progress bars (photos within a story) */
.bars{position:absolute;top:max(14px,env(safe-area-inset-top));left:14px;right:14px;z-index:5;display:flex;gap:5px;}
.bars .b{flex:1;height:3px;border-radius:3px;background:rgba(255,255,255,.3);overflow:hidden;}
.bars .b i{display:block;height:100%;width:0;background:#fff;border-radius:3px;}
.bars .b.done i{width:100%;}
.bars .b.on i{width:100%;}

/* tap zones to move between photos */
.zone{position:absolute;top:0;bottom:24%;width:34%;z-index:4;}
.zone.l{left:0;}.zone.r{right:0;}

/* caption */
.meta{position:absolute;left:22px;right:22px;bottom:max(30px,calc(env(safe-area-inset-bottom) + 18px));z-index:5;}
.meta .no{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;color:var(--gold);opacity:.9;}
.meta h2{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.6rem,11vw,3.6rem);line-height:.92;letter-spacing:.02em;margin:4px 0 16px;text-shadow:0 2px 18px rgba(0,0,0,.7);}
.meta .maps{display:inline-flex;align-items:center;gap:9px;background:var(--gold);color:#1a1407;font-weight:700;font-size:15px;padding:14px 26px;border-radius:14px;text-decoration:none;box-shadow:0 12px 30px rgba(0,0,0,.4);}
.meta .maps svg{width:17px;height:17px;}

/* top bar overlay */
.top{position:absolute;top:max(30px,calc(env(safe-area-inset-top) + 14px));left:14px;right:14px;z-index:6;display:flex;align-items:center;gap:12px;pointer-events:none;}
.top .back,.top .gift{pointer-events:auto;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;}
.back svg{width:20px;height:20px;}
.top .ttl{flex:1;font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.06em;text-shadow:0 1px 8px rgba(0,0,0,.7);}
.gift{width:38px;height:38px;flex:none;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(227,197,144,.6);color:var(--gold);display:flex;align-items:center;justify-content:center;}
.gift svg{width:19px;height:19px;}

/* up-next hint on first story */
.hint{position:absolute;left:50%;bottom:max(116px,calc(env(safe-area-inset-bottom) + 104px));transform:translateX(-50%);z-index:5;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.7);font-weight:700;animation:bob 1.8s infinite;pointer-events:none;}
.hint svg{width:18px;height:18px;}
@keyframes bob{0%,100%{transform:translate(-50%,0)}50%{transform:translate(-50%,6px)}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="ttl">Muğla</div>
    <span class="gift" aria-label="Ücretsiz"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="8.5" width="17" height="4" rx="1"/><path d="M12 8.5V21"/><path d="M18.5 12.5v6.4a1.6 1.6 0 0 1-1.6 1.6H7.1a1.6 1.6 0 0 1-1.6-1.6v-6.4"/><path d="M7.6 8.5a2.5 2.5 0 0 1 0-5C10.3 3.5 12 8.5 12 8.5s1.7-5 4.4-5a2.5 2.5 0 0 1 0 5"/></svg></span>
  </div>
  <div class="track" id="track"></div>
</div>

<script>
const LANG=(navigator.language||'tr').toLowerCase().startsWith('tr')?'tr':'en';
const TX=LANG==='tr'?{maps:'Yol tarifi',next:'Kaydır'}:{maps:'Directions',next:'Swipe'};
const CDN='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/';
const img=id=>CDN+id+'/public';
const LOCS=[
  {name:'İztuzu Manzara Noktası',map:'https://www.google.com/maps/place/Iztuzu+View+Point/@36.7682289,28.6117555,13.83z',photos:['mugla_iztuzu_manzara_noktasi_1','mugla_iztuzu_manzara_noktasi_2','mugla_iztuzu_manzara_noktasi_3']},
  {name:'Kelebekler Vadisi',map:'https://maps.google.com/?q=Kelebekler+Vadisi%2C+Mu%C4%9Fla',photos:['mugla_kelebekler_vadisi_1','mugla_kelebekler_vadisi_2','mugla_kelebekler_vadisi_3']},
  {name:'Ölüdeniz',map:'https://maps.google.com/?q=%C3%96l%C3%BCdeniz%2C+Mu%C4%9Fla',photos:['mugla_oludeniz_1','mugla_oludeniz_2','mugla_oludeniz_3']},
  {name:'Montana Seyir Tepesi',map:'https://www.google.com/maps/place/Montana+Seyir+Tepesi/@36.5454469,29.133872,17z',photos:['mugla_montana_seyir_tepesi_1','mugla_montana_seyir_tepesi_2','mugla_montana_seyir_tepesi_3']}
];
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const CHV='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>';

const track=document.getElementById('track');
const photoIdx=LOCS.map(()=>0);  /* current photo within each story */
LOCS.forEach((loc,li)=>{
  const s=document.createElement('section');s.className='story';s.dataset.l=li;
  s.innerHTML=`
    <div class="bg" style="background-image:url('${img(loc.photos[0])}')"></div>
    <div class="bars">${loc.photos.map((_,i)=>`<div class="b ${i===0?'on':''}"><i></i></div>`).join('')}</div>
    <div class="zone l" data-l="${li}" data-d="-1"></div>
    <div class="zone r" data-l="${li}" data-d="1"></div>
    <div class="meta">
      <div class="no">${String(li+1).padStart(2,'0')} / ${String(LOCS.length).padStart(2,'0')}</div>
      <h2>${loc.name}</h2>
      <a class="maps" href="${loc.map}" target="_blank" rel="noopener">${PIN}<span>${TX.maps}</span></a>
    </div>
    ${li===0?`<div class="hint">${CHV}<span>${TX.next}</span></div>`:''}`;
  track.appendChild(s);
});
const stories=[...track.querySelectorAll('.story')];

function setPhoto(li,pi){
  const loc=LOCS[li];const n=loc.photos.length;pi=(pi+n)%n;photoIdx[li]=pi;
  const s=stories[li];
  s.querySelector('.bg').style.backgroundImage=`url('${img(loc.photos[pi])}')`;
  [...s.querySelectorAll('.bars .b')].forEach((b,i)=>{b.classList.toggle('done',i<pi);b.classList.toggle('on',i===pi);});
}
/* tap left/right zones to change photo within the active story */
track.addEventListener('click',e=>{
  const z=e.target.closest('.zone');if(!z)return;
  setPhoto(+z.dataset.l,photoIdx[+z.dataset.l]+(+z.dataset.d));
});
/* preload neighbour images */
LOCS.forEach(loc=>loc.photos.forEach(p=>{const im=new Image();im.src=img(p);}));
</script>
</body>
</html>
