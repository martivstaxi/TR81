<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#08080b">
<meta name="description" content="50 eyalette güzel yerler. Amerika'yı keşfet.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Amerika'yı Keşfet — TR81</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;--bg:#08080b;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
:focus-visible{outline:2px solid rgba(227,197,144,.9);outline-offset:2px;border-radius:8px;}
.app{max-width:940px;margin:0 auto;min-height:100vh;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 4px;}
.back{width:42px;height:42px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;transition:background .15s;}
.back:hover{background:rgba(255,255,255,.16);}
.back svg{width:20px;height:20px;}

.intro{padding:8px 22px 4px;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(2.9rem,13vw,4.6rem);line-height:.9;}
.intro p{margin-top:9px;color:#9aa4b2;font-size:.98rem;}

.stick{position:sticky;top:0;z-index:10;padding-top:12px;background:linear-gradient(180deg,var(--bg) 86%,rgba(8,8,11,.92));backdrop-filter:blur(10px);}
.searchwrap{padding:0 16px 10px;}
.search{position:relative;}
.search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:15px 48px 15px 18px;color:#fff;font-size:16px;font-family:inherit;transition:border-color .15s,background .15s;}
.search input::placeholder{color:rgba(255,255,255,.45);}
.search input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.09);}
.search input::-webkit-search-cancel-button,.search input::-webkit-search-decoration{-webkit-appearance:none;appearance:none;}
.search .ico{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:19px;height:19px;color:rgba(255,255,255,.5);pointer-events:none;}
.search .clr{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:30px;height:30px;border:0;border-radius:50%;background:rgba(255,255,255,.12);color:#fff;font-size:18px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;}
.search.has .ico{display:none;}
.search.has .clr{display:flex;}

.tabs{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-padding:0 16px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04);color:#cfd5dd;border-radius:999px;padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:.18s;}
.tab:hover{border-color:rgba(227,197,144,.45);color:#fff;}
.tab.on{background:var(--gold);color:#1a1407;border-color:var(--gold);}
.tab .n{font-size:11px;font-weight:700;opacity:.6;}
.tab.on .n{opacity:.75;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:12px;padding:4px 16px max(40px,env(safe-area-inset-bottom));}
.card{position:relative;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:16px 8px 13px;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .2s,border-color .2s,background .2s;animation:pop .3s ease both;}
.card:hover{transform:translateY(-4px);border-color:rgba(227,197,144,.5);background:rgba(255,255,255,.06);}
.card:active{transform:translateY(-1px) scale(.98);}
@keyframes pop{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.abbr{width:58px;height:43px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.06em;color:var(--gold);
  background:linear-gradient(155deg,rgba(227,197,144,.18),rgba(227,197,144,.04));border:1px solid rgba(227,197,144,.32);box-shadow:0 4px 12px rgba(0,0,0,.4);}
.nm{font-size:13px;font-weight:500;text-align:center;line-height:1.22;color:#e9edf2;}
.empty{grid-column:1/-1;display:none;text-align:center;color:#6b7280;padding:50px 16px;font-size:14.5px;line-height:1.5;}

@media(max-width:380px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px;}
  .abbr{width:52px;height:39px;font-size:1.3rem;}
  .nm{font-size:12px;}
}
@media(min-width:700px){.grid{gap:14px;}.card{padding:18px 10px 15px;}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="world.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
  </div>

  <div class="intro">
    <h1 id="h1"></h1>
    <p id="sub"></p>
  </div>

  <div class="stick">
    <div class="searchwrap">
      <div class="search" id="searchBox">
        <input id="q" type="search" autocomplete="off" enterkeyhint="search" aria-label="Eyalet ara">
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <button class="clr" id="clr" aria-label="Temizle" type="button">×</button>
      </div>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
/* [slug, name, abbr, region]  region: ne|mw|s|w */
const STATES=[
  ['alabama','Alabama','AL','s'],['alaska','Alaska','AK','w'],['arizona','Arizona','AZ','w'],
  ['arkansas','Arkansas','AR','s'],['california','California','CA','w'],['colorado','Colorado','CO','w'],
  ['connecticut','Connecticut','CT','ne'],['delaware','Delaware','DE','s'],['florida','Florida','FL','s'],
  ['georgia','Georgia','GA','s'],['hawaii','Hawaii','HI','w'],['idaho','Idaho','ID','w'],
  ['illinois','Illinois','IL','mw'],['indiana','Indiana','IN','mw'],['iowa','Iowa','IA','mw'],
  ['kansas','Kansas','KS','mw'],['kentucky','Kentucky','KY','s'],['louisiana','Louisiana','LA','s'],
  ['maine','Maine','ME','ne'],['maryland','Maryland','MD','s'],['massachusetts','Massachusetts','MA','ne'],
  ['michigan','Michigan','MI','mw'],['minnesota','Minnesota','MN','mw'],['mississippi','Mississippi','MS','s'],
  ['missouri','Missouri','MO','mw'],['montana','Montana','MT','w'],['nebraska','Nebraska','NE','mw'],
  ['nevada','Nevada','NV','w'],['new_hampshire','New Hampshire','NH','ne'],['new_jersey','New Jersey','NJ','ne'],
  ['new_mexico','New Mexico','NM','w'],['new_york','New York','NY','ne'],['north_carolina','North Carolina','NC','s'],
  ['north_dakota','North Dakota','ND','mw'],['ohio','Ohio','OH','mw'],['oklahoma','Oklahoma','OK','s'],
  ['oregon','Oregon','OR','w'],['pennsylvania','Pennsylvania','PA','ne'],['rhode_island','Rhode Island','RI','ne'],
  ['south_carolina','South Carolina','SC','s'],['south_dakota','South Dakota','SD','mw'],['tennessee','Tennessee','TN','s'],
  ['texas','Texas','TX','s'],['utah','Utah','UT','w'],['vermont','Vermont','VT','ne'],
  ['virginia','Virginia','VA','s'],['washington','Washington','WA','w'],['west_virginia','West Virginia','WV','s'],
  ['wisconsin','Wisconsin','WI','mw'],['wyoming','Wyoming','WY','w']
];
const lang=(navigator.language||'en').toLowerCase().startsWith('tr')?'tr':'en';
document.documentElement.lang=lang;
const STR={
  tr:{title:"Amerika'yı Keşfet",sub:'50 eyalette güzel yerler',search:'Eyalet ara…',all:'Tümü',empty:'Eyalet bulunamadı.',
      reg:{ne:'Kuzeydoğu',mw:'Ortabatı',s:'Güney',w:'Batı'}},
  en:{title:'Explore the USA',sub:'Beautiful places in 50 states',search:'Search a state…',all:'All',empty:'No state found.',
      reg:{ne:'Northeast',mw:'Midwest',s:'South',w:'West'}}
}[lang];
const REG_ORDER=['ne','mw','s','w'];
const norm=t=>(t||'').toLowerCase().replace(/[çğıöşü]/g,c=>({ç:'c',ğ:'g',ı:'i',ö:'o',ş:'s',ü:'u'}[c])||c).replace(/_/g,' ');

document.getElementById('h1').textContent=STR.title;
document.getElementById('sub').textContent=STR.sub;
const q=document.getElementById('q');q.placeholder=STR.search;
const searchBox=document.getElementById('searchBox'),clr=document.getElementById('clr');
const tabsEl=document.getElementById('tabs'),grid=document.getElementById('grid');

let active='all';
const counts={all:STATES.length};
REG_ORDER.forEach(r=>counts[r]=STATES.filter(s=>s[3]===r).length);
function mkTab(key,label){
  const b=document.createElement('button');
  b.className='tab'+(key===active?' on':'');b.dataset.k=key;b.type='button';b.setAttribute('aria-pressed',key===active);
  b.innerHTML=`${label}<span class="n">${counts[key]}</span>`;
  b.onclick=()=>{active=key;document.querySelectorAll('.tab').forEach(x=>{const on=x.dataset.k===key;x.classList.toggle('on',on);x.setAttribute('aria-pressed',on);});b.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});apply();};
  tabsEl.appendChild(b);
}
mkTab('all',STR.all);
REG_ORDER.forEach(r=>{if(counts[r])mkTab(r,STR.reg[r]);});

STATES.forEach(([slug,name,abbr,region])=>{
  const a=document.createElement('a');a.href='usa_'+slug+'.html';a.className='card';
  a.dataset.s=norm(name+' '+slug+' '+abbr);a.dataset.c=region;
  a.innerHTML=`<div class="abbr">${abbr}</div><div class="nm">${name}</div>`;
  grid.appendChild(a);
});
const empty=document.createElement('div');empty.className='empty';empty.textContent=STR.empty;grid.appendChild(empty);

function apply(){
  const v=norm(q.value);let n=0;
  grid.querySelectorAll('.card').forEach(c=>{const m=(active==='all'||c.dataset.c===active)&&c.dataset.s.includes(v);c.style.display=m?'':'none';if(m)n++;});
  empty.style.display=n?'none':'block';
}
q.addEventListener('input',()=>{
  const has=q.value.length>0;searchBox.classList.toggle('has',has);
  if(has&&active!=='all'){active='all';document.querySelectorAll('.tab').forEach(x=>{const on=x.dataset.k==='all';x.classList.toggle('on',on);x.setAttribute('aria-pressed',on);});tabsEl.scrollTo({left:0,behavior:'smooth'});}
  apply();
});
clr.onclick=()=>{q.value='';searchBox.classList.remove('has');q.focus();apply();};
apply();
</script>
</body>
</html>
