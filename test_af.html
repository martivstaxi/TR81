<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept AF · 3D cube</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;touch-action:none;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;height:100vh;height:100dvh;background:#000;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);overflow:hidden;}
.bar{position:absolute;top:0;left:0;right:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;pointer-events:none;background:linear-gradient(180deg,rgba(0,0,0,.45),transparent);}
.logo{font-weight:800;font-size:19px;text-shadow:0 1px 10px rgba(0,0,0,.6);}.logo b{color:#ffcf6b;}
.bar .cnt{font-size:12px;font-weight:700;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);padding:5px 11px;border-radius:999px;font-variant-numeric:tabular-nums;}
.scene{position:absolute;inset:0;perspective:1400px;overflow:hidden;}
.cube{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);}
.face{position:absolute;inset:0;backface-visibility:hidden;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 28px 16vh;}
.face .bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.face .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.45;}
.face::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.42) 0%,rgba(0,0,0,0) 28%,rgba(0,0,0,.18) 54%,rgba(0,0,0,.95) 100%);}
.face>*{position:relative;z-index:3;}
.face .kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf6b;font-weight:700;margin-bottom:11px;}
.face h2{font-size:clamp(3rem,16vw,5rem);font-weight:800;line-height:.9;letter-spacing:-.025em;text-shadow:0 3px 30px rgba(0,0,0,.55);}
.face p{margin-top:13px;color:rgba(255,255,255,.85);font-size:14px;max-width:300px;line-height:1.5;}
.face a{display:inline-flex;align-items:center;gap:8px;margin-top:20px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 24px;border-radius:12px;align-self:flex-start;}
/* faces positioned on a horizontal cube */
.front{transform:rotateY(0deg) translateZ(220px);}
.right{transform:rotateY(90deg) translateZ(220px);}
.left{transform:rotateY(-90deg) translateZ(220px);}
.hint{position:absolute;left:0;right:0;bottom:42px;z-index:40;text-align:center;color:rgba(255,255,255,.5);font-size:12px;letter-spacing:.06em;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="bar"><div class="logo">TR<b>81</b></div><div class="cnt" id="cnt">01 / 12</div></div>
  <div class="scene"><div class="cube" id="cube">
    <div class="face front" id="fFront"></div>
    <div class="face right" id="fRight"></div>
    <div class="face left" id="fLeft"></div>
  </div></div>
  <div class="hint" id="hint">← swipe to turn the cube →</div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[34,'istanbul','İstanbul','marmara','Two continents meeting on one shimmering strait.'],[7,'antalya','Antalya','medit','Turquoise coast — beaches, canyons and waterfalls.'],[50,'nevsehir','Cappadocia','central','Fairy chimneys and a sky full of balloons.'],[47,'mardin','Mardin','southeast','Honey-stone city above the Mesopotamian plain.'],[61,'trabzon','Trabzon','black','Misty green peaks above the Black Sea.'],[48,'mugla','Muğla','aegean','The bluest bays of the Aegean.'],[65,'van','Van','east','A turquoise sea-lake high in the eastern mountains.'],[35,'izmir','İzmir','aegean','Aegean light, ancient ruins and a long promenade.'],[63,'sanliurfa','Şanlıurfa','southeast','Cradle of civilisation — Göbeklitepe country.'],[53,'rize','Rize','black','Tea terraces wrapped in mountain cloud.'],[25,'erzurum','Erzurum','east','High plateau winters and proud old stone.'],[16,'bursa','Bursa','marmara','Green slopes of Uludağ above the first Ottoman capital.']];
const cube=document.getElementById('cube'),cnt=document.getElementById('cnt'),hint=document.getElementById('hint');
const fFront=document.getElementById('fFront'),fRight=document.getElementById('fRight'),fLeft=document.getElementById('fLeft');
let idx=0,angle=0,busy=false;
function fill(face,i){const[n,slug,name,rk,desc]=P[(i+P.length)%P.length];
  face.innerHTML=`<div class="bg" style="background-image:url('${IMG[n%2]}')"></div><div class="tint" style="background:${REG[rk][1]}"></div>
  <div class="kx">${REG[rk][0]} · ${String(((i+P.length)%P.length)+1).padStart(2,'0')}/${P.length}</div><h2>${name}</h2><p>${desc}</p><a href="${slug}.html">▶ Explore ${name}</a>`;}
function render(){fill(fFront,idx);fill(fRight,idx+1);fill(fLeft,idx-1);cnt.textContent=`${String(idx+1).padStart(2,'0')} / ${String(P.length).padStart(2,'0')}`;}
render();
function turn(dir){if(busy)return;busy=true;angle+=dir>0?-90:90;cube.style.transform=`translateZ(-220px) rotateY(${angle}deg)`;
  setTimeout(()=>{idx=(idx+dir+P.length)%P.length;angle=0;cube.style.transition='none';cube.style.transform='translateZ(-220px) rotateY(0deg)';render();
    requestAnimationFrame(()=>{cube.style.transition='';busy=false;});},520);}
// init slight pull-back for depth
cube.style.transform='translateZ(-220px) rotateY(0deg)';
let sx=0,drag=false;
const down=e=>{const t=e.touches?e.touches[0]:e;sx=t.clientX;drag=true;};
const up=e=>{if(!drag)return;drag=false;const t=e.changedTouches?e.changedTouches[0]:e;const dx=t.clientX-sx;
  if(dx<-50)turn(1);else if(dx>50)turn(-1);hint.style.opacity='0';};
const scene=document.querySelector('.scene');
scene.addEventListener('touchstart',down,{passive:true});scene.addEventListener('touchend',up);
scene.addEventListener('mousedown',down);window.addEventListener('mouseup',up);
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')turn(1);if(e.key==='ArrowLeft')turn(-1);});
</script>
</body>
</html>
