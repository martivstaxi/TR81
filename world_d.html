<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Dünya · Search Globe — TR81</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:560px;margin:0 auto;min-height:100vh;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 0;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.back svg{width:20px;height:20px;}

.hero{text-align:center;padding:26px 22px 6px;}
.hero .glob{width:64px;height:64px;margin:0 auto 16px;border-radius:50%;background:radial-gradient(circle at 35% 30%,rgba(227,197,144,.35),rgba(227,197,144,.06));border:1px solid rgba(227,197,144,.4);display:flex;align-items:center;justify-content:center;color:var(--gold);}
.hero .glob svg{width:32px;height:32px;}
.hero .kick{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.hero h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(2.8rem,13vw,4rem);line-height:.9;margin-top:8px;}
.hero p{margin-top:8px;color:#9aa4b2;font-size:.95rem;}

.searchwrap{padding:20px 20px 4px;position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#08080b 78%,transparent);}
.search{position:relative;}
.search input{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.16);border-radius:18px;padding:17px 50px 17px 20px;color:#fff;font-size:16px;font-family:inherit;}
.search input::placeholder{color:rgba(255,255,255,.45);}
.search input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.1);box-shadow:0 0 0 4px rgba(227,197,144,.1);}
.search svg{position:absolute;right:18px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:rgba(255,255,255,.5);}

.lab{padding:18px 22px 10px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9aa4b2;font-weight:700;}
.pills{display:flex;flex-wrap:wrap;gap:9px;padding:0 18px 6px;}
.pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:8px 14px 8px 9px;font-size:13.5px;font-weight:600;transition:border-color .15s,background .15s;}
.pill:hover{border-color:rgba(227,197,144,.5);background:rgba(227,197,144,.08);}
.pill.free{border-color:rgba(227,197,144,.4);background:rgba(227,197,144,.1);}
.pill .fl{width:26px;height:20px;border-radius:4px;overflow:hidden;flex:none;background:#15161d;display:flex;align-items:center;justify-content:center;}
.pill .fl img{width:100%;height:100%;object-fit:cover;}
.pill .fl .em{font-size:15px;display:none;}.pill .fl.emoji img{display:none;}.pill .fl.emoji .em{display:block;}

.list{padding:6px 12px max(34px,env(safe-area-inset-bottom));}
.item{display:flex;align-items:center;gap:13px;padding:10px 12px;border-radius:12px;transition:background .15s;}
.item:hover{background:rgba(255,255,255,.05);}
.item .fl{width:40px;height:30px;border-radius:5px;overflow:hidden;flex:none;box-shadow:0 3px 9px rgba(0,0,0,.4);background:#15161d;display:flex;align-items:center;justify-content:center;}
.item .fl img{width:100%;height:100%;object-fit:cover;}
.item .fl .em{font-size:22px;display:none;}.item .fl.emoji img{display:none;}.item .fl.emoji .em{display:block;}
.item .nm{flex:1;font-size:14.5px;font-weight:500;color:#e9edf2;}
.item .ft{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);}
.empty{display:none;text-align:center;color:#6b7280;padding:50px 0;font-size:14px;}
.hideOnSearch.searching{display:none;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
  </div>
  <div class="hero hideOnSearch" id="hero">
    <div class="glob"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg></div>
    <div class="kick" id="kick"></div>
    <h1 id="h1"></h1>
    <p id="sub"></p>
  </div>
  <div class="searchwrap">
    <div class="search">
      <input id="q" type="text" autocomplete="off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
  </div>
  <div class="lab hideOnSearch" id="lab"></div>
  <div class="pills hideOnSearch" id="pills"></div>
  <div class="lab" id="lab2"></div>
  <div class="list" id="list"></div>
  <div class="empty" id="empty"></div>
</div>

<script src="worlddata.js"></script>
<script>
const W=window.WORLD,t=W.t;
document.getElementById('kick').textContent=t.kick;
document.getElementById('h1').textContent=t.title;
document.getElementById('sub').textContent=t.sub;
document.getElementById('q').placeholder=t.search;
document.getElementById('lab').textContent=t.popular;
document.getElementById('lab2').textContent=t.all;

const pills=document.getElementById('pills');
W.popular.forEach(iso=>{
  const c=W.list.find(x=>x.iso===iso);if(!c)return;
  const a=document.createElement('a');a.href=c.href;a.className='pill'+(c.free?' free':'');
  a.innerHTML=`<span class="fl"><img src="${c.flag}" alt="" loading="lazy" onerror="this.parentNode.classList.add('emoji')"><span class="em">${c.emoji}</span></span>${c.name}`;
  pills.appendChild(a);
});

const list=document.getElementById('list');
W.list.slice().sort((a,b)=>a.name.localeCompare(b.name,W.lang)).forEach(c=>{
  const a=document.createElement('a');a.href=c.href;a.className='item';a.dataset.s=W.norm(c.name+' '+c.slug);
  a.innerHTML=`<div class="fl"><img src="${c.flag}" alt="" loading="lazy" onerror="this.parentNode.classList.add('emoji')"><span class="em">${c.emoji}</span></div>
    <div class="nm">${c.name}</div>${c.free?`<span class="ft">${t.free}</span>`:''}`;
  list.appendChild(a);
});

const empty=document.getElementById('empty');empty.textContent=t.empty;
const hideEls=document.querySelectorAll('.hideOnSearch');
document.getElementById('q').addEventListener('input',e=>{
  const v=W.norm(e.target.value);const searching=!!v;
  hideEls.forEach(el=>el.classList.toggle('searching',searching));
  let n=0;
  list.querySelectorAll('.item').forEach(c=>{const m=c.dataset.s.includes(v);c.style.display=m?'':'none';if(m)n++;});
  empty.style.display=n?'none':'block';
});
</script>
</body>
</html>
