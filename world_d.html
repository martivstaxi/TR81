<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Dünya · Mozaik — TR81</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:620px;margin:0 auto;min-height:100vh;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 4px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.back svg{width:20px;height:20px;}

.intro{padding:10px 22px 6px;}
.intro .kick{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3rem,14vw,4.4rem);line-height:.9;margin-top:8px;}

.searchwrap{padding:12px 16px 4px;position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#08080b 78%,transparent);}
.search{position:relative;}
.search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:14px 46px 14px 18px;color:#fff;font-size:15px;font-family:inherit;}
.search input::placeholder{color:rgba(255,255,255,.45);}
.search input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.09);}
.search svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,.5);}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:6px 16px max(34px,env(safe-area-inset-bottom));}
.tile{position:relative;aspect-ratio:4/5;border-radius:18px;overflow:hidden;background:#15161d;border:1px solid rgba(255,255,255,.08);transition:transform .25s,border-color .25s;}
.tile:hover{transform:translateY(-5px);border-color:rgba(227,197,144,.55);}
.tile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.tile:hover img{transform:scale(1.07);}
.tile .em{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:74px;}
.tile.emoji img{display:none;}.tile.emoji .em{display:flex;}
.tile .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,11,0) 38%,rgba(8,8,11,.45) 64%,rgba(8,8,11,.92) 100%);}
.tile .nm{position:absolute;left:14px;right:12px;bottom:13px;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:1.45rem;letter-spacing:.02em;line-height:1;text-shadow:0 2px 10px rgba(0,0,0,.6);}
.tile .ar{position:absolute;top:12px;right:12px;z-index:2;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;}
.tile .ar svg{width:15px;height:15px;color:#fff;}
.empty{grid-column:1/-1;display:none;text-align:center;color:#6b7280;padding:40px 0;font-size:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
  </div>
  <div class="intro">
    <div class="kick" id="kick"></div>
    <h1 id="h1"></h1>
  </div>
  <div class="searchwrap">
    <div class="search">
      <input id="q" type="text" autocomplete="off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script src="worlddata.js"></script>
<script>
const W=window.WORLD,t=W.t;
document.getElementById('kick').textContent=t.kick;
document.getElementById('h1').textContent=t.title;
document.getElementById('q').placeholder=t.search;
const AR='<span class="ar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>';
const grid=document.getElementById('grid');
W.list.forEach(c=>{
  const a=document.createElement('a');a.href=c.href;a.className='tile';a.dataset.s=W.norm(c.name+' '+c.slug);
  a.innerHTML=`<img src="${c.flag}" alt="" loading="lazy" onerror="this.closest('.tile').classList.add('emoji')"><span class="em">${c.emoji}</span>
    <span class="ov"></span>${AR}<div class="nm">${c.name}</div>`;
  grid.appendChild(a);
});
const empty=document.createElement('div');empty.className='empty';empty.textContent=t.empty;grid.appendChild(empty);
document.getElementById('q').addEventListener('input',e=>{
  const v=W.norm(e.target.value);let n=0;
  grid.querySelectorAll('.tile').forEach(c=>{const m=c.dataset.s.includes(v);c.style.display=m?'':'none';if(m)n++;});
  empty.style.display=n?'none':'block';
});
</script>
</body>
</html>
