<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept U · Drawer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;height:100vh;height:100dvh;background:#000;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);overflow:hidden;}
/* hero */
.hero{position:absolute;inset:0;}
.hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity .5s;transform:scale(1.06);}
.hero .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.5;transition:background .5s;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 26%,rgba(0,0,0,.35) 56%,rgba(0,0,0,.92) 100%);}
.bar{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;}
.logo{font-weight:800;font-size:20px;}.logo b{color:#ffcf6b;}
.hcap{position:absolute;left:24px;right:24px;bottom:200px;z-index:20;}
.hcap .kx{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:#ffcf6b;font-weight:700;margin-bottom:10px;}
.hcap h1{font-size:clamp(3rem,15vw,4.6rem);font-weight:800;line-height:.92;letter-spacing:-.02em;text-shadow:0 2px 28px rgba(0,0,0,.55);}
.hcap p{margin-top:11px;color:rgba(255,255,255,.85);font-size:14px;max-width:300px;}
.hcap a{display:inline-flex;align-items:center;gap:8px;margin-top:16px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 24px;border-radius:12px;}
/* drawer */
.drawer{position:absolute;left:0;right:0;bottom:0;z-index:40;height:88%;transform:translateY(calc(100% - 148px));
  transition:transform .42s cubic-bezier(.22,.61,.36,1);background:rgba(12,13,18,.78);backdrop-filter:blur(20px);
  border-top-left-radius:26px;border-top-right-radius:26px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;}
.drawer.open{transform:translateY(0);}
.handle{flex:none;padding:11px 0 4px;cursor:grab;}
.handle .grip{width:42px;height:5px;border-radius:3px;background:rgba(255,255,255,.3);margin:0 auto;}
.dhead{flex:none;display:flex;align-items:center;justify-content:space-between;padding:4px 20px 12px;}
.dhead h2{font-size:1.15rem;font-weight:800;}
.dhead span{font-size:12px;color:#8a93a3;font-weight:600;}
.search{flex:none;padding:0 16px 12px;position:relative;}
.search input{width:100%;border:0;background:rgba(255,255,255,.08);border-radius:11px;padding:11px 11px 11px 38px;font-size:14px;font-family:inherit;color:#fff;}
.search input::placeholder{color:#9aa1ad;}.search input:focus{outline:1px solid rgba(255,255,255,.2);}
.search svg{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:#9aa1ad;}
.dgrid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:4px 14px 30px;scrollbar-width:none;}
.dgrid::-webkit-scrollbar{display:none;}
.cell{position:relative;aspect-ratio:3/4;border-radius:11px;overflow:hidden;cursor:pointer;background-size:cover;background-position:center;display:flex;align-items:flex-end;padding:8px;}
.cell .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.8;}
.cell::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,.82));}
.cell .nm{position:relative;z-index:2;font-size:.74rem;font-weight:700;line-height:1;text-shadow:0 1px 5px rgba(0,0,0,.7);}
.cell.active{outline:2px solid #fff;outline-offset:-2px;}
.cell:active{transform:scale(.95);}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="hero"><div class="bg" id="hbg"></div><div class="tint" id="htint"></div></div>
  <div class="bar"><div class="logo">TR<b>81</b></div></div>
  <div class="hcap" id="hcap"></div>
  <div class="drawer" id="drawer">
    <div class="handle" id="handle"><div class="grip"></div></div>
    <div class="dhead"><h2>All 81 provinces</h2><span id="dhint">pull up ↑</span></div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="text" placeholder="Search a province…">
    </div>
    <div class="dgrid" id="dgrid"></div>
  </div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const blurb={antalya:'Turquoise coast — beaches, canyons and waterfalls.',istanbul:'Two continents meeting on one shimmering strait.',nevsehir:'Cappadocia — fairy chimneys and balloons at dawn.',mardin:'Honey-stone city above the Mesopotamian plain.',trabzon:'Misty green peaks above the Black Sea.',van:'A turquoise sea-lake high in the east.',mugla:'The bluest bays of the Aegean.',izmir:'Aegean light and ancient ruins.',sanliurfa:'Cradle of civilisation.',rize:'Tea terraces wrapped in cloud.'};
const P=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyon','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','K.maraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/İ/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const hbg=document.getElementById('hbg'),htint=document.getElementById('htint'),hcap=document.getElementById('hcap'),dgrid=document.getElementById('dgrid');
function setHero(p){const[n,slug,name,rk]=p;hbg.style.backgroundImage=`url('${IMG[n%2]}')`;htint.style.background=REG[rk][1];
  hcap.innerHTML=`<div class="kx">★ ${REG[rk][0]}</div><h1>${name}</h1><p>${blurb[slug]||'One of Türkiye\'s 81 provinces.'}</p><a href="${slug}.html">▶ Explore ${name}</a>`;}
P.forEach(p=>{const[n,slug,name,rk]=p;const c=document.createElement('div');c.className='cell';c.dataset.s=norm(name);
  c.style.backgroundImage=`url('${IMG[n%2]}')`;c.innerHTML=`<div class="tint" style="background:${REG[rk][1]}"></div><div class="nm">${name}</div>`;
  c.addEventListener('click',()=>{setHero(p);document.querySelectorAll('.cell').forEach(x=>x.classList.remove('active'));c.classList.add('active');
    drawer.classList.remove('open');document.getElementById('dhint').textContent='pull up ↑';});
  dgrid.appendChild(c);});
setHero(P.find(p=>p[1]==='istanbul'));
// drawer toggle
const drawer=document.getElementById('drawer'),handle=document.getElementById('handle'),dhint=document.getElementById('dhint');
function toggle(){drawer.classList.toggle('open');dhint.textContent=drawer.classList.contains('open')?'tap a cover':'pull up ↑';}
handle.addEventListener('click',toggle);
document.querySelector('.dhead').addEventListener('click',toggle);
// simple drag
let sy=0,drag=false;
handle.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;drag=true;},{passive:true});
handle.addEventListener('touchmove',e=>{if(!drag)return;const dy=e.touches[0].clientY-sy;if(dy<-30){drawer.classList.add('open');dhint.textContent='tap a cover';drag=false;}if(dy>30){drawer.classList.remove('open');dhint.textContent='pull up ↑';drag=false;}},{passive:true});
handle.addEventListener('touchend',()=>drag=false);
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);
  document.querySelectorAll('.cell').forEach(c=>{c.style.display=!v||c.dataset.s.includes(v)?'':'none';});});
</script>
</body>
</html>
