<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Muğla — TR81 · A</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}
:focus-visible{outline:2px solid rgba(255,255,255,.85);outline-offset:2px;border-radius:6px;}
.app{max-width:560px;margin:0 auto;min-height:100vh;background:#08080b;box-shadow:0 0 80px rgba(0,0,0,.7);position:relative;}

/* top bar */
.top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:14px;padding:max(14px,env(safe-area-inset-top)) 18px 12px;
  background:linear-gradient(180deg,rgba(8,8,11,.92),rgba(8,8,11,.55) 70%,transparent);backdrop-filter:blur(8px);}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;}
.back svg{width:20px;height:20px;}
.top .ttl{flex:1;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.05em;line-height:1;}
.gift{width:38px;height:38px;flex:none;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(227,197,144,.6);color:var(--gold);display:flex;align-items:center;justify-content:center;}
.gift svg{width:19px;height:19px;}

/* intro */
.intro{padding:18px 22px 8px;}
.kick{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3.4rem,17vw,5.4rem);line-height:.86;letter-spacing:.01em;}
.intro .sub{margin-top:12px;color:rgba(255,255,255,.82);font-size:1.04rem;line-height:1.5;max-width:430px;}
.intro .cnt{margin-top:14px;display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9aa4b2;font-weight:700;}
.intro .cnt::before{content:'';width:24px;height:1px;background:rgba(255,255,255,.3);}

/* location blocks */
main{padding:26px 22px 40px;display:flex;flex-direction:column;gap:46px;}
.loc{position:relative;}
.loc .no{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.1em;color:var(--gold);opacity:.8;}
.lead{position:relative;margin-top:8px;border-radius:22px;overflow:hidden;aspect-ratio:16/11;box-shadow:0 26px 54px rgba(0,0,0,.55);cursor:pointer;background:#15161d;}
.lead img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.2,.7,.3,1);}
.lead:active img{transform:scale(1.04);}
.lead::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 38%,rgba(0,0,0,.72));}
.lead .nm{position:absolute;left:18px;bottom:16px;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:2.3rem;line-height:1;letter-spacing:.02em;text-shadow:0 2px 16px rgba(0,0,0,.6);padding-right:14px;}
.lead .zoom{position:absolute;top:14px;right:14px;z-index:2;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.45);backdrop-filter:blur(5px);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;}
.lead .zoom svg{width:16px;height:16px;}
.row{display:flex;gap:12px;margin-top:12px;align-items:center;}
.thumbs{display:flex;gap:10px;flex:1;}
.thumbs .t{flex:1;aspect-ratio:1;border-radius:14px;overflow:hidden;cursor:pointer;position:relative;background:#15161d;}
.thumbs .t img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.thumbs .t:active img{transform:scale(1.06);}
.maps{flex:none;display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#1a1407;font-weight:700;font-size:14px;padding:13px 18px;border-radius:14px;text-decoration:none;box-shadow:0 10px 26px rgba(227,197,144,.22);}
.maps svg{width:17px;height:17px;}

.ft{text-align:center;padding:10px 0 max(30px,env(safe-area-inset-bottom));color:#5a606c;font-size:11px;letter-spacing:.28em;text-transform:uppercase;font-weight:600;}

/* ---- shared lightbox ---- */
.lb{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.94);display:flex;align-items:center;justify-content:center;flex-direction:column;
  opacity:0;visibility:hidden;transition:opacity .25s,visibility 0s linear .25s;touch-action:none;}
.lb.open{opacity:1;visibility:visible;transition:opacity .25s;}
.lb img{max-width:94vw;max-height:74vh;object-fit:contain;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.7);}
.lb .lbx{position:absolute;top:max(16px,env(safe-area-inset-top));right:16px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.lb .lbcap{margin-top:18px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.03em;}
.lb .lbdots{display:flex;gap:7px;margin-top:12px;}
.lb .lbdots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);}
.lb .lbdots i.on{background:var(--gold);}
.lb .nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.lb .nav.l{left:10px;}.lb .nav.r{right:10px;}
@media(min-width:560px){.intro h1{font-size:5.4rem;}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="ttl">Muğla</div>
    <span class="gift" aria-label="Ücretsiz"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="8.5" width="17" height="4" rx="1"/><path d="M12 8.5V21"/><path d="M18.5 12.5v6.4a1.6 1.6 0 0 1-1.6 1.6H7.1a1.6 1.6 0 0 1-1.6-1.6v-6.4"/><path d="M7.6 8.5a2.5 2.5 0 0 1 0-5C10.3 3.5 12 8.5 12 8.5s1.7-5 4.4-5a2.5 2.5 0 0 1 0 5"/></svg></span>
  </header>

  <section class="intro">
    <div class="kick">Ege • Türkiye</div>
    <h1>Muğla</h1>
    <p class="sub" id="sub"></p>
    <div class="cnt" id="cnt"></div>
  </section>

  <main id="list"></main>
  <div class="ft">tr81.tr</div>
</div>

<div class="lb" id="lb" role="dialog" aria-modal="true">
  <div class="lbx" id="lbx" role="button" aria-label="Kapat">✕</div>
  <div class="nav l" id="lbprev" role="button" aria-label="Önceki">‹</div>
  <img id="lbimg" alt="">
  <div class="nav r" id="lbnext" role="button" aria-label="Sonraki">›</div>
  <div class="lbcap" id="lbcap"></div>
  <div class="lbdots" id="lbdots"></div>
</div>

<script>
const LANG=(navigator.language||'tr').toLowerCase().startsWith('tr')?'tr':'en';
const TX=LANG==='tr'
  ?{sub:"Muğla'nın en manzaralı konumları — fotoğrafa dokun, büyüt; yol tarifi için konuma git.",cnt:n=>n+' konum',maps:'Yol tarifi'}
  :{sub:"Muğla's most scenic spots — tap a photo to zoom, open the location for directions.",cnt:n=>n+' locations',maps:'Directions'};
const CDN='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/';
const img=id=>CDN+id+'/public';
const LOCS=[
  {name:'İztuzu Manzara Noktası',map:'https://www.google.com/maps/place/Iztuzu+View+Point/@36.7682289,28.6117555,13.83z',photos:['mugla_iztuzu_manzara_noktasi_1','mugla_iztuzu_manzara_noktasi_2','mugla_iztuzu_manzara_noktasi_3']},
  {name:'Kelebekler Vadisi',map:'https://maps.google.com/?q=Kelebekler+Vadisi%2C+Mu%C4%9Fla',photos:['mugla_kelebekler_vadisi_1','mugla_kelebekler_vadisi_2','mugla_kelebekler_vadisi_3']},
  {name:'Ölüdeniz',map:'https://maps.google.com/?q=%C3%96l%C3%BCdeniz%2C+Mu%C4%9Fla',photos:['mugla_oludeniz_1','mugla_oludeniz_2','mugla_oludeniz_3']},
  {name:'Montana Seyir Tepesi',map:'https://www.google.com/maps/place/Montana+Seyir+Tepesi/@36.5454469,29.133872,17z',photos:['mugla_montana_seyir_tepesi_1','mugla_montana_seyir_tepesi_2','mugla_montana_seyir_tepesi_3']}
];
document.getElementById('sub').textContent=TX.sub;
document.getElementById('cnt').textContent=TX.cnt(LOCS.length);

const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const ZOOM='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10.5" cy="10.5" r="6"/><path d="m20 20-4.5-4.5M10.5 8v5M8 10.5h5"/></svg>';

const list=document.getElementById('list');
LOCS.forEach((loc,li)=>{
  const el=document.createElement('div');el.className='loc';
  el.innerHTML=`
    <div class="no">${String(li+1).padStart(2,'0')}</div>
    <div class="lead" data-l="${li}" data-p="0">
      <img src="${img(loc.photos[0])}" alt="${loc.name}" loading="lazy">
      <div class="zoom">${ZOOM}</div>
      <div class="nm">${loc.name}</div>
    </div>
    <div class="row">
      <div class="thumbs">
        ${loc.photos.slice(1).map((p,i)=>`<div class="t" data-l="${li}" data-p="${i+1}"><img src="${img(p)}" alt="${loc.name}" loading="lazy"></div>`).join('')}
      </div>
      <a class="maps" href="${loc.map}" target="_blank" rel="noopener">${PIN}<span>${TX.maps}</span></a>
    </div>`;
  list.appendChild(el);
});

/* ---- lightbox ---- */
const lb=document.getElementById('lb'),lbimg=document.getElementById('lbimg'),lbcap=document.getElementById('lbcap'),lbdots=document.getElementById('lbdots');
let curL=0,curP=0;
function showLB(){const loc=LOCS[curL];lbimg.src=img(loc.photos[curP]);lbcap.textContent=loc.name;
  lbdots.innerHTML=loc.photos.map((_,i)=>`<i class="${i===curP?'on':''}"></i>`).join('');}
function openLB(l,p){curL=l;curP=p;showLB();lb.classList.add('open');}
function closeLB(){lb.classList.remove('open');}
function step(d){const n=LOCS[curL].photos.length;curP=(curP+d+n)%n;showLB();}
list.addEventListener('click',e=>{const t=e.target.closest('[data-l]');if(!t)return;openLB(+t.dataset.l,+t.dataset.p);});
document.getElementById('lbx').onclick=closeLB;
document.getElementById('lbprev').onclick=()=>step(-1);
document.getElementById('lbnext').onclick=()=>step(1);
lb.addEventListener('click',e=>{if(e.target===lb)closeLB();});
document.addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;if(e.key==='Escape')closeLB();if(e.key==='ArrowRight')step(1);if(e.key==='ArrowLeft')step(-1);});
let sx=null;lb.addEventListener('touchstart',e=>sx=e.touches[0].clientX,{passive:true});
lb.addEventListener('touchend',e=>{if(sx===null)return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>45)step(dx<0?1:-1);sx=null;});
</script>
</body>
</html>
