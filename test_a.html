<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept A · Catalog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0a0d;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#0a0a0d;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);overflow:hidden;}
.bar{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;}
.logo{font-weight:800;font-size:19px;letter-spacing:-.01em;}
.logo b{color:#e11d2a;}
.bar .ic{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;font-size:16px;}
/* hero */
.hero{position:relative;height:74vh;min-height:480px;display:flex;flex-direction:column;justify-content:flex-end;padding:30px 24px 26px;
  background-size:cover;background-position:center;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,13,.5) 0%,rgba(10,10,13,0) 30%,rgba(10,10,13,.25) 55%,rgba(10,10,13,.98) 100%);}
.hero>*{position:relative;z-index:2;}
.hero .kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf8a;font-weight:700;margin-bottom:10px;}
.hero h1{font-size:clamp(3rem,15vw,4.6rem);font-weight:800;line-height:.95;letter-spacing:-.02em;text-shadow:0 2px 30px rgba(0,0,0,.5);}
.hero p{margin-top:12px;color:rgba(255,255,255,.85);font-size:14px;max-width:300px;}
.btns{display:flex;gap:12px;margin-top:22px;}
.btns a{display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:15px;padding:13px 22px;border-radius:12px;}
.btns .pri{background:#fff;color:#111;}
.btns .sec{background:rgba(255,255,255,.18);backdrop-filter:blur(6px);color:#fff;}
/* search */
.search{margin:18px 18px 4px;position:relative;}
.search input{width:100%;border:0;background:#16161c;border-radius:11px;padding:13px 13px 13px 42px;font-size:15px;font-family:inherit;color:#fff;}
.search input::placeholder{color:#6b6f7a;}
.search input:focus{outline:1px solid #3a3a44;}
.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#6b6f7a;}
/* rows */
.rows{padding:8px 0 50px;}
.row{margin-top:22px;}
.row h2{font-size:1.05rem;font-weight:700;padding:0 18px 11px;}
.scroller{display:flex;gap:11px;overflow-x:auto;padding:0 18px;scrollbar-width:none;}
.scroller::-webkit-scrollbar{display:none;}
.poster{flex:none;width:124px;cursor:pointer;}
.poster .im{height:176px;border-radius:13px;position:relative;overflow:hidden;background-size:cover;background-position:center;box-shadow:0 8px 20px rgba(0,0,0,.4);}
.poster .im::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,.8));}
.poster .im .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.85;}
.poster .pl{position:absolute;top:8px;left:8px;z-index:3;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);border-radius:7px;padding:3px 8px;font-size:12px;font-weight:800;}
.poster .nm{position:absolute;left:10px;right:10px;bottom:9px;z-index:3;font-size:.98rem;font-weight:700;line-height:1.05;text-shadow:0 1px 8px rgba(0,0,0,.6);}
.poster:active{transform:scale(.97);}
.empty{display:none;text-align:center;color:#6b6f7a;padding:40px 0;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="bar"><div class="logo">TR<b>81</b></div><div class="ic">🔍</div></div>
  <div class="hero" id="hero">
    <div class="kx">★ Featured province</div>
    <h1 id="hname">Antalya</h1>
    <p id="hsub">The turquoise coast of the Mediterranean — beaches, canyons and waterfalls.</p>
    <div class="btns"><a class="pri" id="hgo" href="antalya.html">▶ Explore</a><a class="sec" href="#all">≡ All 81</a></div>
  </div>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="q" type="text" placeholder="Search a province…">
  </div>
  <div class="rows" id="rows"></div>
  <div class="empty" id="empty">No province found.</div>
</div>
<script>
const REG=[['medit','Mediterranean','#0f9d8f'],['marmara','Marmara','#2563eb'],['aegean','Aegean','#0891b2'],['black','Black Sea','#16a34a'],['central','Central Anatolia','#d97706'],['east','Eastern Anatolia','#7c3aed'],['southeast','Southeastern Anatolia','#db2777']];
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyonkarahisar','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','Kahramanmaraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const rows=document.getElementById('rows');
function poster([n,slug,name,rk],color){const a=document.createElement('a');a.href=slug+'.html';a.className='poster';a.dataset.s=norm(name);
  a.innerHTML=`<div class="im" style="background-image:url('${IMG[n%2]}')"><div class="tint" style="background:${color}"></div><span class="pl">${String(n).padStart(2,'0')}</span><span class="nm">${name}</span></div>`;return a;}
// trending row
const TR=[7,34,61,50,35,48,53,21];
const trend=document.createElement('div');trend.className='row';trend.innerHTML='<h2>🔥 Trending now</h2>';const ts=document.createElement('div');ts.className='scroller';
TR.forEach(code=>{const p=P.find(x=>x[0]===code);ts.appendChild(poster(p,REG.find(r=>r[0]===p[3])[2]));});trend.appendChild(ts);rows.appendChild(trend);
// region rows
REG.forEach(([key,label,color])=>{const list=P.filter(p=>p[3]===key);const row=document.createElement('div');row.className='row';row.dataset.region=key;
  row.innerHTML=`<h2>${label}</h2>`;const sc=document.createElement('div');sc.className='scroller';
  list.forEach(p=>sc.appendChild(poster(p,color)));row.appendChild(sc);rows.appendChild(row);});
// search
const empty=document.getElementById('empty');
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);let any=false;
  document.querySelectorAll('.row').forEach(row=>{let shown=0;row.querySelectorAll('.poster').forEach(p=>{const vis=!v||p.dataset.s.includes(v);p.style.display=vis?'':'none';if(vis)shown++;});row.style.display=shown?'':'none';if(shown)any=true;});
  document.getElementById('hero').style.display=v?'none':'';empty.style.display=any?'none':'block';});
</script>
</body>
</html>
