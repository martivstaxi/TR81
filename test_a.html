<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TR81 — Concept A · Vibrant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Nunito',sans-serif;color:#3b2b4a;min-height:100vh;
  background:
    radial-gradient(1100px 600px at 10% -5%, #ffd6a5 0%, transparent 55%),
    radial-gradient(900px 600px at 100% 0%, #ffadc6 0%, transparent 50%),
    radial-gradient(900px 700px at 50% 120%, #a0e7e5 0%, transparent 55%),
    linear-gradient(160deg,#fff7f0,#fdf0f6 60%,#eafaf8);
  background-attachment:fixed;
}
.back{position:fixed;top:16px;left:16px;z-index:20;background:#fff;border-radius:999px;padding:8px 14px;font-weight:700;font-size:13px;color:#7a5cff;box-shadow:0 6px 18px rgba(122,92,255,.18);}
.hero{text-align:center;padding:90px 20px 30px;}
.hero .tag{display:inline-block;background:#fff;color:#ff7a59;font-weight:800;font-size:13px;letter-spacing:.04em;padding:8px 18px;border-radius:999px;box-shadow:0 8px 22px rgba(255,122,89,.22);margin-bottom:22px;}
.hero h1{font-family:'Poppins',sans-serif;font-weight:800;font-size:clamp(2.4rem,7vw,4.2rem);line-height:1.05;color:#3b2b4a;}
.hero h1 span{background:linear-gradient(90deg,#ff7a59,#ff4d8d,#7a5cff);-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero p{max-width:520px;margin:16px auto 0;font-size:1.15rem;font-weight:600;color:#7c6b8a;}
.search{max-width:480px;margin:28px auto 0;position:relative;}
.search input{width:100%;padding:18px 24px;font-size:16px;font-family:inherit;font-weight:600;border:3px solid #fff;border-radius:999px;background:rgba(255,255,255,.85);box-shadow:0 14px 34px rgba(122,92,255,.18);color:#3b2b4a;}
.search input:focus{outline:none;border-color:#ffb3c8;}
.grid{max-width:1080px;margin:40px auto 70px;padding:0 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.tile{
  border-radius:22px;padding:22px 16px;text-align:center;cursor:pointer;color:#fff;font-family:'Poppins',sans-serif;
  font-weight:700;position:relative;overflow:hidden;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 12px 26px rgba(60,30,80,.14);transition:transform .2s ease, box-shadow .2s ease;
}
.tile:hover{transform:translateY(-6px) rotate(-1deg) scale(1.03);box-shadow:0 20px 40px rgba(60,30,80,.22);}
.tile .plate{font-size:12px;font-weight:800;opacity:.9;background:rgba(255,255,255,.25);padding:3px 10px;border-radius:999px;}
.tile .nm{font-size:1.12rem;line-height:1.15;}
.c0{background:linear-gradient(135deg,#ff9a8b,#ff6a88);}
.c1{background:linear-gradient(135deg,#5ee7df,#2ea7c9);}
.c2{background:linear-gradient(135deg,#a18cd1,#7a5cff);}
.c3{background:linear-gradient(135deg,#ffd26f,#ff8c42);}
.c4{background:linear-gradient(135deg,#84fab0,#23b07d);}
.c5{background:linear-gradient(135deg,#ff80b5,#ff4d8d);}
@media(max-width:520px){.grid{grid-template-columns:repeat(2,1fr);gap:10px;}.hero{padding:74px 18px 20px;}}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="hero">
  <span class="tag">🇹🇷 81 provinces · endless views</span>
  <h1>Explore <span>Türkiye</span></h1>
  <p>Pick a province and dive into its most beautiful scenery.</p>
  <div class="search"><input id="q" type="text" placeholder="🔍  Search a province…"></div>
</div>
<div class="grid" id="grid"></div>
<script>
const P=[[1,'adana','Adana'],[2,'adiyaman','Adıyaman'],[3,'afyon','Afyonkarahisar'],[4,'agri','Ağrı'],[5,'amasya','Amasya'],[6,'ankara','Ankara'],[7,'antalya','Antalya'],[8,'artvin','Artvin'],[9,'aydin','Aydın'],[10,'balikesir','Balıkesir'],[11,'bilecik','Bilecik'],[12,'bingol','Bingöl'],[13,'bitlis','Bitlis'],[14,'bolu','Bolu'],[15,'burdur','Burdur'],[16,'bursa','Bursa'],[17,'canakkale','Çanakkale'],[18,'cankiri','Çankırı'],[19,'corum','Çorum'],[20,'denizli','Denizli'],[21,'diyarbakir','Diyarbakır'],[22,'edirne','Edirne'],[23,'elazig','Elazığ'],[24,'erzincan','Erzincan'],[25,'erzurum','Erzurum'],[26,'eskisehir','Eskişehir'],[27,'gaziantep','Gaziantep'],[28,'giresun','Giresun'],[29,'gumushane','Gümüşhane'],[30,'hakkari','Hakkari'],[31,'hatay','Hatay'],[32,'isparta','Isparta'],[33,'mersin','Mersin'],[34,'istanbul','İstanbul'],[35,'izmir','İzmir'],[36,'kars','Kars'],[37,'kastamonu','Kastamonu'],[38,'kayseri','Kayseri'],[39,'kirklareli','Kırklareli'],[40,'kirsehir','Kırşehir'],[41,'kocaeli','Kocaeli'],[42,'konya','Konya'],[43,'kutahya','Kütahya'],[44,'malatya','Malatya'],[45,'manisa','Manisa'],[46,'kahramanmaras','Kahramanmaraş'],[47,'mardin','Mardin'],[48,'mugla','Muğla'],[49,'mus','Muş'],[50,'nevsehir','Nevşehir'],[51,'nigde','Niğde'],[52,'ordu','Ordu'],[53,'rize','Rize'],[54,'sakarya','Sakarya'],[55,'samsun','Samsun'],[56,'siirt','Siirt'],[57,'sinop','Sinop'],[58,'sivas','Sivas'],[59,'tekirdag','Tekirdağ'],[60,'tokat','Tokat'],[61,'trabzon','Trabzon'],[62,'tunceli','Tunceli'],[63,'sanliurfa','Şanlıurfa'],[64,'usak','Uşak'],[65,'van','Van'],[66,'yozgat','Yozgat'],[67,'zonguldak','Zonguldak'],[68,'aksaray','Aksaray'],[69,'bayburt','Bayburt'],[70,'karaman','Karaman'],[71,'kirikkale','Kırıkkale'],[72,'batman','Batman'],[73,'sirnak','Şırnak'],[74,'bartin','Bartın'],[75,'ardahan','Ardahan'],[76,'igdir','Iğdır'],[77,'yalova','Yalova'],[78,'karabuk','Karabük'],[79,'kilis','Kilis'],[80,'osmaniye','Osmaniye'],[81,'duzce','Düzce']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const g=document.getElementById('grid');
P.forEach(([n,slug,name],i)=>{const a=document.createElement('a');a.href=slug+'.html';a.className='tile c'+(i%6);a.dataset.s=norm(name);a.innerHTML=`<span class="plate">${String(n).padStart(2,'0')}</span><span class="nm">${name}</span>`;g.appendChild(a);});
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);document.querySelectorAll('.tile').forEach(t=>t.style.display=t.dataset.s.includes(v)?'':'none');});
</script>
</body>
</html>
