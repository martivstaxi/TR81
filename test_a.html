<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept A · Swipe Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Sora',sans-serif;background:#07080c;color:#fff;overflow:hidden;}
.back{position:fixed;top:12px;left:12px;z-index:80;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.phone{max-width:440px;height:100vh;height:100dvh;margin:0 auto;position:relative;background:#07080c;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.6);display:flex;flex-direction:column;}
.hd{text-align:center;padding:22px 20px 8px;z-index:10;}
.hd .k{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#8a93a6;}
.hd h1{font-size:20px;font-weight:800;margin-top:3px;}
.deck{flex:1;display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;scrollbar-width:none;align-items:center;gap:14px;padding:6px 28px 28px;}
.deck::-webkit-scrollbar{display:none;}
.cd{flex:none;width:84%;height:78%;scroll-snap-align:center;border-radius:28px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:24px;
  background-size:cover;background-position:center;box-shadow:0 24px 50px rgba(0,0,0,.5);}
.cd::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.3) 0%,rgba(0,0,0,0) 32%,rgba(0,0,0,.85) 100%);}
.cd>*{position:relative;z-index:2;}
.cd .plate{position:absolute;top:20px;left:20px;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:7px 13px;font-weight:800;font-size:16px;}
.cd .rg{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.85);}
.cd h2{font-size:2.4rem;font-weight:800;line-height:1;margin:5px 0 16px;}
.cd .go{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;background:#fff;color:#111;font-weight:700;font-size:14px;padding:12px 22px;border-radius:999px;}
.foot{text-align:center;padding:0 0 26px;color:#8a93a6;font-size:12px;letter-spacing:.12em;text-transform:uppercase;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="phone">
  <div class="hd"><div class="k">TR · 81 Provinces</div><h1>Swipe to explore 🇹🇷</h1></div>
  <div class="deck" id="deck"></div>
  <div class="foot">← swipe sideways →</div>
</div>
<script>
const R={marmara:'Marmara',aegean:'Aegean',medit:'Mediterranean',central:'Central Anatolia',black:'Black Sea',east:'Eastern Anatolia',southeast:'Southeastern Anatolia'};
const IMG='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public';
const P=[[7,'antalya','Antalya','medit'],[34,'istanbul','İstanbul','marmara'],[61,'trabzon','Trabzon','black'],[35,'izmir','İzmir','aegean'],[50,'nevsehir','Nevşehir','central'],[48,'mugla','Muğla','aegean'],[6,'ankara','Ankara','central'],[21,'diyarbakir','Diyarbakır','southeast'],[25,'erzurum','Erzurum','east'],[53,'rize','Rize','black'],[16,'bursa','Bursa','marmara'],[65,'van','Van','east'],[31,'hatay','Hatay','medit'],[42,'konya','Konya','central'],[1,'adana','Adana','medit'],[55,'samsun','Samsun','black']];
const deck=document.getElementById('deck');
P.forEach(([n,slug,name,rk],i)=>{const a=document.createElement('a');a.href=slug+'.html';a.className='cd';
  a.style.backgroundImage=`url('${IMG}')`;a.style.filter=`hue-rotate(${(i*23)%60-30}deg) saturate(1.05)`;
  a.innerHTML=`<span class="plate">🇹🇷 ${String(n).padStart(2,'0')}</span><div class="rg">${R[rk]}</div><h2>${name}</h2><span class="go">Explore →</span>`;
  deck.appendChild(a);});
</script>
</body>
</html>
