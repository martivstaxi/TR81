<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept A · Travel App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#e9ebf0;color:#11161d;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:10px;left:10px;z-index:60;background:#fff;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;color:#2563eb;box-shadow:0 4px 14px rgba(0,0,0,.12);}
/* phone frame */
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#f6f7f9;position:relative;padding:0 0 92px;box-shadow:0 0 60px rgba(0,0,0,.12);}
.top{display:flex;align-items:center;justify-content:space-between;padding:22px 20px 6px;}
.hi{font-size:13px;color:#7b8595;font-weight:600;}
.hi b{display:block;font-size:20px;color:#11161d;font-weight:800;margin-top:2px;}
.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:18px;}
.search{margin:14px 20px 6px;position:relative;}
.search input{width:100%;border:0;background:#fff;border-radius:16px;padding:15px 16px 15px 46px;font-size:15px;font-family:inherit;box-shadow:0 6px 18px rgba(17,22,29,.06);}
.search input:focus{outline:2px solid #2563eb;}
.search svg{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:#9aa4b2;}
.chips{display:flex;gap:9px;overflow-x:auto;padding:14px 20px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex:none;font-size:13px;font-weight:600;color:#5b6573;background:#fff;border:1px solid #eceef2;padding:9px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.18s;}
.chip.active{background:#11161d;color:#fff;border-color:#11161d;}
/* featured */
.feat{margin:6px 20px 4px;border-radius:24px;overflow:hidden;position:relative;height:210px;color:#fff;display:flex;flex-direction:column;justify-content:flex-end;padding:20px;
  background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.65)),url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public');background-size:cover;background-position:center;}
.feat .badge{position:absolute;top:16px;left:16px;background:rgba(255,255,255,.22);backdrop-filter:blur(6px);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 12px;border-radius:999px;}
.feat h3{font-size:1.7rem;font-weight:800;}
.feat p{font-size:13px;opacity:.9;margin-top:2px;}
.sect{display:flex;align-items:center;justify-content:space-between;padding:24px 20px 10px;}
.sect h2{font-size:1.05rem;font-weight:800;}
.sect span{font-size:13px;color:#9aa4b2;font-weight:600;}
.list{padding:0 14px;}
.row{display:flex;align-items:center;gap:14px;background:#fff;border-radius:16px;padding:12px 14px;margin:0 6px 10px;cursor:pointer;transition:.16s;box-shadow:0 3px 10px rgba(17,22,29,.04);}
.row:active{transform:scale(.98);}
.plate{flex:none;width:50px;height:46px;border-radius:11px;background:linear-gradient(135deg,#eef2ff,#e0f2fe);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#2563eb;}
.row .nm{flex:1;font-weight:700;font-size:1rem;}
.row .rg{font-size:12px;color:#9aa4b2;font-weight:600;}
.row .cv{color:#c3cad4;}
/* bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid #eceef2;display:flex;justify-content:space-around;padding:12px 0 calc(12px + env(safe-area-inset-bottom));}
.nav a{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:#aab2bd;}
.nav a.on{color:#2563eb;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="top">
    <div class="hi">Welcome to<b>Discover Türkiye 🇹🇷</b></div>
    <div class="av">🧭</div>
  </div>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="q" type="text" placeholder="Search a province…">
  </div>
  <div class="chips" id="chips"></div>
  <div class="feat">
    <span class="badge">★ Featured</span>
    <h3>Antalya</h3>
    <p>Turquoise coast · Mediterranean</p>
  </div>
  <div class="sect"><h2>All Provinces</h2><span id="count">81</span></div>
  <div class="list" id="list"></div>
</div>
<div class="nav">
  <a class="on"><span>🏠</span>Home</a>
  <a><span>🔍</span>Explore</a>
  <a><span>♥</span>Saved</a>
  <a><span>👤</span>Profile</a>
</div>
<script>
const R={marmara:'Marmara',aegean:'Aegean',medit:'Mediterranean',central:'Central',black:'Black Sea',east:'Eastern',southeast:'Southeastern'};
const P=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyonkarahisar','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','Kahramanmaraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const list=document.getElementById('list'),chips=document.getElementById('chips'),count=document.getElementById('count');
let region='all',q='';
P.forEach(([n,slug,name,rk])=>{const a=document.createElement('a');a.href=slug+'.html';a.className='row';a.dataset.r=rk;a.dataset.s=norm(name);a.innerHTML=`<span class="plate">${String(n).padStart(2,'0')}</span><span class="nm">${name}<div class="rg">${R[rk]}</div></span><span class="cv">›</span>`;list.appendChild(a);});
function mkchip(k,l){const c=document.createElement('button');c.className='chip'+(k==='all'?' active':'');c.textContent=l;c.onclick=()=>{region=k;document.querySelectorAll('.chip').forEach((x,i)=>x.classList.toggle('active',x===c));apply();};chips.appendChild(c);}
mkchip('all','All');Object.entries(R).forEach(([k,l])=>mkchip(k,l));
function apply(){let n=0;document.querySelectorAll('.row').forEach(c=>{const v=(region==='all'||c.dataset.r===region)&&(!q||c.dataset.s.includes(q));c.style.display=v?'':'none';if(v)n++;});count.textContent=n;}
document.getElementById('q').addEventListener('input',e=>{q=norm(e.target.value);apply();});
</script>
</body>
</html>
