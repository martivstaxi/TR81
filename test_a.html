<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept A · Lightbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.phone{max-width:440px;height:100vh;height:100dvh;margin:0 auto;position:relative;background:#000;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.6);}
#hero{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 6s ease-out;transform:scale(1.06);}
.scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 28%,rgba(0,0,0,.2) 55%,rgba(0,0,0,.92) 100%);z-index:1;}
.topbar{position:absolute;top:16px;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:0 18px;}
.brand{font-weight:800;letter-spacing:.04em;font-size:15px;text-shadow:0 1px 8px rgba(0,0,0,.6);}
.sicon{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;}
.content{position:absolute;left:0;right:0;bottom:128px;z-index:5;padding:0 26px;}
.plate{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:6px 12px;font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:.05em;}
.rg{margin-top:14px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.8);}
#name{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3.6rem,17vw,6rem);line-height:.88;margin:4px 0 18px;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.explore{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 26px;border-radius:999px;}
/* filmstrip */
.strip{position:absolute;left:0;right:0;bottom:0;z-index:6;display:flex;gap:10px;overflow-x:auto;padding:16px 18px calc(20px + env(safe-area-inset-bottom));scrollbar-width:none;
  background:linear-gradient(180deg,transparent,rgba(0,0,0,.5));}
.strip::-webkit-scrollbar{display:none;}
.th{flex:none;width:62px;height:84px;border-radius:14px;overflow:hidden;position:relative;cursor:pointer;border:2px solid transparent;background-size:cover;background-position:center;opacity:.6;transition:.2s;}
.th.on{opacity:1;border-color:#fff;transform:translateY(-4px);}
.th span{position:absolute;left:0;right:0;bottom:0;font-size:9px;font-weight:700;text-align:center;padding:3px 2px;background:linear-gradient(transparent,rgba(0,0,0,.8));}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="phone">
  <div id="hero"></div>
  <div class="scrim"></div>
  <div class="topbar"><div class="brand">TR&nbsp;81 · Türkiye</div><div class="sicon">🔍</div></div>
  <div class="content">
    <span class="plate" id="plate">🇹🇷 07</span>
    <div class="rg" id="rg">Mediterranean</div>
    <h1 id="name">Antalya</h1>
    <a class="explore" id="explore" href="antalya.html">Explore →</a>
  </div>
  <div class="strip" id="strip"></div>
</div>
<script>
const R={marmara:'Marmara',aegean:'Aegean',medit:'Mediterranean',central:'Central Anatolia',black:'Black Sea',east:'Eastern Anatolia',southeast:'Southeastern Anatolia'};
const IMG='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public';
const P=[[7,'antalya','Antalya','medit'],[34,'istanbul','İstanbul','marmara'],[61,'trabzon','Trabzon','black'],[35,'izmir','İzmir','aegean'],[50,'nevsehir','Nevşehir','central'],[48,'mugla','Muğla','aegean'],[53,'rize','Rize','black'],[21,'diyarbakir','Diyarbakır','southeast'],[25,'erzurum','Erzurum','east'],[6,'ankara','Ankara','central'],[16,'bursa','Bursa','marmara'],[65,'van','Van','east'],[31,'hatay','Hatay','medit'],[42,'konya','Konya','central'],[1,'adana','Adana','medit'],[55,'samsun','Samsun','black'],[8,'artvin','Artvin','black'],[63,'sanliurfa','Şanlıurfa','southeast']];
const hero=document.getElementById('hero'),strip=document.getElementById('strip');
function bg(i){return `url('${IMG}')`;}
function fil(i){return `hue-rotate(${(i*23)%60-30}deg) saturate(1.05)`;}
function set(i){const [n,slug,name,rk]=P[i];
  hero.style.backgroundImage=bg(i);hero.style.filter=fil(i);
  hero.style.transform='scale(1.0)';hero.animate([{opacity:.35},{opacity:1}],{duration:450});
  requestAnimationFrame(()=>{hero.style.transform='scale(1.06)';});
  document.getElementById('plate').textContent='🇹🇷 '+String(n).padStart(2,'0');
  document.getElementById('rg').textContent=R[rk];
  document.getElementById('name').textContent=name;
  document.getElementById('explore').href=slug+'.html';
  document.querySelectorAll('.th').forEach((t,j)=>t.classList.toggle('on',j===i));
}
P.forEach(([n,slug,name,rk],i)=>{const t=document.createElement('div');t.className='th';t.style.backgroundImage=bg(i);t.style.filter=fil(i);t.innerHTML=`<span>${name}</span>`;t.onclick=()=>set(i);strip.appendChild(t);});
set(0);
</script>
</body>
</html>
