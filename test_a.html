<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept A · Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;}
.back{position:fixed;top:14px;left:14px;z-index:90;color:rgba(255,255,255,.6);font-size:12px;font-weight:500;letter-spacing:.05em;}
.stage{position:relative;height:100vh;height:100dvh;max-width:440px;margin:0 auto;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 30px;box-shadow:0 0 60px rgba(0,0,0,.6);}
.bg{position:absolute;inset:0;background:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public') center/cover;transform:scale(1.08);animation:drift 22s ease-in-out infinite alternate;}
@keyframes drift{from{transform:scale(1.08) translate(0,0)}to{transform:scale(1.16) translate(-2%,-2%)}}
.bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.62);}
.inner{position:relative;z-index:2;width:100%;text-align:center;transition:transform .4s ease;}
.mark{font-size:12px;letter-spacing:.45em;text-transform:uppercase;color:rgba(255,255,255,.65);margin-bottom:20px;}
.inner h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(4rem,22vw,7rem);line-height:.9;text-shadow:0 2px 30px rgba(0,0,0,.5);}
.sub{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-top:8px;}
.search{margin:34px auto 0;max-width:300px;position:relative;}
.search input{width:100%;background:transparent;border:0;border-bottom:1px solid rgba(255,255,255,.4);padding:12px 4px;color:#fff;font-size:17px;font-family:inherit;text-align:center;letter-spacing:.02em;}
.search input::placeholder{color:rgba(255,255,255,.45);}
.search input:focus{outline:none;border-color:#fff;}
.results{position:relative;z-index:2;width:100%;max-width:300px;margin:18px auto 0;max-height:34vh;overflow-y:auto;scrollbar-width:none;}
.results::-webkit-scrollbar{display:none;}
.results a{display:flex;align-items:baseline;gap:12px;justify-content:center;padding:11px 0;color:#fff;border-bottom:1px solid rgba(255,255,255,.08);font-size:1.05rem;}
.results a .no{font-family:'Bebas Neue';color:rgba(255,255,255,.5);font-size:1rem;}
.results a:active{opacity:.6;}
.empty{color:rgba(255,255,255,.4);font-size:13px;text-align:center;padding-top:8px;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="stage">
  <div class="bg"></div>
  <div class="inner">
    <div class="mark">TR 81</div>
    <h1>Türkiye</h1>
    <div class="sub">81 provinces · one country</div>
    <div class="search"><input id="q" type="text" placeholder="Type a province…" autocomplete="off"></div>
  </div>
  <div class="results" id="res"></div>
</div>
<script>
const P=[[1,'adana','Adana'],[2,'adiyaman','Adıyaman'],[3,'afyon','Afyonkarahisar'],[4,'agri','Ağrı'],[5,'amasya','Amasya'],[6,'ankara','Ankara'],[7,'antalya','Antalya'],[8,'artvin','Artvin'],[9,'aydin','Aydın'],[10,'balikesir','Balıkesir'],[11,'bilecik','Bilecik'],[12,'bingol','Bingöl'],[13,'bitlis','Bitlis'],[14,'bolu','Bolu'],[15,'burdur','Burdur'],[16,'bursa','Bursa'],[17,'canakkale','Çanakkale'],[18,'cankiri','Çankırı'],[19,'corum','Çorum'],[20,'denizli','Denizli'],[21,'diyarbakir','Diyarbakır'],[22,'edirne','Edirne'],[23,'elazig','Elazığ'],[24,'erzincan','Erzincan'],[25,'erzurum','Erzurum'],[26,'eskisehir','Eskişehir'],[27,'gaziantep','Gaziantep'],[28,'giresun','Giresun'],[29,'gumushane','Gümüşhane'],[30,'hakkari','Hakkari'],[31,'hatay','Hatay'],[32,'isparta','Isparta'],[33,'mersin','Mersin'],[34,'istanbul','İstanbul'],[35,'izmir','İzmir'],[36,'kars','Kars'],[37,'kastamonu','Kastamonu'],[38,'kayseri','Kayseri'],[39,'kirklareli','Kırklareli'],[40,'kirsehir','Kırşehir'],[41,'kocaeli','Kocaeli'],[42,'konya','Konya'],[43,'kutahya','Kütahya'],[44,'malatya','Malatya'],[45,'manisa','Manisa'],[46,'kahramanmaras','Kahramanmaraş'],[47,'mardin','Mardin'],[48,'mugla','Muğla'],[49,'mus','Muş'],[50,'nevsehir','Nevşehir'],[51,'nigde','Niğde'],[52,'ordu','Ordu'],[53,'rize','Rize'],[54,'sakarya','Sakarya'],[55,'samsun','Samsun'],[56,'siirt','Siirt'],[57,'sinop','Sinop'],[58,'sivas','Sivas'],[59,'tekirdag','Tekirdağ'],[60,'tokat','Tokat'],[61,'trabzon','Trabzon'],[62,'tunceli','Tunceli'],[63,'sanliurfa','Şanlıurfa'],[64,'usak','Uşak'],[65,'van','Van'],[66,'yozgat','Yozgat'],[67,'zonguldak','Zonguldak'],[68,'aksaray','Aksaray'],[69,'bayburt','Bayburt'],[70,'karaman','Karaman'],[71,'kirikkale','Kırıkkale'],[72,'batman','Batman'],[73,'sirnak','Şırnak'],[74,'bartin','Bartın'],[75,'ardahan','Ardahan'],[76,'igdir','Iğdır'],[77,'yalova','Yalova'],[78,'karabuk','Karabük'],[79,'kilis','Kilis'],[80,'osmaniye','Osmaniye'],[81,'duzce','Düzce']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const res=document.getElementById('res');
document.getElementById('q').addEventListener('input',e=>{
  const v=norm(e.target.value.trim());res.innerHTML='';
  if(!v)return;
  const m=P.filter(p=>norm(p[2]).includes(v)).slice(0,12);
  if(!m.length){res.innerHTML='<div class="empty">No match</div>';return;}
  m.forEach(([n,slug,name])=>{const a=document.createElement('a');a.href=slug+'.html';a.innerHTML=`<span class="no">${String(n).padStart(2,'0')}</span>${name}`;res.appendChild(a);});
});
</script>
</body>
</html>
