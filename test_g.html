<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0b0b0d;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#0b0b0d;box-shadow:0 0 60px rgba(0,0,0,.6);overflow:hidden;}
/* hero */
.hero{position:relative;height:78vh;min-height:500px;display:flex;flex-direction:column;justify-content:flex-end;padding:34px 26px 40px;background-size:cover;background-position:center;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,11,13,.45),rgba(11,11,13,0) 35%,rgba(11,11,13,.2) 55%,#0b0b0d 100%);}
.hero>*{position:relative;z-index:2;}
.hero .iss{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:#d9b27a;font-weight:600;margin-bottom:16px;}
.hero h1{font-family:'Fraunces',serif;font-weight:800;font-size:clamp(3.2rem,15vw,5rem);line-height:.92;letter-spacing:-.01em;text-shadow:0 2px 30px rgba(0,0,0,.5);}
.hero h1 em{font-style:italic;font-weight:400;}
.hero p{font-family:'Fraunces',serif;font-size:1.15rem;color:rgba(255,255,255,.85);margin-top:16px;max-width:320px;line-height:1.4;}
/* editorial list */
.lead{font-family:'Inter';font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:#7c8190;font-weight:700;padding:30px 26px 6px;border-top:1px solid rgba(255,255,255,.08);margin-top:6px;}
.feature{display:flex;gap:18px;align-items:center;padding:20px 26px;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer;color:#fff;}
.feature .thumb{flex:none;width:92px;height:116px;border-radius:10px;overflow:hidden;position:relative;background-size:cover;background-position:center;}
.feature .thumb .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.85;}
.feature .no{font-family:'Fraunces',serif;font-size:1.1rem;color:#d9b27a;font-weight:600;}
.feature h2{font-family:'Fraunces',serif;font-size:1.9rem;font-weight:800;line-height:1;margin:5px 0 7px;letter-spacing:-.01em;}
.feature .rg{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6);}
.feature:active{opacity:.6;}
/* compact rest */
.rest{padding:14px 26px 60px;}
.rest .lead{padding:8px 0 6px;border:0;}
.r{display:flex;align-items:baseline;gap:14px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.06);color:#fff;}
.r .no{font-family:'Fraunces',serif;color:rgba(255,255,255,.4);min-width:30px;}
.r .nm{font-size:1.05rem;font-weight:400;flex:1;}
.r:active{opacity:.55;}
</style>
</head>
