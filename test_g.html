<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Muğla — TR81 · G</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:560px;margin:0 auto;min-height:100vh;background:#08080b;position:relative;}

/* floating top bar */
.top{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;z-index:30;display:flex;align-items:center;gap:12px;padding:max(14px,env(safe-area-inset-top)) 18px 12px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;}
.back svg{width:20px;height:20px;}
.top .ttl{flex:1;font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.06em;text-shadow:0 1px 8px rgba(0,0,0,.7);}
.free{display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);border:1px solid rgba(227,197,144,.6);color:var(--gold);font-weight:700;font-size:12px;padding:7px 12px;border-radius:999px;}
.free svg{width:14px;height:14px;}

/* intro panel */
.intro{height:78vh;min-height:460px;position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:28px 22px 34px;overflow:hidden;}
.intro img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.intro::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.3) 0,rgba(0,0,0,0) 40%,rgba(8,8,11,.95));}
.intro .kick{position:relative;z-index:2;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.intro h1{position:relative;z-index:2;font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(4rem,21vw,7rem);line-height:.86;margin-top:6px;}
.intro p{position:relative;z-index:2;margin-top:10px;color:rgba(255,255,255,.85);font-size:1rem;line-height:1.5;max-width:420px;}

/* full-bleed location panels */
.loc{position:relative;height:88vh;min-height:480px;display:flex;flex-direction:column;justify-content:flex-end;padding:24px 22px 30px;overflow:hidden;}
.loc img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.loc::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 42%,rgba(0,0,0,.85));}
.loc .no{position:relative;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.12em;color:var(--gold);opacity:.9;}
.loc h2{position:relative;z-index:2;font-family:'Bebas Neue',sans-serif;font-size:clamp(2.6rem,12vw,3.8rem);line-height:.94;letter-spacing:.02em;margin:4px 0 16px;text-shadow:0 2px 18px rgba(0,0,0,.7);}
.loc .maps{position:relative;z-index:2;display:inline-flex;align-items:center;gap:9px;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);color:#fff;font-weight:600;font-size:15px;padding:13px 24px;border-radius:14px;width:fit-content;}
.loc .maps svg{width:17px;height:17px;}

/* unlock CTA panel */
.cta{padding:46px 22px max(50px,calc(env(safe-area-inset-bottom) + 30px));text-align:center;background:radial-gradient(120% 80% at 50% 0,#15161d,#08080b 72%);}
.cta .ic{width:56px;height:56px;margin:0 auto 16px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(227,197,144,.12);border:1px solid rgba(227,197,144,.4);color:var(--gold);}
.cta .ic svg{width:26px;height:26px;}
.cta h3{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.02em;}
.cta p{color:#9aa4b2;font-size:.96rem;line-height:1.55;margin:10px auto 20px;max-width:380px;}
.cta a{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#1a1407;font-weight:700;font-size:16px;padding:16px 30px;border-radius:14px;}
.cta a svg{width:17px;height:17px;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="ttl">Muğla</div>
    <span class="free"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"/></svg><span id="freeTxt"></span></span>
  </div>

  <section class="intro">
    <img id="introimg" src="" alt="Muğla">
    <div class="kick">Ege • Türkiye</div>
    <h1>Muğla</h1>
    <p id="sub"></p>
  </section>

  <main id="list"></main>

  <div class="cta">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/><path d="M8 10.5V7.2A4 4 0 0 1 16 7.2v3.3"/></svg></div>
    <h3 id="ctaH"></h3>
    <p id="ctaP"></p>
    <a href="index.html" id="ctaB"></a>
  </div>
</div>

<script>
const LANG=(navigator.language||'tr').toLowerCase().startsWith('tr')?'tr':'en';
const TX=LANG==='tr'
  ?{free:'Ücretsiz',sub:'Aşağı kaydır — Muğla’nın manzaralı konumları, senden ücretsiz.',maps:'Yol tarifi',ctaH:'Sırada 80 il var',ctaP:'Muğla’yı gördün. Tek kodla Türkiye’nin 81 ilinin tüm manzaralı konumlarını aç.',ctaB:'81 İl Kilidini Aç'}
  :{free:'Free',sub:'Scroll down — Muğla’s scenic locations, free for you.',maps:'Directions',ctaH:'80 provinces next',ctaP:'You’ve seen Muğla. Unlock every scenic location across all 81 provinces with one code.',ctaB:'Unlock all 81'};
const CDN='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/';
const img=id=>CDN+id+'/public';
const LOCS=[
  {name:'İztuzu Manzara Noktası',map:'https://www.google.com/maps/place/Iztuzu+View+Point/@36.7682289,28.6117555,13.83z',photos:['mugla_iztuzu_manzara_noktasi_1']},
  {name:'Kelebekler Vadisi',map:'https://maps.google.com/?q=Kelebekler+Vadisi%2C+Mu%C4%9Fla',photos:['mugla_kelebekler_vadisi_1']},
  {name:'Ölüdeniz',map:'https://maps.google.com/?q=%C3%96l%C3%BCdeniz%2C+Mu%C4%9Fla',photos:['mugla_oludeniz_1']},
  {name:'Montana Seyir Tepesi',map:'https://www.google.com/maps/place/Montana+Seyir+Tepesi/@36.5454469,29.133872,17z',photos:['mugla_montana_seyir_tepesi_1']}
];
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const LOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/><path d="M8 10.5V7.2A4 4 0 0 1 16 7.2v3.3"/></svg>';
document.getElementById('introimg').src=img('mugla_oludeniz_2');
document.getElementById('freeTxt').textContent=TX.free;
document.getElementById('sub').textContent=TX.sub;
document.getElementById('ctaH').textContent=TX.ctaH;
document.getElementById('ctaP').textContent=TX.ctaP;
document.getElementById('ctaB').innerHTML=LOCK+'<span>'+TX.ctaB+'</span>';

const list=document.getElementById('list');
LOCS.forEach((loc,i)=>{
  const s=document.createElement('section');s.className='loc';
  s.innerHTML=`
    <img src="${img(loc.photos[0])}" alt="${loc.name}" loading="lazy">
    <div class="no">${String(i+1).padStart(2,'0')} / ${String(LOCS.length).padStart(2,'0')}</div>
    <h2>${loc.name}</h2>
    <a class="maps" href="${loc.map}" target="_blank" rel="noopener">${PIN}<span>${TX.maps}</span></a>`;
  list.appendChild(s);
});
</script>
</body>
</html>
