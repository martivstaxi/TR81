<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Muğla — TR81 · B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;--cw:clamp(200px,64vw,260px);--ch:clamp(300px,56vh,400px);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;height:100vh;height:100dvh;}
img{display:block;}svg{display:block;}
:focus-visible{outline:2px solid rgba(255,255,255,.85);outline-offset:2px;border-radius:6px;}
.app{max-width:560px;margin:0 auto;height:100vh;height:100dvh;background:radial-gradient(120% 80% at 50% 0%,#15161d 0%,#000 74%);display:flex;flex-direction:column;position:relative;overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,.7);}

.top{display:flex;align-items:center;gap:14px;padding:max(18px,calc(env(safe-area-inset-top) + 6px)) 20px 4px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;text-decoration:none;}
.back svg{width:20px;height:20px;}
.hd{flex:1;}
.hd .mk{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:600;}
.hd h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.03em;line-height:1;margin-top:2px;}
.gift{width:38px;height:38px;flex:none;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(227,197,144,.6);color:var(--gold);display:flex;align-items:center;justify-content:center;}
.gift svg{width:19px;height:19px;}

.flowwrap{flex:1;min-height:0;display:flex;position:relative;}
.flow{flex:1;display:flex;align-items:center;overflow:hidden;touch-action:none;perspective:1100px;padding:0 calc(50% - var(--cw)/2);cursor:grab;}
.flow.grabbing{cursor:grabbing;}
.cover{flex:none;width:var(--cw);height:var(--ch);border-radius:24px;overflow:hidden;position:relative;margin:0 calc(var(--cw) * -.09);
  background-size:cover;background-position:center;box-shadow:0 30px 60px rgba(0,0,0,.6);
  transform:rotateY(40deg) scale(.8);transition:transform .42s cubic-bezier(.22,.61,.36,1),opacity .42s ease;opacity:.42;transform-origin:center;cursor:pointer;will-change:transform;}
.cover.active{transform:rotateY(0deg) scale(1);opacity:1;z-index:5;}
.cover.prev{transform:rotateY(40deg) scale(.8);}
.cover.next{transform:rotateY(-40deg) scale(.8);}
.cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 40%,rgba(0,0,0,.6));}
.cover .no{position:absolute;top:14px;left:14px;z-index:3;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);border-radius:9px;padding:5px 11px;font-weight:800;font-size:14px;}
.cover .cnm{position:absolute;left:16px;right:16px;bottom:16px;z-index:3;font-family:'Bebas Neue',sans-serif;font-size:1.9rem;line-height:1;letter-spacing:.02em;text-shadow:0 2px 14px rgba(0,0,0,.7);}
.cover .tap{position:absolute;left:50%;bottom:64px;transform:translateX(-50%);z-index:3;opacity:0;transition:opacity .3s;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:6px 12px;white-space:nowrap;pointer-events:none;display:inline-flex;align-items:center;gap:6px;}
.cover.active .tap{opacity:.92;}
.cover .tap svg{width:12px;height:12px;}
.farrow{position:absolute;top:50%;transform:translateY(-50%);z-index:6;width:46px;height:46px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.35);backdrop-filter:blur(8px);color:#fff;font-size:21px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.6;}
.farrow.l{left:8px;}.farrow.r{right:8px;}
.farrow[disabled]{opacity:.12;pointer-events:none;}

.cap{text-align:center;padding:6px 20px 8px;}
.cap .ct{font-size:12px;letter-spacing:.2em;color:#9aa4b2;font-weight:700;margin-bottom:12px;}
.cap .go{display:inline-flex;align-items:center;gap:9px;background:var(--gold);color:#1a1407;font-weight:700;font-size:15px;padding:14px 30px;border-radius:999px;text-decoration:none;box-shadow:0 12px 30px rgba(227,197,144,.22);}
.cap .go svg{width:17px;height:17px;}
.dots{display:flex;justify-content:center;gap:7px;padding:10px 0 max(22px,calc(env(safe-area-inset-bottom) + 10px));}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.25);transition:background .2s,transform .2s;}
.dot.on{background:var(--gold);transform:scale(1.25);}

/* ---- gallery lightbox (per-location 3 photos) ---- */
.lb{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.95);display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;visibility:hidden;transition:opacity .25s,visibility 0s linear .25s;touch-action:none;}
.lb.open{opacity:1;visibility:visible;transition:opacity .25s;}
.lb img{max-width:94vw;max-height:74vh;object-fit:contain;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.7);}
.lb .lbx{position:absolute;top:max(16px,env(safe-area-inset-top));right:16px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.lb .lbcap{margin-top:18px;font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.03em;}
.lb .lbdots{display:flex;gap:7px;margin-top:12px;}
.lb .lbdots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);}
.lb .lbdots i.on{background:var(--gold);}
.lb .nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.lb .nav.l{left:10px;}.lb .nav.r{right:10px;}
.lb .lbmap{margin-top:20px;display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#1a1407;font-weight:700;font-size:14px;padding:12px 22px;border-radius:14px;text-decoration:none;}
.lb .lbmap svg{width:16px;height:16px;}
@media(min-width:560px){.app{max-width:600px;}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <div class="hd"><div class="mk">Ege • Türkiye</div><h1>Muğla</h1></div>
    <span class="gift" aria-label="Ücretsiz"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="8.5" width="17" height="4" rx="1"/><path d="M12 8.5V21"/><path d="M18.5 12.5v6.4a1.6 1.6 0 0 1-1.6 1.6H7.1a1.6 1.6 0 0 1-1.6-1.6v-6.4"/><path d="M7.6 8.5a2.5 2.5 0 0 1 0-5C10.3 3.5 12 8.5 12 8.5s1.7-5 4.4-5a2.5 2.5 0 0 1 0 5"/></svg></span>
  </header>

  <div class="flowwrap">
    <div class="flow" id="flow"></div>
    <div class="farrow l" id="fprev" role="button" aria-label="Önceki">‹</div>
    <div class="farrow r" id="fnext" role="button" aria-label="Sonraki">›</div>
  </div>

  <div class="cap">
    <div class="ct" id="ct"></div>
    <a class="go" id="go" href="#" target="_blank" rel="noopener"></a>
  </div>
  <div class="dots" id="dots"></div>
</div>

<div class="lb" id="lb" role="dialog" aria-modal="true">
  <div class="lbx" id="lbx" role="button" aria-label="Kapat">✕</div>
  <div class="nav l" id="lbprev" role="button">‹</div>
  <img id="lbimg" alt="">
  <div class="nav r" id="lbnext" role="button">›</div>
  <div class="lbcap" id="lbcap"></div>
  <div class="lbdots" id="lbdots"></div>
  <a class="lbmap" id="lbmap" href="#" target="_blank" rel="noopener"></a>
</div>

<script>
const LANG=(navigator.language||'tr').toLowerCase().startsWith('tr')?'tr':'en';
const TX=LANG==='tr'
  ?{ct:(i,n)=>i+' / '+n,go:'Fotoğrafları gör',tap:'Dokun · büyüt',maps:'Yol tarifi'}
  :{ct:(i,n)=>i+' / '+n,go:'View photos',tap:'Tap · zoom',maps:'Directions'};
const CDN='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/';
const img=id=>CDN+id+'/public';
const LOCS=[
  {name:'İztuzu Manzara Noktası',map:'https://www.google.com/maps/place/Iztuzu+View+Point/@36.7682289,28.6117555,13.83z',photos:['mugla_iztuzu_manzara_noktasi_1','mugla_iztuzu_manzara_noktasi_2','mugla_iztuzu_manzara_noktasi_3']},
  {name:'Kelebekler Vadisi',map:'https://maps.google.com/?q=Kelebekler+Vadisi%2C+Mu%C4%9Fla',photos:['mugla_kelebekler_vadisi_1','mugla_kelebekler_vadisi_2','mugla_kelebekler_vadisi_3']},
  {name:'Ölüdeniz',map:'https://maps.google.com/?q=%C3%96l%C3%BCdeniz%2C+Mu%C4%9Fla',photos:['mugla_oludeniz_1','mugla_oludeniz_2','mugla_oludeniz_3']},
  {name:'Montana Seyir Tepesi',map:'https://www.google.com/maps/place/Montana+Seyir+Tepesi/@36.5454469,29.133872,17z',photos:['mugla_montana_seyir_tepesi_1','mugla_montana_seyir_tepesi_2','mugla_montana_seyir_tepesi_3']}
];
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const SEARCH='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="10.8" cy="10.8" r="6.3"/><path d="m20 20-4.6-4.6"/></svg>';

/* ---- build coverflow ---- */
const flow=document.getElementById('flow'),dots=document.getElementById('dots');
const ctEl=document.getElementById('ct'),goEl=document.getElementById('go');
const fprev=document.getElementById('fprev'),fnext=document.getElementById('fnext');
let covers=[],dotEls=[],idx=0;
LOCS.forEach((loc,i)=>{
  const d=document.createElement('div');d.className='cover';d.dataset.i=i;d.style.backgroundImage=`url('${img(loc.photos[0])}')`;
  d.innerHTML=`<span class="no">${String(i+1).padStart(2,'0')}</span><span class="tap">${SEARCH}${TX.tap}</span><span class="cnm">${loc.name}</span>`;
  flow.appendChild(d);
  const dt=document.createElement('span');dt.className='dot';dots.appendChild(dt);
});
covers=[...flow.querySelectorAll('.cover')];dotEls=[...dots.querySelectorAll('.dot')];

const clampIdx=i=>Math.max(0,Math.min(covers.length-1,i));
function centerOf(i){return covers[i].offsetLeft+covers[i].clientWidth/2-flow.clientWidth/2;}
function flowMax(){return Math.max(0,flow.scrollWidth-flow.clientWidth);}
function nearestFlow(val){let best=0,bd=1e9;for(let i=0;i<covers.length;i++){const d=Math.abs(centerOf(i)-val);if(d<bd){bd=d;best=i;}}return best;}
let animRaf=0;
function update(){
  const mid=flow.scrollLeft+flow.clientWidth/2;let best=0,bd=1e9;
  covers.forEach((c,i)=>{const cx=c.offsetLeft+c.clientWidth/2;const dist=Math.abs(cx-mid);if(dist<bd){bd=dist;best=i;}});
  idx=best;
  covers.forEach((c,i)=>{c.classList.toggle('active',i===best);c.classList.toggle('prev',i<best);c.classList.toggle('next',i>best);});
  dotEls.forEach((d,i)=>d.classList.toggle('on',i===best));
  fprev.disabled=best===0;fnext.disabled=best===covers.length-1;
  const loc=LOCS[best];ctEl.textContent=TX.ct(best+1,covers.length);
  goEl.innerHTML=PIN+'<span>'+TX.maps+'</span>';goEl.href=loc.map;
}
function jumpTo(i){cancelAnimationFrame(animRaf);idx=clampIdx(i);flow.scrollLeft=centerOf(idx);update();}
function animateTo(i,dur=320){
  i=clampIdx(i);cancelAnimationFrame(animRaf);
  const from=flow.scrollLeft,to=centerOf(i),delta=to-from,t0=performance.now();
  if(Math.abs(delta)<1){flow.scrollLeft=to;update();return;}
  (function fr(now){const p=Math.min(1,(now-t0)/dur),e=1-Math.pow(1-p,3);flow.scrollLeft=from+delta*e;update();if(p<1)animRaf=requestAnimationFrame(fr);})(t0);
}
function stepN(d){const ni=clampIdx(idx+d);if(ni!==idx)animateTo(ni);}
fprev.onclick=()=>stepN(-1);fnext.onclick=()=>stepN(1);

/* pointer drag */
let dragging=false,startX=0,restScroll=0,lastX=0,lastT=0,vel=0,downCover=null,moved=false;
flow.addEventListener('pointerdown',e=>{dragging=true;moved=false;startX=lastX=e.clientX;lastT=performance.now();vel=0;
  downCover=e.target.closest?e.target.closest('.cover'):null;restScroll=flow.scrollLeft;cancelAnimationFrame(animRaf);
  flow.classList.add('grabbing');try{flow.setPointerCapture(e.pointerId);}catch(_){}});
flow.addEventListener('pointermove',e=>{if(!dragging)return;const dx=e.clientX-startX;if(Math.abs(dx)>6)moved=true;
  const now=performance.now();if(now>lastT){vel=(e.clientX-lastX)/(now-lastT);lastX=e.clientX;lastT=now;}
  flow.scrollLeft=Math.max(0,Math.min(flowMax(),restScroll-dx));update();});
function endDrag(){if(!dragging)return;dragging=false;flow.classList.remove('grabbing');
  const cw=covers[idx]?covers[idx].clientWidth:220;let proj=flow.scrollLeft-vel*180;
  const cap=cw*3.5;proj=Math.max(flow.scrollLeft-cap,Math.min(flow.scrollLeft+cap,proj));animateTo(nearestFlow(proj));}
flow.addEventListener('pointerup',e=>{
  if(dragging&&!moved){const t=downCover;downCover=null;dragging=false;flow.classList.remove('grabbing');
    if(t){const i=+t.dataset.i;if(i===idx){openLB(i,0);}else{animateTo(i);}}return;}
  downCover=null;endDrag();});
flow.addEventListener('pointercancel',()=>{downCover=null;endDrag();});
flow.addEventListener('pointerleave',()=>{downCover=null;endDrag();});
flow.addEventListener('wheel',e=>{const d=Math.abs(e.deltaX)>Math.abs(e.deltaY)?e.deltaX:e.deltaY;if(Math.abs(d)<6)return;e.preventDefault();stepN(d>0?1:-1);},{passive:false});
window.addEventListener('resize',()=>jumpTo(idx));
requestAnimationFrame(()=>jumpTo(0));

/* ---- lightbox ---- */
const lb=document.getElementById('lb'),lbimg=document.getElementById('lbimg'),lbcap=document.getElementById('lbcap'),lbdots=document.getElementById('lbdots'),lbmap=document.getElementById('lbmap');
let curL=0,curP=0;
function showLB(){const loc=LOCS[curL];lbimg.src=img(loc.photos[curP]);lbcap.textContent=loc.name;
  lbdots.innerHTML=loc.photos.map((_,i)=>`<i class="${i===curP?'on':''}"></i>`).join('');
  lbmap.href=loc.map;lbmap.innerHTML=PIN+'<span>'+TX.maps+'</span>';}
function openLB(l,p){curL=l;curP=p;showLB();lb.classList.add('open');}
function closeLB(){lb.classList.remove('open');}
function stepLB(d){const n=LOCS[curL].photos.length;curP=(curP+d+n)%n;showLB();}
document.getElementById('lbx').onclick=closeLB;
document.getElementById('lbprev').onclick=()=>stepLB(-1);
document.getElementById('lbnext').onclick=()=>stepLB(1);
lb.addEventListener('click',e=>{if(e.target===lb)closeLB();});
document.addEventListener('keydown',e=>{
  if(lb.classList.contains('open')){if(e.key==='Escape')closeLB();if(e.key==='ArrowRight')stepLB(1);if(e.key==='ArrowLeft')stepLB(-1);return;}
  if(e.key==='ArrowRight')stepN(1);if(e.key==='ArrowLeft')stepN(-1);if(e.key==='Enter')openLB(idx,0);});
let lsx=null;lb.addEventListener('touchstart',e=>lsx=e.touches[0].clientX,{passive:true});
lb.addEventListener('touchend',e=>{if(lsx===null)return;const dx=e.changedTouches[0].clientX-lsx;if(Math.abs(dx)>45)stepLB(dx<0?1:-1);lsx=null;});
</script>
</body>
</html>
