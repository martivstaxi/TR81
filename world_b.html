<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Dünya · Kıtalar — TR81</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:620px;margin:0 auto;min-height:100vh;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 4px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.back svg{width:20px;height:20px;}

.intro{padding:10px 22px 6px;}
.intro .kick{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3rem,14vw,4.4rem);line-height:.9;margin-top:8px;}
.intro p{margin-top:8px;color:#9aa4b2;font-size:.95rem;}

.searchwrap{padding:14px 16px 6px;}
.search{position:relative;}
.search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:14px 46px 14px 18px;color:#fff;font-size:15px;font-family:inherit;}
.search input::placeholder{color:rgba(255,255,255,.45);}
.search input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.09);}
.search svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,.5);}

.sec{margin-top:18px;}
.sec h2{display:flex;align-items:center;gap:10px;padding:0 22px 12px;font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:1.7rem;letter-spacing:.04em;}
.sec h2 .ct{font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;color:#6b7280;background:rgba(255,255,255,.06);padding:3px 9px;border-radius:999px;}
.row{display:flex;gap:12px;overflow-x:auto;padding:0 16px 6px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.row::-webkit-scrollbar{display:none;}
.chip{flex:0 0 auto;width:118px;scroll-snap-align:start;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:14px 10px 13px;display:flex;flex-direction:column;align-items:center;gap:9px;transition:transform .2s,border-color .2s,background .2s;}
.chip:hover{transform:translateY(-4px);border-color:rgba(227,197,144,.5);background:rgba(255,255,255,.06);}
.chip.free{background:linear-gradient(160deg,rgba(227,197,144,.14),rgba(227,197,144,.03));border-color:rgba(227,197,144,.4);}
.fl{width:60px;height:45px;border-radius:8px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.45);background:#15161d;display:flex;align-items:center;justify-content:center;position:relative;}
.fl img{width:100%;height:100%;object-fit:cover;}
.fl .em{font-size:32px;line-height:1;display:none;}
.fl.emoji img{display:none;}.fl.emoji .em{display:block;}
.nm{font-size:13px;font-weight:500;text-align:center;line-height:1.2;color:#e9edf2;}
.freet{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);}
.empty{display:none;text-align:center;color:#6b7280;padding:50px 0;font-size:14px;}
.spacer{height:max(30px,env(safe-area-inset-bottom));}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
  </div>
  <div class="intro">
    <div class="kick" id="kick"></div>
    <h1 id="h1"></h1>
    <p id="sub"></p>
  </div>
  <div class="searchwrap">
    <div class="search">
      <input id="q" type="text" autocomplete="off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
  </div>
  <div id="sections"></div>
  <div class="empty" id="empty"></div>
  <div class="spacer"></div>
</div>

<script src="worlddata.js"></script>
<script>
const W=window.WORLD,t=W.t;
document.getElementById('kick').textContent=t.kick;
document.getElementById('h1').textContent=t.title;
document.getElementById('sub').textContent=t.sub;
document.getElementById('q').placeholder=t.search;
const wrap=document.getElementById('sections');
function chip(c){return `<a class="chip${c.free?' free':''}" href="${c.href}" data-s="${W.norm(c.name+' '+c.slug)}">
  <div class="fl"><img src="${c.flag}" alt="" loading="lazy" onerror="this.parentNode.classList.add('emoji')"><span class="em">${c.emoji}</span></div>
  <div class="nm">${c.name}</div>${c.free?`<div class="freet">${t.free}</div>`:''}</a>`;}
W.contOrder.forEach(k=>{
  const items=W.list.filter(c=>c.cont===k);if(!items.length)return;
  const sec=document.createElement('div');sec.className='sec';
  sec.innerHTML=`<h2>${W.cont[k]}<span class="ct">${items.length}</span></h2><div class="row">${items.map(chip).join('')}</div>`;
  wrap.appendChild(sec);
});
const empty=document.getElementById('empty');empty.textContent=t.empty;
document.getElementById('q').addEventListener('input',e=>{
  const v=W.norm(e.target.value);let total=0;
  wrap.querySelectorAll('.sec').forEach(sec=>{
    let n=0;sec.querySelectorAll('.chip').forEach(c=>{const m=c.dataset.s.includes(v);c.style.display=m?'':'none';if(m)n++;});
    sec.style.display=n?'':'none';total+=n;
  });
  empty.style.display=total?'none':'block';
});
</script>
</body>
</html>
