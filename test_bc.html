<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept BC · Helix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#06070b;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;touch-action:none;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;height:100vh;height:100dvh;background:radial-gradient(120% 80% at 50% 42%,#131826 0%,#06070b 72%);position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.bar{flex:none;display:flex;align-items:center;justify-content:space-between;padding:18px 20px 2px;z-index:30;}
.logo{font-weight:800;font-size:20px;}.logo b{color:#ffcf6b;}
.head{flex:none;text-align:center;padding:6px 20px 0;z-index:30;}
.head .kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf6b;font-weight:700;}
.head h1{font-size:clamp(1.6rem,6.5vw,2.1rem);font-weight:800;letter-spacing:-.02em;margin-top:5px;}
.stage{flex:1;position:relative;perspective:1000px;}
.helix{position:absolute;left:50%;top:50%;width:0;height:0;transform-style:preserve-3d;}
.cell{position:absolute;width:128px;height:90px;margin:-45px 0 0 -64px;border-radius:13px;overflow:hidden;background-size:cover;background-position:center;
  display:flex;align-items:flex-end;padding:10px;box-shadow:0 10px 26px rgba(0,0,0,.5);cursor:pointer;}
.cell .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.72;}
.cell::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,.8));}
.cell span{position:relative;z-index:2;font-size:.86rem;font-weight:800;text-shadow:0 1px 6px rgba(0,0,0,.7);}
.cta{flex:none;text-align:center;padding:8px 24px 24px;z-index:30;}
.cta a{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 28px;border-radius:12px;}
.cta .hint{color:rgba(255,255,255,.4);font-size:11px;margin-top:10px;letter-spacing:.05em;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="bar"><div class="logo">TR<b>81</b></div></div>
  <div class="head"><div class="kx">Climb the spiral</div><h1>A helix of Türkiye</h1></div>
  <div class="stage" id="stage"><div class="helix" id="helix"></div></div>
  <div class="cta"><a id="cta" href="#">▶ Explore</a><div class="hint">drag to spin the spiral</div></div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[34,'istanbul','İstanbul','marmara'],[7,'antalya','Antalya','medit'],[50,'nevsehir','Nevşehir','central'],[47,'mardin','Mardin','southeast'],[61,'trabzon','Trabzon','black'],[48,'mugla','Muğla','aegean'],[65,'van','Van','east'],[35,'izmir','İzmir','aegean'],[63,'sanliurfa','Şanlıurfa','southeast'],[53,'rize','Rize','black'],[25,'erzurum','Erzurum','east'],[16,'bursa','Bursa','marmara'],[38,'kayseri','Kayseri','central'],[6,'ankara','Ankara','central'],[31,'hatay','Hatay','medit'],[8,'artvin','Artvin','black'],[20,'denizli','Denizli','aegean'],[55,'samsun','Samsun','black']];
const helix=document.getElementById('helix'),cta=document.getElementById('cta'),stage=document.getElementById('stage');
const N=P.length,STEP=42,R=150,VS=30,H0=(N-1)*VS/2;
const cells=P.map((p,i)=>{const[n,slug,name,rk]=p;const c=document.createElement('div');c.className='cell';
  c.dataset.base=i*STEP;c.dataset.y=(H0-i*VS);c.style.backgroundImage=`url('${IMG[n%2]}')`;
  c.innerHTML=`<div class="tint" style="background:${REG[rk][1]}"></div><span>${name}</span>`;
  c.addEventListener('click',()=>{const front=curFront();if(front===i)location.href=slug+'.html';else rot=-i*STEP;});
  helix.appendChild(c);return c;});
let rot=0,vel=0,drag=false,sx=0,brot=0,lastX=0;
function curFront(){const f=Math.round(-rot/STEP);return ((f%N)+N)%N;}
function frame(){if(!drag){rot+=vel;vel*=0.95;if(Math.abs(vel)<0.05){vel=0;rot+=((Math.round(rot/STEP)*STEP)-rot)*0.12;}}
  cells.forEach((c,i)=>{const a=(i*STEP+rot);const rad=a*Math.PI/180;const depth=(Math.cos(rad)+1)/2;
    c.style.transform=`translateY(${+c.dataset.y}px) rotateY(${a}deg) translateZ(${R}px)`;
    c.style.opacity=(0.25+depth*0.75).toFixed(2);c.style.zIndex=Math.round(depth*100);});
  helix.style.transform=`translateY(0px)`;
  const[n,slug,name]=P[curFront()];cta.href=slug+'.html';cta.innerHTML=`▶ Explore ${name}`;requestAnimationFrame(frame);}
frame();
const down=e=>{const t=e.touches?e.touches[0]:e;drag=true;sx=t.clientX;brot=rot;lastX=t.clientX;vel=0;};
const move=e=>{if(!drag)return;const t=e.touches?e.touches[0]:e;rot=brot+(t.clientX-sx)*0.45;vel=(t.clientX-lastX)*0.45;lastX=t.clientX;};
const up=()=>drag=false;
stage.addEventListener('touchstart',down,{passive:true});stage.addEventListener('touchmove',move,{passive:true});stage.addEventListener('touchend',up);
stage.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
</script>
</body>
</html>
