<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept AB · Browse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0b0b0f;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#0b0b0f;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);}
.bar{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 4px;}
.logo{font-weight:800;font-size:20px;}.logo b{color:#ffcf6b;}
.intro{padding:6px 18px 14px;}
.intro .kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf6b;font-weight:700;}
.intro h1{font-size:clamp(2rem,8vw,2.6rem);font-weight:800;letter-spacing:-.02em;line-height:1;margin-top:8px;}
.intro p{color:#8a93a3;font-size:13px;margin-top:8px;}
.feed{padding:8px 16px 54px;display:flex;flex-direction:column;gap:18px;}
.card{position:relative;border-radius:22px;overflow:hidden;cursor:pointer;background-size:cover;background-position:center;
  aspect-ratio:16/10;display:flex;flex-direction:column;justify-content:flex-end;padding:22px;box-shadow:0 14px 36px rgba(0,0,0,.5);}
.card .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.5;}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25) 0%,rgba(0,0,0,0) 34%,rgba(0,0,0,.2) 56%,rgba(0,0,0,.92) 100%);}
.card>*{position:relative;z-index:2;}
.card .top{position:absolute;top:18px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:flex-start;}
.card .kx{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#fff;font-weight:700;background:rgba(0,0,0,.32);backdrop-filter:blur(5px);padding:5px 10px;border-radius:8px;}
.card .pl{font-size:12px;font-weight:800;background:rgba(0,0,0,.32);backdrop-filter:blur(5px);padding:5px 10px;border-radius:8px;}
.card h2{font-size:clamp(2.2rem,11vw,3.2rem);font-weight:800;line-height:.94;letter-spacing:-.02em;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.card p{margin-top:8px;color:rgba(255,255,255,.86);font-size:13.5px;max-width:320px;line-height:1.45;}
.card .go{display:inline-flex;align-items:center;gap:7px;margin-top:15px;background:#fff;color:#111;font-weight:700;font-size:14px;padding:11px 20px;border-radius:11px;align-self:flex-start;}
.card:active{transform:scale(.985);}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="bar"><div class="logo">TR<b>81</b></div></div>
  <div class="intro"><div class="kx">Browse</div><h1>Where to next?</h1><p>Big, simple cards. Tap one to explore the province.</p></div>
  <div class="feed" id="feed"></div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[34,'istanbul','İstanbul','marmara','Two continents meeting on one shimmering strait.'],[7,'antalya','Antalya','medit','Turquoise coast — beaches, canyons and waterfalls.'],[50,'nevsehir','Cappadocia','central','Fairy chimneys and a sky full of balloons.'],[47,'mardin','Mardin','southeast','Honey-stone city above the Mesopotamian plain.'],[61,'trabzon','Trabzon','black','Misty green peaks above the Black Sea.'],[48,'mugla','Muğla','aegean','The bluest bays of the Aegean — Bodrum to Marmaris.'],[65,'van','Van','east','A turquoise sea-lake high in the eastern mountains.'],[35,'izmir','İzmir','aegean','Aegean light, ancient ruins and a long promenade.'],[63,'sanliurfa','Şanlıurfa','southeast','Cradle of civilisation — the land of Göbeklitepe.'],[53,'rize','Rize','black','Tea terraces wrapped in mountain cloud.'],[25,'erzurum','Erzurum','east','High plateau winters and proud old stone.'],[16,'bursa','Bursa','marmara','Green slopes of Uludağ above the first Ottoman capital.']];
const feed=document.getElementById('feed');
P.forEach(p=>{const[n,slug,name,rk,desc]=p;const a=document.createElement('a');a.href=slug+'.html';a.className='card';
  a.style.backgroundImage=`url('${IMG[n%2]}')`;
  a.innerHTML=`<div class="tint" style="background:${REG[rk][1]}"></div><div class="top"><span class="kx">${REG[rk][0]}</span><span class="pl">${String(n).padStart(2,'0')}</span></div>
  <h2>${name}</h2><p>${desc}</p><span class="go">▶ Explore</span>`;
  feed.appendChild(a);});
</script>
</body>
</html>
