<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Dünya · Atlas Grid — TR81</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:620px;margin:0 auto;min-height:100vh;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 4px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.back svg{width:20px;height:20px;}
.top .sp{flex:1;}
.glob{width:40px;height:40px;border-radius:50%;background:rgba(227,197,144,.12);border:1px solid rgba(227,197,144,.3);display:flex;align-items:center;justify-content:center;color:var(--gold);}
.glob svg{width:20px;height:20px;}

.intro{padding:10px 22px 6px;}
.intro .kick{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3rem,14vw,4.4rem);line-height:.9;margin-top:8px;}
.intro .cnt{margin-top:10px;display:inline-flex;align-items:center;gap:7px;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9aa4b2;font-weight:700;}
.intro .cnt::before{content:'';width:24px;height:1px;background:rgba(255,255,255,.3);}

.searchwrap{position:sticky;top:0;z-index:5;padding:14px 16px;background:linear-gradient(180deg,#08080b 70%,rgba(8,8,11,0));}
.search{position:relative;}
.search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:14px 46px 14px 18px;color:#fff;font-size:15px;font-family:inherit;}
.search input::placeholder{color:rgba(255,255,255,.45);}
.search input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.09);}
.search svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,.5);}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;padding:4px 16px max(34px,env(safe-area-inset-bottom));}
.card{position:relative;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:16px 8px 13px;display:flex;flex-direction:column;align-items:center;gap:10px;transition:transform .2s,border-color .2s,background .2s;cursor:pointer;}
.card:hover{transform:translateY(-4px);border-color:rgba(227,197,144,.5);background:rgba(255,255,255,.06);}
.card.free{background:linear-gradient(160deg,rgba(227,197,144,.14),rgba(227,197,144,.03));border-color:rgba(227,197,144,.4);}
.fl{width:56px;height:42px;border-radius:8px;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.45);background:#15161d;display:flex;align-items:center;justify-content:center;}
.fl img{width:100%;height:100%;object-fit:cover;}
.fl .em{font-size:30px;line-height:1;display:none;}
.fl.emoji img{display:none;}.fl.emoji .em{display:block;}
.nm{font-size:13px;font-weight:500;text-align:center;line-height:1.2;color:#e9edf2;}
.freepill{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#1a1407;background:var(--gold);padding:2px 7px;border-radius:999px;}
.empty{grid-column:1/-1;text-align:center;color:#6b7280;padding:40px 0;font-size:14px;}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
    <div class="sp"></div>
    <div class="glob"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg></div>
  </div>
  <div class="intro">
    <div class="kick" id="kick"></div>
    <h1 id="h1"></h1>
    <div class="cnt" id="cnt"></div>
  </div>
  <div class="searchwrap">
    <div class="search">
      <input id="q" type="text" autocomplete="off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script src="worlddata.js"></script>
<script>
const W=window.WORLD,t=W.t;
document.getElementById('kick').textContent=t.kick;
document.getElementById('h1').textContent=t.title;
document.getElementById('cnt').textContent=t.count;
document.getElementById('q').placeholder=t.search;
const grid=document.getElementById('grid');
W.list.forEach(c=>{
  const a=document.createElement('a');a.href=c.href;a.className='card'+(c.free?' free':'');
  a.dataset.s=W.norm(c.name+' '+c.slug);
  a.innerHTML=`<div class="fl"><img src="${c.flag}" alt="" loading="lazy" onerror="this.parentNode.classList.add('emoji')"><span class="em">${c.emoji}</span></div>
    <div class="nm">${c.name}</div>`;
  grid.appendChild(a);
});
const empty=document.createElement('div');empty.className='empty';empty.textContent=t.empty;empty.style.display='none';grid.appendChild(empty);
document.getElementById('q').addEventListener('input',e=>{
  const v=W.norm(e.target.value);let n=0;
  grid.querySelectorAll('.card').forEach(c=>{const m=c.dataset.s.includes(v);c.style.display=m?'':'none';if(m)n++;});
  empty.style.display=n?'none':'';
});
</script>
</body>
</html>
