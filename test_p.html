<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept P · Tabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0a0d;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#0a0a0d;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);}
.top{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,#0a0a0d 70%,rgba(10,10,13,.92));backdrop-filter:blur(8px);padding-top:16px;}
.bar{display:flex;align-items:center;justify-content:space-between;padding:0 18px 4px;}
.logo{font-weight:800;font-size:20px;}.logo b{color:#ffcf6b;}
.intro{padding:6px 18px 12px;}
.intro h1{font-size:clamp(1.8rem,7vw,2.3rem);font-weight:800;letter-spacing:-.02em;line-height:1;}
.intro p{color:#8a93a3;font-size:13px;margin-top:7px;}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:8px 18px 14px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:none;border:1px solid #262b35;background:#13161d;color:#cdd5df;border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.15s;font-family:inherit;}
.tab.on{background:#fff;color:#0a0a0d;border-color:#fff;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:6px 14px 54px;}
.card{position:relative;aspect-ratio:4/5;border-radius:16px;overflow:hidden;cursor:pointer;background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;
  animation:pop .32s ease both;}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.card .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.75;}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,0) 40%,rgba(0,0,0,.85));}
.card>*{position:relative;z-index:2;}
.card .pl{position:absolute;top:11px;left:11px;background:rgba(0,0,0,.42);backdrop-filter:blur(4px);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:800;}
.card .rg{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;opacity:.85;margin-bottom:3px;}
.card h3{font-size:1.2rem;font-weight:800;line-height:1;text-shadow:0 1px 8px rgba(0,0,0,.6);}
.card:active{transform:scale(.97);}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="top">
    <div class="bar"><div class="logo">TR<b>81</b></div></div>
    <div class="intro"><h1>Browse by region</h1><p>Tap a region to filter all 81 provinces.</p></div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const RORDER=['marmara','aegean','medit','central','black','east','southeast'];
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyon','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','K.maraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
const tabs=document.getElementById('tabs'),grid=document.getElementById('grid');
const TABS=[['all','All 81']].concat(RORDER.map(r=>[r,REG[r][0]]));
let active='all';
TABS.forEach(([key,label])=>{const b=document.createElement('button');b.className='tab'+(key==='all'?' on':'');b.textContent=label;b.onclick=()=>{active=key;render();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));b.classList.add('on');};tabs.appendChild(b);});
function render(){grid.innerHTML='';const list=active==='all'?P:P.filter(p=>p[3]===active);
  list.forEach((p,i)=>{const[n,slug,name,rk]=p;const c=document.createElement('div');c.className='card';c.style.animationDelay=(i*18)+'ms';
    c.style.backgroundImage=`url('${IMG[n%2]}')`;
    c.innerHTML=`<div class="tint" style="background:${REG[rk][1]}"></div><span class="pl">${String(n).padStart(2,'0')}</span><div class="rg">${REG[rk][0]}</div><h3>${name}</h3>`;
    c.onclick=()=>location.href=slug+'.html';grid.appendChild(c);});}
render();
</script>
</body>
</html>
