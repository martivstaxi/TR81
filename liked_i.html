<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Muğla — TR81 · I</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:560px;margin:0 auto;min-height:100vh;background:#08080b;}

/* clean text header — no big photo */
.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 4px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:#fff;}
.back svg{width:20px;height:20px;}
.top .sp{flex:1;}
.free{display:inline-flex;align-items:center;gap:6px;background:rgba(0,0,0,.5);border:1px solid rgba(227,197,144,.6);color:var(--gold);font-weight:700;font-size:12px;padding:7px 12px;border-radius:999px;}
.free svg{width:14px;height:14px;}
.intro{padding:8px 22px 6px;}
.intro .kick{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3rem,15vw,4.4rem);line-height:.9;}

/* list of locations, each with a 3-photo horizontal strip */
main{padding:14px 0 8px;}
.loc{padding:18px 0 22px;border-top:1px solid rgba(255,255,255,.08);}
.loc:first-child{border-top:none;}
.lh{display:flex;align-items:baseline;gap:10px;padding:0 22px;margin-bottom:12px;}
.lh .no{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);}
.lh .nm{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.02em;line-height:1;flex:1;}
.lh .maps{flex:none;display:inline-flex;align-items:center;gap:6px;color:var(--gold);font-size:13px;font-weight:600;}
.lh .maps svg{width:15px;height:15px;}
.strip{display:flex;gap:10px;overflow-x:auto;padding:0 22px 4px;scroll-snap-type:x proximity;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.strip::-webkit-scrollbar{display:none;}
.strip a{flex:none;width:74%;max-width:300px;aspect-ratio:3/2;border-radius:16px;overflow:hidden;scroll-snap-align:start;background:#15161d;box-shadow:0 14px 30px rgba(0,0,0,.45);}
.strip img{width:100%;height:100%;object-fit:cover;}

/* unlock CTA */
.cta{margin:18px 20px max(34px,env(safe-area-inset-bottom));background:linear-gradient(135deg,#181922,#0b0c11);border:1px solid rgba(227,197,144,.35);border-radius:22px;padding:24px;text-align:center;}
.cta h3{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.02em;}
.cta p{color:#9aa4b2;font-size:.92rem;line-height:1.5;margin:8px 0 16px;}
.cta a{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:#1a1407;font-weight:700;font-size:15px;padding:14px 26px;border-radius:14px;}
.cta a svg{width:16px;height:16px;}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></a>
    <span class="sp"></span>
    <span class="free"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7"/></svg><span id="freeTxt"></span></span>
  </header>
  <section class="intro"><div class="kick">Ege • Türkiye</div><h1>Muğla</h1></section>
  <main id="list"></main>
  <div class="cta"><h3 id="ctaH"></h3><p id="ctaP"></p><a href="index.html" id="ctaB"></a></div>
</div>

<script>
const LANG=(navigator.language||'tr').toLowerCase().startsWith('tr')?'tr':'en';
const TX=LANG==='tr'
  ?{free:'Ücretsiz',maps:'Yol tarifi',ctaH:'Bu sadece 1 il',ctaP:'Muğla ücretsiz. Tek kodla diğer 80 ilin tüm manzaralı konumlarını da aç.',ctaB:'81 İl Kilidini Aç'}
  :{free:'Free',maps:'Directions',ctaH:'This is just 1 province',ctaP:'Muğla is free. Unlock the scenic locations of the other 80 provinces with one code.',ctaB:'Unlock all 81'};
const CDN='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/';
const img=id=>CDN+id+'/public';
const LOCS=[
  {name:'İztuzu Manzara Noktası',map:'https://www.google.com/maps/place/Iztuzu+View+Point/@36.7682289,28.6117555,13.83z',photos:['mugla_iztuzu_manzara_noktasi_1','mugla_iztuzu_manzara_noktasi_2','mugla_iztuzu_manzara_noktasi_3']},
  {name:'Kelebekler Vadisi',map:'https://maps.google.com/?q=Kelebekler+Vadisi%2C+Mu%C4%9Fla',photos:['mugla_kelebekler_vadisi_1','mugla_kelebekler_vadisi_2','mugla_kelebekler_vadisi_3']},
  {name:'Ölüdeniz',map:'https://maps.google.com/?q=%C3%96l%C3%BCdeniz%2C+Mu%C4%9Fla',photos:['mugla_oludeniz_1','mugla_oludeniz_2','mugla_oludeniz_3']},
  {name:'Montana Seyir Tepesi',map:'https://www.google.com/maps/place/Montana+Seyir+Tepesi/@36.5454469,29.133872,17z',photos:['mugla_montana_seyir_tepesi_1','mugla_montana_seyir_tepesi_2','mugla_montana_seyir_tepesi_3']}
];
const PIN='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-5.2 7-11a7 7 0 1 0-14 0c0 5.8 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>';
const LOCK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2.4"/><path d="M8 10.5V7.2A4 4 0 0 1 16 7.2v3.3"/></svg>';
document.getElementById('freeTxt').textContent=TX.free;
document.getElementById('ctaH').textContent=TX.ctaH;
document.getElementById('ctaP').textContent=TX.ctaP;
document.getElementById('ctaB').innerHTML=LOCK+'<span>'+TX.ctaB+'</span>';

const list=document.getElementById('list');
LOCS.forEach((loc,i)=>{
  const el=document.createElement('div');el.className='loc';
  el.innerHTML=`
    <div class="lh">
      <span class="no">${String(i+1).padStart(2,'0')}</span>
      <span class="nm">${loc.name}</span>
      <a class="maps" href="${loc.map}" target="_blank" rel="noopener">${PIN}<span>${TX.maps}</span></a>
    </div>
    <div class="strip">${loc.photos.map(p=>`<a href="${img(p)}" target="_blank" rel="noopener"><img src="${img(p)}" alt="${loc.name}" loading="lazy"></a>`).join('')}</div>`;
  list.appendChild(el);
});
</script>
</body>
</html>
