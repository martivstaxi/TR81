<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept C · Swipe Stories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;overflow:hidden;}
.back{position:fixed;top:12px;left:12px;z-index:80;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
/* phone frame */
.phone{max-width:440px;height:100vh;height:100dvh;margin:0 auto;position:relative;background:#000;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.6);}
/* fixed UI */
.brand{position:absolute;top:16px;left:0;right:0;text-align:center;z-index:40;font-weight:800;letter-spacing:.05em;font-size:15px;text-shadow:0 1px 8px rgba(0,0,0,.6);pointer-events:none;}
.searchbtn{position:absolute;top:14px;right:14px;z-index:40;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;}
.feed{height:100%;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;}
.feed::-webkit-scrollbar{display:none;}
.panel{height:100vh;height:100dvh;scroll-snap-align:start;position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:40px 26px 120px;
  background-size:cover;background-position:center;}
.panel::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.45) 0%,rgba(0,0,0,0) 30%,rgba(0,0,0,.15) 55%,rgba(0,0,0,.85) 100%);}
.panel>*{position:relative;z-index:2;}
.plate{align-self:flex-start;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:10px;padding:6px 12px;font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:.06em;margin-bottom:14px;}
.panel .rg{font-size:13px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.8);}
.panel h2{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(3.5rem,16vw,5.5rem);line-height:.9;margin:6px 0 18px;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.explore{align-self:flex-start;display:inline-flex;align-items:center;gap:10px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 26px;border-radius:999px;}
/* side rail */
.rail{position:absolute;right:14px;bottom:130px;z-index:30;display:flex;flex-direction:column;align-items:center;gap:18px;}
.rail .ic{width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.16);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:20px;}
.rail .ct{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);margin-top:-12px;}
.hint{position:absolute;left:0;right:0;bottom:88px;text-align:center;z-index:30;font-size:12px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.6);animation:bob 1.8s infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="phone">
  <div class="brand">TR&nbsp;81 · Türkiye</div>
  <div class="searchbtn">🔍</div>
  <div class="feed" id="feed"></div>
  <div class="hint">Swipe up ↑</div>
</div>
<script>
const R={marmara:'Marmara',aegean:'Aegean',medit:'Mediterranean',central:'Central Anatolia',black:'Black Sea',east:'Eastern Anatolia',southeast:'Southeastern Anatolia'};
const IMG='https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public';
const P=[[7,'antalya','Antalya','medit'],[34,'istanbul','İstanbul','marmara'],[61,'trabzon','Trabzon','black'],[6,'ankara','Ankara','central'],[35,'izmir','İzmir','aegean'],[48,'mugla','Muğla','aegean'],[50,'nevsehir','Nevşehir','central'],[21,'diyarbakir','Diyarbakır','southeast'],[25,'erzurum','Erzurum','east'],[1,'adana','Adana','medit'],[16,'bursa','Bursa','marmara'],[31,'hatay','Hatay','medit'],[53,'rize','Rize','black'],[65,'van','Van','east'],[42,'konya','Konya','central']];
const feed=document.getElementById('feed');
P.forEach(([n,slug,name,rk])=>{const p=document.createElement('section');p.className='panel';p.style.backgroundImage=`url('${IMG}')`;
  p.innerHTML=`<div class="rail"><div class="ic">♥</div><div class="ct">Save</div><div class="ic">↗</div><div class="ct">Share</div></div>
  <span class="plate">🇹🇷 ${String(n).padStart(2,'0')}</span>
  <div class="rg">${R[rk]}</div>
  <h2>${name}</h2>
  <a class="explore" href="${slug}.html">Explore ${name} →</a>`;
  feed.appendChild(p);});
feed.addEventListener('scroll',()=>{const h=document.querySelector('.hint');if(h)h.style.opacity=feed.scrollTop>40?'0':'1';},{passive:true});
</script>
</body>
</html>
