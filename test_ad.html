<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept AD · Hero grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#0a0a0d;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;min-height:100vh;background:#0a0a0d;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);}
/* sticky shrinking hero */
.hero{position:sticky;top:0;z-index:1;height:54vh;min-height:340px;display:flex;flex-direction:column;justify-content:flex-end;padding:0 24px 26px;overflow:hidden;}
.hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.hero .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.45;background:#0f9d8f;}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,13,.4) 0%,rgba(10,10,13,0) 32%,rgba(10,10,13,.55) 72%,rgba(10,10,13,1) 100%);}
.hero>*{position:relative;z-index:2;}
.hbar{position:absolute;top:0;left:0;right:0;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:16px 22px;}
.logo{font-weight:800;font-size:20px;text-shadow:0 1px 10px rgba(0,0,0,.5);}.logo b{color:#ffcf6b;}
.hero .kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf6b;font-weight:700;margin-bottom:10px;}
.hero h1{font-size:clamp(2.6rem,13vw,4rem);font-weight:800;line-height:.92;letter-spacing:-.02em;text-shadow:0 2px 26px rgba(0,0,0,.5);}
.hero a{display:inline-flex;align-items:center;gap:8px;margin-top:16px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:12px 22px;border-radius:12px;align-self:flex-start;}
/* sheet over hero */
.sheet{position:relative;z-index:2;background:#0a0a0d;border-top-left-radius:24px;border-top-right-radius:24px;margin-top:-22px;padding-top:8px;box-shadow:0 -20px 40px rgba(0,0,0,.5);}
.grab{width:40px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:8px auto 4px;}
.shead{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 8px;}
.shead h2{font-size:1.15rem;font-weight:800;}
.shead span{font-size:12px;color:#8a93a3;font-weight:600;}
.search{padding:4px 16px 12px;position:relative;}
.search input{width:100%;border:0;background:#16161c;border-radius:11px;padding:12px 12px 12px 40px;font-size:14px;font-family:inherit;color:#fff;}
.search input::placeholder{color:#6b6f7a;}.search input:focus{outline:1px solid #3a3a44;}
.search svg{position:absolute;left:29px;top:50%;transform:translateY(-50%);color:#6b6f7a;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:4px 16px 54px;}
.card{position:relative;aspect-ratio:4/5;border-radius:16px;overflow:hidden;cursor:pointer;background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:flex-end;padding:14px;}
.card .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.76;}
.card::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,0) 42%,rgba(0,0,0,.85));}
.card>*{position:relative;z-index:2;}
.card .pl{position:absolute;top:11px;left:12px;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:800;}
.card .rg{font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;opacity:.85;margin-bottom:3px;}
.card h3{font-size:1.18rem;font-weight:800;line-height:1;text-shadow:0 1px 8px rgba(0,0,0,.6);}
.card:active{transform:scale(.97);}
.empty{display:none;text-align:center;color:#6b6f7a;padding:30px;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="hero" id="hero">
    <div class="bg" style="background-image:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public')"></div>
    <div class="tint"></div>
    <div class="hbar"><div class="logo">TR<b>81</b></div></div>
    <div class="kx">★ Featured · Mediterranean</div>
    <h1>Antalya</h1>
    <a href="antalya.html">▶ Explore Antalya</a>
  </div>
  <div class="sheet">
    <div class="grab"></div>
    <div class="shead"><h2>All 81 provinces</h2><span id="cnt">81</span></div>
    <div class="search">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="q" type="text" placeholder="Search a province…">
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">No province found.</div>
  </div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[1,'adana','Adana','medit'],[2,'adiyaman','Adıyaman','southeast'],[3,'afyon','Afyon','aegean'],[4,'agri','Ağrı','east'],[5,'amasya','Amasya','black'],[6,'ankara','Ankara','central'],[7,'antalya','Antalya','medit'],[8,'artvin','Artvin','black'],[9,'aydin','Aydın','aegean'],[10,'balikesir','Balıkesir','marmara'],[11,'bilecik','Bilecik','marmara'],[12,'bingol','Bingöl','east'],[13,'bitlis','Bitlis','east'],[14,'bolu','Bolu','black'],[15,'burdur','Burdur','medit'],[16,'bursa','Bursa','marmara'],[17,'canakkale','Çanakkale','marmara'],[18,'cankiri','Çankırı','central'],[19,'corum','Çorum','black'],[20,'denizli','Denizli','aegean'],[21,'diyarbakir','Diyarbakır','southeast'],[22,'edirne','Edirne','marmara'],[23,'elazig','Elazığ','east'],[24,'erzincan','Erzincan','east'],[25,'erzurum','Erzurum','east'],[26,'eskisehir','Eskişehir','central'],[27,'gaziantep','Gaziantep','southeast'],[28,'giresun','Giresun','black'],[29,'gumushane','Gümüşhane','black'],[30,'hakkari','Hakkari','east'],[31,'hatay','Hatay','medit'],[32,'isparta','Isparta','medit'],[33,'mersin','Mersin','medit'],[34,'istanbul','İstanbul','marmara'],[35,'izmir','İzmir','aegean'],[36,'kars','Kars','east'],[37,'kastamonu','Kastamonu','black'],[38,'kayseri','Kayseri','central'],[39,'kirklareli','Kırklareli','marmara'],[40,'kirsehir','Kırşehir','central'],[41,'kocaeli','Kocaeli','marmara'],[42,'konya','Konya','central'],[43,'kutahya','Kütahya','aegean'],[44,'malatya','Malatya','east'],[45,'manisa','Manisa','aegean'],[46,'kahramanmaras','K.maraş','medit'],[47,'mardin','Mardin','southeast'],[48,'mugla','Muğla','aegean'],[49,'mus','Muş','east'],[50,'nevsehir','Nevşehir','central'],[51,'nigde','Niğde','central'],[52,'ordu','Ordu','black'],[53,'rize','Rize','black'],[54,'sakarya','Sakarya','marmara'],[55,'samsun','Samsun','black'],[56,'siirt','Siirt','southeast'],[57,'sinop','Sinop','black'],[58,'sivas','Sivas','central'],[59,'tekirdag','Tekirdağ','marmara'],[60,'tokat','Tokat','black'],[61,'trabzon','Trabzon','black'],[62,'tunceli','Tunceli','east'],[63,'sanliurfa','Şanlıurfa','southeast'],[64,'usak','Uşak','aegean'],[65,'van','Van','east'],[66,'yozgat','Yozgat','central'],[67,'zonguldak','Zonguldak','black'],[68,'aksaray','Aksaray','central'],[69,'bayburt','Bayburt','black'],[70,'karaman','Karaman','central'],[71,'kirikkale','Kırıkkale','central'],[72,'batman','Batman','southeast'],[73,'sirnak','Şırnak','southeast'],[74,'bartin','Bartın','black'],[75,'ardahan','Ardahan','east'],[76,'igdir','Iğdır','east'],[77,'yalova','Yalova','marmara'],[78,'karabuk','Karabük','black'],[79,'kilis','Kilis','southeast'],[80,'osmaniye','Osmaniye','medit'],[81,'duzce','Düzce','black']];
const norm=s=>s.toLowerCase().replace(/ı/g,'i').replace(/İ/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c');
const grid=document.getElementById('grid'),empty=document.getElementById('empty'),cnt=document.getElementById('cnt');
P.forEach(p=>{const[n,slug,name,rk]=p;const a=document.createElement('a');a.href=slug+'.html';a.className='card';a.dataset.s=norm(name);
  a.style.backgroundImage=`url('${IMG[n%2]}')`;
  a.innerHTML=`<div class="tint" style="background:${REG[rk][1]}"></div><span class="pl">${String(n).padStart(2,'0')}</span><div><div class="rg">${REG[rk][0]}</div><h3>${name}</h3></div>`;
  grid.appendChild(a);});
document.getElementById('q').addEventListener('input',e=>{const v=norm(e.target.value);let c=0;
  document.querySelectorAll('.card').forEach(a=>{const vis=!v||a.dataset.s.includes(v);a.style.display=vis?'':'none';if(vis)c++;});
  cnt.textContent=c;empty.style.display=c?'none':'block';});
</script>
</body>
</html>
