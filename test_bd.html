<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept BD · Tunnel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#04050a;color:#fff;-webkit-font-smoothing:antialiased;overflow:hidden;touch-action:none;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;height:100vh;height:100dvh;background:radial-gradient(120% 80% at 50% 45%,#101627 0%,#04050a 72%);position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;}
.bar{flex:none;display:flex;align-items:center;justify-content:space-between;padding:18px 20px 2px;z-index:30;}
.logo{font-weight:800;font-size:20px;}.logo b{color:#ffcf6b;}
.head{flex:none;text-align:center;padding:6px 20px 0;z-index:30;}
.head .kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf6b;font-weight:700;}
.head h1{font-size:clamp(1.6rem,6.5vw,2.1rem);font-weight:800;letter-spacing:-.02em;margin-top:5px;}
.stage{flex:1;position:relative;perspective:760px;overflow:hidden;}
.tunnel{position:absolute;left:50%;top:50%;width:0;height:0;transform-style:preserve-3d;}
.cell{position:absolute;width:230px;height:300px;margin:-150px 0 0 -115px;border-radius:20px;overflow:hidden;background-size:cover;background-position:center;
  display:flex;flex-direction:column;justify-content:flex-end;padding:18px;box-shadow:0 18px 44px rgba(0,0,0,.6);cursor:pointer;will-change:transform,opacity;}
.cell .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.65;}
.cell::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 45%,rgba(0,0,0,.82));}
.cell .rg{position:relative;z-index:2;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;opacity:.85;}
.cell h3{position:relative;z-index:2;font-size:1.5rem;font-weight:800;line-height:1;text-shadow:0 1px 8px rgba(0,0,0,.6);}
.cta{flex:none;text-align:center;padding:8px 24px 24px;z-index:30;}
.cta a{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 28px;border-radius:12px;}
.cta .hint{color:rgba(255,255,255,.4);font-size:11px;margin-top:10px;letter-spacing:.05em;}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="app">
  <div class="bar"><div class="logo">TR<b>81</b></div></div>
  <div class="head"><div class="kx">Fly through</div><h1>Down the tunnel</h1></div>
  <div class="stage" id="stage"><div class="tunnel" id="tunnel"></div></div>
  <div class="cta"><a id="cta" href="#">▶ Explore</a><div class="hint">drag up / down to travel</div></div>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[34,'istanbul','İstanbul','marmara'],[7,'antalya','Antalya','medit'],[50,'nevsehir','Nevşehir','central'],[47,'mardin','Mardin','southeast'],[61,'trabzon','Trabzon','black'],[48,'mugla','Muğla','aegean'],[65,'van','Van','east'],[35,'izmir','İzmir','aegean'],[63,'sanliurfa','Şanlıurfa','southeast'],[53,'rize','Rize','black'],[25,'erzurum','Erzurum','east'],[16,'bursa','Bursa','marmara'],[38,'kayseri','Kayseri','central'],[6,'ankara','Ankara','central']];
const tunnel=document.getElementById('tunnel'),cta=document.getElementById('cta'),stage=document.getElementById('stage');
const GAP=260;
const cells=P.map((p,i)=>{const[n,slug,name,rk]=p;const c=document.createElement('div');c.className='cell';
  c.style.backgroundImage=`url('${IMG[n%2]}')`;c.innerHTML=`<div class="tint" style="background:${REG[rk][1]}"></div><div class="rg">${REG[rk][0]}</div><h3>${name}</h3>`;
  c.addEventListener('click',()=>{const f=front();if(f===i)location.href=slug+'.html';else travel=i*GAP;});
  tunnel.appendChild(c);return c;});
let travel=0,vel=0,drag=false,sy=0,bt=0,lastY=0;
function front(){return Math.max(0,Math.min(P.length-1,Math.round(travel/GAP)));}
function frame(){if(!drag){travel+=vel;vel*=0.92;if(Math.abs(vel)<0.4){vel=0;travel+=((front()*GAP)-travel)*0.12;}}
  travel=Math.max(-60,Math.min((P.length-1)*GAP+60,travel));
  cells.forEach((c,i)=>{const z=i*GAP-travel; // 0 = at camera plane
    if(z<-200||z>1400){c.style.display='none';return;}c.style.display='';
    c.style.transform=`translateZ(${-z}px)`;c.style.opacity=z>1100?((1400-z)/300).toFixed(2):(z<0?((z+200)/200).toFixed(2):1);
    c.style.zIndex=Math.round(2000-z);});
  const[n,slug,name]=P[front()];cta.href=slug+'.html';cta.innerHTML=`▶ Explore ${name}`;requestAnimationFrame(frame);}
frame();
const down=e=>{const t=e.touches?e.touches[0]:e;drag=true;sy=t.clientY;bt=travel;lastY=t.clientY;vel=0;};
const move=e=>{if(!drag)return;const t=e.touches?e.touches[0]:e;travel=bt+(sy-t.clientY)*2.2;vel=(lastY-t.clientY)*2.2;lastY=t.clientY;};
const up=()=>drag=false;
stage.addEventListener('touchstart',down,{passive:true});stage.addEventListener('touchmove',move,{passive:true});stage.addEventListener('touchend',up);
stage.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
stage.addEventListener('wheel',e=>{travel+=e.deltaY*1.4;vel=0;},{passive:true});
</script>
</body>
</html>
