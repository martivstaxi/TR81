<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Dünya · A–Z — TR81</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#e3c590;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#08080b;color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;}svg{display:block;}a{color:inherit;text-decoration:none;}
.app{max-width:560px;margin:0 auto;min-height:100vh;position:relative;}

.top{display:flex;align-items:center;gap:12px;padding:max(16px,env(safe-area-inset-top)) 20px 4px;}
.back{width:40px;height:40px;flex:none;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;}
.back svg{width:20px;height:20px;}

.intro{padding:10px 22px 6px;}
.intro .kick{font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:700;}
.intro h1{font-family:'Bebas Neue',sans-serif;font-weight:400;font-size:clamp(2.8rem,13vw,4rem);line-height:.9;margin-top:8px;}

.searchwrap{padding:12px 16px 2px;position:sticky;top:0;z-index:7;background:linear-gradient(180deg,#08080b 80%,transparent);}
.search{position:relative;}
.search input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:14px 46px 14px 18px;color:#fff;font-size:15px;font-family:inherit;}
.search input::placeholder{color:rgba(255,255,255,.45);}
.search input:focus{outline:none;border-color:var(--gold);background:rgba(255,255,255,.09);}
.search svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:rgba(255,255,255,.5);}

.list{padding:4px 40px max(34px,env(safe-area-inset-bottom)) 12px;}
.lt{position:sticky;top:64px;z-index:5;font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:.1em;color:var(--gold);padding:10px 10px 6px;background:linear-gradient(180deg,#08080b 70%,rgba(8,8,11,.6));}
.item{display:flex;align-items:center;gap:13px;padding:10px 10px;border-radius:12px;transition:background .15s;}
.item:hover{background:rgba(255,255,255,.05);}
.item .fl{width:42px;height:31px;border-radius:6px;overflow:hidden;flex:none;box-shadow:0 3px 9px rgba(0,0,0,.4);background:#15161d;display:flex;align-items:center;justify-content:center;}
.item .fl img{width:100%;height:100%;object-fit:cover;}
.item .fl .em{font-size:23px;display:none;}.item .fl.emoji img{display:none;}.item .fl.emoji .em{display:block;}
.item .nm{flex:1;font-size:15px;font-weight:500;color:#e9edf2;}
.item .ar{width:17px;height:17px;color:rgba(255,255,255,.3);flex:none;}
.empty{display:none;text-align:center;color:#6b7280;padding:50px 0;font-size:14px;}

/* sağ alfabe rayı */
.rail{position:fixed;right:4px;top:50%;transform:translateY(-50%);z-index:8;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;}
.rail b{font-size:10px;font-weight:700;color:#7b828c;line-height:1.05;padding:1px 3px;cursor:pointer;border-radius:3px;}
.rail b:hover,.rail b.on{color:var(--gold);}
@media(max-width:380px){.rail b{font-size:9px;}}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <a class="back" href="index.html" aria-label="Geri"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></a>
  </div>
  <div class="intro">
    <div class="kick" id="kick"></div>
    <h1 id="h1"></h1>
  </div>
  <div class="searchwrap">
    <div class="search">
      <input id="q" type="text" autocomplete="off">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
  </div>
  <div class="list" id="list"></div>
  <div class="empty" id="empty"></div>
  <div class="rail" id="rail"></div>
</div>

<script src="worlddata.js"></script>
<script>
const W=window.WORLD,t=W.t;
document.getElementById('kick').textContent=t.kick;
document.getElementById('h1').textContent=t.title;
document.getElementById('q').placeholder=t.search;
const AR='<svg class="ar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>';

const sorted=W.list.slice().sort((a,b)=>a.name.localeCompare(b.name,W.lang));
const list=document.getElementById('list');
const letters=[];const anchors={};
let cur='';
sorted.forEach(c=>{
  const L=W.norm(c.name[0]).toUpperCase();
  if(L!==cur){cur=L;letters.push(L);
    const h=document.createElement('div');h.className='lt';h.textContent=L;h.id='L_'+L;anchors[L]=h;list.appendChild(h);}
  const a=document.createElement('a');a.href=c.href;a.className='item';a.dataset.s=W.norm(c.name+' '+c.slug);a.dataset.l=L;
  a.innerHTML=`<div class="fl"><img src="${c.flag}" alt="" loading="lazy" onerror="this.parentNode.classList.add('emoji')"><span class="em">${c.emoji}</span></div>
    <div class="nm">${c.name}</div>${AR}`;
  list.appendChild(a);
});

const rail=document.getElementById('rail');
letters.forEach(L=>{const b=document.createElement('b');b.textContent=L;b.onclick=()=>{const el=anchors[L];if(el)el.scrollIntoView({behavior:'smooth',block:'start'});};rail.appendChild(b);});

const empty=document.getElementById('empty');empty.textContent=t.empty;
document.getElementById('q').addEventListener('input',e=>{
  const v=W.norm(e.target.value);let total=0;const seen={};
  list.querySelectorAll('.item').forEach(c=>{const m=c.dataset.s.includes(v);c.style.display=m?'':'none';if(m){total++;seen[c.dataset.l]=1;}});
  list.querySelectorAll('.lt').forEach(h=>{h.style.display=seen[h.textContent]?'':'none';});
  empty.style.display=total?'none':'block';
  rail.style.display=v?'none':'';
});
</script>
</body>
</html>
