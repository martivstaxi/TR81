<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>TR81 — Concept AA · Stills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;-webkit-font-smoothing:antialiased;}
.back{position:fixed;top:12px;left:12px;z-index:90;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;color:#fff;}
.app{max-width:440px;margin:0 auto;background:#000;position:relative;box-shadow:0 0 60px rgba(0,0,0,.6);
  height:100vh;height:100dvh;overflow-y:scroll;scroll-snap-type:y mandatory;scrollbar-width:none;}
.app::-webkit-scrollbar{display:none;}
.bar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:440px;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:16px 20px;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,.5),transparent);}
.logo{font-weight:800;font-size:19px;text-shadow:0 1px 10px rgba(0,0,0,.6);}.logo b{color:#ffcf6b;}
.bar .ix{font-size:12px;font-weight:700;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);padding:5px 11px;border-radius:999px;font-variant-numeric:tabular-nums;}
.still{position:relative;height:100vh;height:100dvh;scroll-snap-align:start;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 26px 12vh;}
.still .bg{position:absolute;inset:0;background-size:cover;background-position:center;}
.still .tint{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.42;}
.still::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.4) 0%,rgba(0,0,0,0) 30%,rgba(0,0,0,.15) 54%,rgba(0,0,0,.95) 100%);}
.still>*{position:relative;z-index:3;}
.still .num{font-size:13px;font-weight:700;color:rgba(255,255,255,.6);margin-bottom:6px;font-variant-numeric:tabular-nums;}
.still .kx{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:#ffcf6b;font-weight:700;margin-bottom:11px;}
.still h2{font-size:clamp(3rem,16vw,5rem);font-weight:800;line-height:.9;letter-spacing:-.025em;text-shadow:0 3px 30px rgba(0,0,0,.55);}
.still p{margin-top:13px;color:rgba(255,255,255,.85);font-size:14px;max-width:300px;line-height:1.5;}
.still a{display:inline-flex;align-items:center;gap:8px;margin-top:20px;background:#fff;color:#111;font-weight:700;font-size:15px;padding:13px 24px;border-radius:12px;align-self:flex-start;}
.intro{justify-content:center;align-items:center;text-align:center;}
.intro h1{font-size:clamp(2.6rem,12vw,4rem);font-weight:800;line-height:.96;letter-spacing:-.02em;}
.intro p{margin:14px auto 0;}
.tip{position:absolute;bottom:30px;left:0;right:0;text-align:center;color:rgba(255,255,255,.6);font-size:12px;letter-spacing:.08em;animation:bob 1.8s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
</style>
</head>
<body>
<a class="back" href="test.html">← styles</a>
<div class="bar"><div class="logo">TR<b>81</b></div><div class="ix" id="ix">↓</div></div>
<div class="app" id="app">
  <section class="still intro">
    <div class="bg" style="background-image:url('https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public')"></div>
    <div class="tint" style="background:#1e3a8a"></div>
    <div><div class="kx">A cinematic scroll</div><h1>Türkiye,<br>full frame.</h1><p>Scroll down through the country, one still at a time.</p></div>
    <div class="tip">↓ scroll</div>
  </section>
</div>
<script>
const REG={medit:['Mediterranean','#0fb39d'],marmara:['Marmara','#3b82f6'],aegean:['Aegean','#06b6d4'],black:['Black Sea','#22c55e'],central:['Central Anatolia','#f59e0b'],east:['Eastern Anatolia','#a855f7'],southeast:['SE Anatolia','#ec4899']};
const IMG=['https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/df156335-417a-4600-a36a-a78c69799c00/public','https://imagedelivery.net/hvHh954PgWT-gbZ25oXErA/ce399dec-ddac-4455-521d-697751d46300/public'];
const P=[[34,'istanbul','İstanbul','marmara','Two continents meeting on one shimmering strait.'],[7,'antalya','Antalya','medit','Turquoise coast — beaches, canyons and waterfalls.'],[50,'nevsehir','Cappadocia','central','Fairy chimneys and a sky full of balloons.'],[47,'mardin','Mardin','southeast','Honey-stone city above the Mesopotamian plain.'],[61,'trabzon','Trabzon','black','Misty green peaks above the Black Sea.'],[48,'mugla','Muğla','aegean','The bluest bays of the Aegean — Bodrum to Marmaris.'],[65,'van','Van','east','A turquoise sea-lake high in the eastern mountains.'],[35,'izmir','İzmir','aegean','Aegean light, ancient ruins and a long promenade.'],[63,'sanliurfa','Şanlıurfa','southeast','Cradle of civilisation — the land of Göbeklitepe.'],[53,'rize','Rize','black','Tea terraces wrapped in mountain cloud.'],[25,'erzurum','Erzurum','east','High plateau winters and proud old stone.'],[16,'bursa','Bursa','marmara','Green slopes of Uludağ above the first Ottoman capital.']];
const app=document.getElementById('app'),ix=document.getElementById('ix');
P.forEach((p,i)=>{const[n,slug,name,rk,desc]=p;const s=document.createElement('section');s.className='still';
  s.innerHTML=`<div class="bg" style="background-image:url('${IMG[n%2]}')"></div><div class="tint" style="background:${REG[rk][1]}"></div>
  <div class="num">${String(i+1).padStart(2,'0')} / ${P.length}</div><div class="kx">${REG[rk][0]}</div><h2>${name}</h2><p>${desc}</p><a href="${slug}.html">▶ Explore ${name}</a>`;
  app.appendChild(s);});
app.addEventListener('scroll',()=>{const vh=app.clientHeight;const idx=Math.round(app.scrollTop/vh);ix.textContent=idx===0?'↓':`${Math.min(idx,P.length)} / ${P.length}`;},{passive:true});
</script>
</body>
</html>
